<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יפן 2026 — מסלול טיול</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;600;700;900&display=swap');

/* ══════════════════════════════════════════════
   מערכת עיצוב מרכזית — צבעים, מצבים, אזורים
   כל צבע כאן = משמעות קבועה. אין צבע דקורטיבי.
   ══════════════════════════════════════════════ */
:root{
  /* רקעים ניטרליים */
  --bg:#f4f4f2; --surface:#ffffff; --border:#e3e1dc; --border-strong:#c9c6bf;
  /* טקסט */
  --ink:#1c1c1a; --ink-2:#57534e; --ink-3:#8a857e;
  /* מותג / פעולה ראשית (ניווט, קישורים, פעיל) */
  --brand:#1c1c1a; --brand-ink:#f5f4f0;
  --action:#1d4ed8;                 /* קישור / פעולה */
  --focus:#b8860b;                  /* פוקוס / בחירה / הדגשה פעילה */
  /* מצבים סמנטיים — צבע יחיד לכל מצב */
  --ok:#15803d;  --ok-bg:#e7f3ec;   /* הצלחה / הושלם / מוזמן */
  --warn:#b45309; --warn-bg:#fbf1e3;/* אזהרה / חסר / טרם הוזמן */
  --err:#b91c1c; --err-bg:#f9e9e9;  /* שגיאה / חריגה */
  /* אזורים גאוגרפיים — סקאלת כחול אחת (בהיר→חזק) */
  --region-1:#dbeafe; --region-1-ink:#1e40af;  /* קנסאי — בהיר */
  --region-2:#93c5fd; --region-2-ink:#1e3a8a;  /* הוקאידו — בינוני */
  --region-3:#3b82f6; --region-3-ink:#ffffff;  /* טוקיו — חזק */
  --region-4:#e7e5e4; --region-4-ink:#44403c;  /* דובאי/אחר — ניטרלי */
  /* אייקונים — אפור בהיר אחיד */
  --icon:#9a958e; --icon-active:#57534e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Hebrew',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}

/* אייקוני קו אחידים (SVG) — גודל, עובי-קו וצבע זהים בכל האפליקציה */
.ic{width:16px;height:16px;flex:none;stroke:var(--icon);stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}
.ic-lg{width:22px;height:22px}

/* Tooltip אחיד — כל אלמנט עם data-tip. מסביר את יעד הפעולה, לא רק את השם. */
[data-tip]{position:relative}
[data-tip]:hover::after,[data-tip]:focus-visible::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);right:50%;transform:translateX(50%);
  background:#1c1c1a;color:#f5f4f0;font:600 11px/1.4 'Noto Sans Hebrew',sans-serif;white-space:nowrap;
  padding:5px 9px;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,.28);z-index:200;pointer-events:none;
  max-width:240px;white-space:normal;width:max-content;text-align:center}
[data-tip]:hover::before,[data-tip]:focus-visible::before{
  content:'';position:absolute;bottom:calc(100% + 2px);right:50%;transform:translateX(50%);
  border:5px solid transparent;border-top-color:#1c1c1a;z-index:200;pointer-events:none}

/* NAV — סרגל ניווט ראשי קבוע בראש המסך */
.nav{background:#1a1a1a;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(255,255,255,.06)}
.nav h1{color:#e8e6e1;font-size:16px;font-weight:900;order:1}
.nav .tabs{order:2;flex:1;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.nav .actions{order:3;display:flex;gap:6px;flex-wrap:wrap}
.tab{position:relative;padding:5px 14px;border:none;border-radius:4px;background:transparent;color:#aaa;font:600 12px/1.4 inherit;cursor:pointer;transition:.12s}
.tab:hover{color:#fff;background:rgba(255,255,255,.1)}
/* דף פעיל — הדגשה ברורה: רקע + פס תחתון (לא רק צבע) */
.tab.on{color:#fff;background:rgba(255,255,255,.15);font-weight:800}
.tab.on::after{content:'';position:absolute;left:14px;right:14px;bottom:-8px;height:2px;background:var(--focus)}
.tab:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
@media(max-width:900px){.nav .tabs{justify-content:flex-start;order:3;flex-basis:100%}.nav h1{order:1}.nav .actions{order:2;margin-right:auto}}
.nav-btn{padding:4px 10px;border:1px solid #555;border-radius:4px;background:transparent;color:#aaa;font:600 11px/1.4 inherit;cursor:pointer;transition:.12s}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff;border-color:#888}
.nav-btn.save{border-color:#166534;color:#4ade80}.nav-btn.save:hover{background:#166534;color:#fff}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid #4b4b4b;border-radius:6px;background:rgba(255,255,255,.06);color:#e8e6e1;font:800 12px/1.4 inherit;cursor:pointer;transition:.12s;white-space:nowrap}
.back-btn .ic{width:14px;height:14px}
.back-btn:hover{background:rgba(255,255,255,.14);border-color:#777}
.back-btn:active{transform:scale(.96)}
.back-btn:focus-visible{outline:2px solid var(--focus);outline-offset:1px}

/* HERO */
.hero{max-width:1200px;margin:12px auto 8px;padding:0 12px}
.hero-card{background:linear-gradient(135deg,#fff8eb 0%,#ffffff 100%);border:1px solid #e7dccf;border-radius:14px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.05);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hero-card h2{font-size:20px;font-weight:900;color:#1f2937;margin-bottom:4px}
.hero-card p{font-size:12px;color:#6b7280;margin:0}
.hero-eyebrow{display:inline-block;padding:3px 8px;border-radius:999px;background:#1f2937;color:#f8fafc;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap}
.hero-pill{padding:6px 10px;border-radius:999px;background:#f3f4f6;color:#374151;font-size:11px;font-weight:700;border:1px solid #e5e7eb}

/* STATS */
.stats{max-width:1200px;margin:8px auto 6px;padding:0 12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.stat-card{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:10px 12px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.stat-label{font-size:10px;color:#888;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-size:16px;font-weight:900;color:#111827}
.stat-detail{font-size:11px;color:#6b7280;margin-top:2px}

/* FILTERS */
/* סרגל ניווט משני — מסננים של הדף הנוכחי. ממורכז. מוסתר כשאין. */
.filters{position:sticky;top:41px;z-index:40;background:var(--surface);border-bottom:1px solid var(--border);margin:0 0 10px;padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:center}
.filters:empty{display:none}
.filters::before{content:'סינון:';font-size:11px;font-weight:800;color:var(--ink-3);margin-left:2px}
.flt{padding:3px 10px;border:1px solid #ddd;border-radius:3px;background:#fff;font:600 11px/1.4 inherit;cursor:pointer;color:#666;transition:.12s}
.flt:hover{border-color:#999}.flt.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* TABLE */
.tw{max-width:1200px;margin:0 auto;padding:0 12px;overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th{background:#2c2c2c;color:#e8e6e1;font-weight:600;font-size:11px;padding:7px 8px;text-align:right;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#3a3a3a}
th .arrow{font-size:9px;margin-right:3px;opacity:.5}
td{padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;vertical-align:top}
tr:hover{background:#fafaf8}
tr.miss{background:#fffef5}
tr.miss td{color:#92400e}

/* EDITABLE */
td[contenteditable]{outline:none;border-radius:2px;transition:background .12s}
td[contenteditable]:hover{background:#f5f5f0}
td[contenteditable]:focus{background:#fffde7;box-shadow:inset 0 0 0 2px #fbbf24}

/* תמונת אתר — גודל וחיתוך אחידים */
.place-img{width:64px;height:48px;object-fit:cover;border-radius:6px;display:block;background:#eee}
.place-img.noimg,.place-img.broken{display:flex;align-items:center;justify-content:center;font-size:9px;color:#a8a29e;background:#f5f4f0;border:1px dashed #d6d3ce;text-align:center;line-height:1.2}
tr:hover .place-img{box-shadow:0 2px 8px rgba(0,0,0,.15)}

/* TAGS */
.tg{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap}
/* אזורים — סקאלת כחול אחת */
.tg-k{background:var(--region-1);color:var(--region-1-ink)}
.tg-h{background:var(--region-2);color:var(--region-2-ink)}
.tg-t{background:var(--region-3);color:var(--region-3-ink)}
.tg-d{background:var(--region-4);color:var(--region-4-ink)}
/* מצבים — צבע יחיד לכל מצב, עם אייקון תומך */
.tg-ok{background:var(--ok-bg);color:var(--ok)}
.tg-no{background:var(--warn-bg);color:var(--warn)}
.tg .ic{width:11px;height:11px;stroke-width:2.2}
.tg-ok .ic{stroke:var(--ok)}.tg-no .ic{stroke:var(--warn)}

/* CALENDAR */
.cal-month{margin-bottom:24px}
.cal-title{font-size:18px;font-weight:900;margin-bottom:8px;color:#1a1a1a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:#888;padding:4px 0}
.cal-cell{min-height:78px;border:1px solid #e5e3de;border-radius:6px;padding:4px 5px;background:#fff;font-size:10px;overflow:hidden}
.cal-cell.empty{background:transparent;border:none}
a.cal-cell{text-decoration:none;color:inherit;display:block;transition:.12s}
a.cal-cell:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);transform:translateY(-1px)}
.cal-dnum{font-size:13px;font-weight:700;color:#444}
.cal-trip{display:inline-block;background:var(--brand);color:var(--brand-ink);font-size:9px;font-weight:900;border-radius:3px;padding:0 4px;margin-right:4px;vertical-align:1px}
.cal-city{font-weight:700;font-size:11px;margin-top:3px;line-height:1.3}
.cal-hotel{color:#666;font-size:9px;line-height:1.25;margin-top:1px}
.cal-k{background:var(--region-1)}.cal-h{background:var(--region-2)}.cal-t{background:var(--region-3)}.cal-t .cal-city,.cal-t .cal-dnum{color:#fff}.cal-t .cal-hotel{color:#e0e7ff}.cal-d{background:var(--region-4)}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-size:11px}
.cal-legend span{display:inline-flex;align-items:center;gap:5px;font-weight:600;color:#555}
.cal-legend i{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.08)}
@media(max-width:640px){.cal-cell{min-height:60px;font-size:9px}.cal-city{font-size:10px}.cal-hotel{display:none}}

/* SUMMARY PAGE (דף סיכומים מרכזי) */
.sum-intro{margin:2px 0 14px;font-size:13px;color:#6b7280}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
/* כרטיסייה — מראה אחיד ניטרלי. צבע נכנס רק דרך st-* (מצב). */
.sum-card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px;text-decoration:none;color:inherit;transition:.15s;position:relative}
.sum-card:hover{border-color:var(--border-strong);box-shadow:0 6px 18px rgba(0,0,0,.08);transform:translateY(-2px)}
.sum-card:active{transform:translateY(0)}
.sum-card:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.sum-head{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sum-head .ic{stroke:var(--icon)}
.sum-topic{font-size:12px;font-weight:800;color:var(--ink-2);letter-spacing:.02em}
.sum-main{font-size:24px;font-weight:900;color:var(--ink);line-height:1.1;margin:2px 0}
.sum-sub{font-size:12px;color:var(--ink-3);line-height:1.5}
.sum-go{margin-top:9px;font-size:11px;font-weight:800;color:var(--action);display:inline-flex;align-items:center;gap:4px}
.sum-go .ic{width:13px;height:13px;stroke:var(--action)}
.sum-flag{margin-top:8px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.st-ok-txt{color:var(--ok)}.st-ok-txt .ic{stroke:var(--ok)}
.st-warn-txt{color:var(--warn)}.st-warn-txt .ic{stroke:var(--warn)}
/* מצב על הכרטיסייה — רק גבול עדין בצד, לא רקע צבעוני חזק */
.sum-card.st-warn{border-right:3px solid var(--warn)}
.sum-card.st-ok{border-right:3px solid var(--ok)}
.sum-card.st-pending{border-right:3px solid var(--border-strong)}
.sum-card.st-pending .sum-main{color:var(--ink-3);font-size:16px}
.sum-note{margin-top:7px;font-size:11px;color:var(--ink-3);background:var(--bg);border-radius:6px;padding:5px 8px;line-height:1.5}
@media(max-width:520px){.sum-grid{grid-template-columns:1fr 1fr;gap:8px}.sum-main{font-size:20px}}

/* רשימת נושאים — כל שורה קישור לדף שלה */
.sum-list-title{margin:22px 0 8px;font-size:13px;font-weight:800;color:var(--ink-2)}
/* בר תצוגה + מתג כרטיסים/רשימה (אחיד בכל דף כרטיסים) */
.view-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.view-toggle{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;flex:none}
.vt{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border:none;background:var(--surface);color:var(--ink-3);font:700 12px/1 'Noto Sans Hebrew',sans-serif;cursor:pointer;transition:.12s}
.vt+.vt{border-right:1px solid var(--border)}
.vt .ic{width:14px;height:14px;stroke:currentColor}
.vt:hover{background:var(--bg);color:var(--ink-2)}
.vt.on{background:var(--brand);color:var(--brand-ink)}
.vt:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
.sum-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sum-row{display:flex;align-items:center;gap:12px;padding:11px 14px;text-decoration:none;color:inherit;border-bottom:1px solid var(--border);transition:.12s}
.sum-row:last-child{border-bottom:none}
.sum-row:hover{background:var(--bg)}
.sum-row:focus-visible{outline:2px solid var(--focus);outline-offset:-2px}
.sum-row .sr-ic{flex:none;display:inline-flex}
.sum-row .sr-ic .ic{stroke:var(--icon)}
.sr-topic{font-weight:800;font-size:13px;color:var(--ink);min-width:110px}
.sr-main{font-weight:900;font-size:14px;color:var(--ink);min-width:70px}
.sr-sub{flex:1;font-size:12px;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sr-go{flex:none;display:inline-flex}
.sr-go .ic{width:14px;height:14px;stroke:var(--action)}
.sum-row.st-warn{border-right:3px solid var(--warn)}
.sum-row.st-ok{border-right:3px solid var(--ok)}
.sum-row.st-pending{border-right:3px solid var(--border-strong)}
.sum-row.st-pending .sr-main{color:var(--ink-3);font-size:12px}
@media(max-width:560px){.sr-sub{display:none}.sr-topic{min-width:auto;flex:1}}

/* דף תחבורה מרכזי */
.tr-intro{margin:2px 0 12px;font-size:13px;color:var(--ink-3)}
.tr-legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:14px;font-size:12px;font-weight:700;color:var(--ink-2)}
.tr-legend span{display:inline-flex;align-items:center;gap:6px}
.tr-legend i{width:20px;height:4px;border-radius:2px;display:inline-block}
.tr-sec{font-size:15px;font-weight:900;color:var(--ink);margin:18px 0 10px}
.tr-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.tr-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px}
.tr-card-head{display:flex;align-items:center;gap:9px;margin-bottom:10px;padding-bottom:9px;border-bottom:1px solid var(--border)}
.tr-hic{width:20px;height:20px;stroke:var(--icon-active)}
.tr-route{flex:1;font-size:14px;color:var(--ink);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tr-route .ic{width:14px;height:14px;stroke:var(--icon)}
.tr-date{font-size:12px;font-weight:800;color:var(--ink-3);background:var(--bg);padding:2px 8px;border-radius:999px;white-space:nowrap}
.tr-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;font-size:12px}
.tr-grid > div{color:var(--ink)}
.tr-grid > div.tr-full{grid-column:1/-1}
.tr-grid span{display:block;font-size:10px;font-weight:800;color:var(--ink-3);letter-spacing:.02em;margin-bottom:1px}
.tr-grid span .ic{width:11px;height:11px;vertical-align:-1px}
.tr-badge-primary{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;color:var(--ok);background:var(--ok-bg);border-radius:999px;padding:3px 10px;margin-bottom:10px}
.tr-badge-primary .ic{width:13px;height:13px;stroke:var(--ok)}
.tr-note{margin-top:10px;font-size:11px;color:var(--ink-2);background:var(--bg);border-radius:8px;padding:8px 10px;line-height:1.6}
.tr-note ul{margin:4px 8px 0 0;padding-right:16px}
.tr-note li{margin-bottom:3px}
.tr-alert{margin-top:9px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
@media(max-width:560px){.tr-cards{grid-template-columns:1fr}.tr-grid{grid-template-columns:1fr}}
/* תצוגת רשימה לתחבורה — היררכיה קבועה */
.tr-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.tr-row{display:flex;align-items:center;gap:12px;padding:11px 14px;border-bottom:1px solid var(--border);font-size:12px}
.tr-row:last-child{border-bottom:none}
.tr-row .trr-ic{flex:none;display:inline-flex}.tr-row .trr-ic .ic{stroke:var(--icon)}
.trr-main{font-weight:800;color:var(--ink);min-width:180px}
.trr-val{font-weight:900;color:var(--ink);min-width:70px}
.trr-date{color:var(--ink-3);font-weight:700;min-width:70px}
.trr-sub{flex:1;color:var(--ink-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@media(max-width:640px){.trr-sub,.trr-date{display:none}.trr-main{min-width:auto;flex:1}}

/* דף הזמנות — ציר זמן */
.bk-alerts{background:var(--warn-bg);border:1px solid #f0dcc0;border-radius:12px;padding:12px 15px;margin-bottom:14px}
.bk-alerts h3{font-size:13px;font-weight:900;color:var(--warn);margin-bottom:6px}
.bk-alerts ul{margin:0;padding-right:18px}
.bk-alerts li{font-size:12px;color:#7a5b2e;line-height:1.7}
.bk-alerts li.bk-alert-high{color:var(--err);font-weight:700}
.bk-summary{font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:12px}
.bk-timeline{display:flex;flex-direction:column;gap:10px}
.bk-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 15px;border-right:3px solid var(--ok)}
.bk-card-pend{border-right-color:var(--warn);background:var(--warn-bg)}
.bk-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.bk-date{font-size:12px;font-weight:900;color:var(--ink);background:var(--bg);padding:2px 9px;border-radius:999px;min-width:44px;text-align:center}
.bk-type{font-size:11px;font-weight:800;color:var(--ink-3)}
.bk-name{flex:1;font-size:14px;font-weight:800;color:var(--ink)}
.bk-status{font-size:11px;font-weight:800;padding:2px 10px;border-radius:999px}
.bk-ok{background:var(--ok-bg);color:var(--ok)}
.bk-pend{background:var(--err-bg);color:var(--err)}
.bk-body{display:flex;flex-direction:column;gap:5px}
.bk-field{font-size:12px;color:var(--ink)}
.bk-field > span{display:inline-block;min-width:80px;font-size:10px;font-weight:800;color:var(--ink-3);letter-spacing:.02em}
.bk-ref{font-family:monospace;font-size:13px;letter-spacing:.05em}
.bk-copy{font:700 10px/1 'Noto Sans Hebrew',sans-serif;padding:3px 8px;border:1px solid var(--border-strong);border-radius:5px;background:var(--surface);color:var(--action);cursor:pointer;margin-right:4px;transition:.12s}
.bk-copy:hover{background:var(--bg)}
.bk-copy.ok{color:var(--ok);border-color:var(--ok)}
.bk-missing{color:var(--err);font-weight:700}
.bk-missing > span{color:var(--err)}
.bk-warn{margin-top:7px;font-size:11px;font-weight:700;color:var(--err);background:var(--err-bg);border-radius:7px;padding:6px 9px;line-height:1.5}
.bk-note{margin-top:9px;font-size:11px;color:var(--ink-3);background:var(--bg);border-radius:8px;padding:7px 10px;line-height:1.6}

/* HELP + SUMMARY */
.help{max-width:1200px;margin:4px auto 0;padding:0 12px}
.help-box{background:#fff;border:1px solid #e7dccf;border-radius:12px;padding:12px 14px;margin-bottom:8px}
.help-summary{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.sum-pill{padding:6px 11px;border-radius:999px;background:#f3f4f6;border:1px solid #e5e7eb;font-size:12px;font-weight:700;color:#374151}

.help-toggle{display:inline-flex;align-items:center;gap:5px;background:#1f2937;color:#f8fafc;border:none;border-radius:6px;padding:5px 11px;font:700 11px/1.4 inherit;cursor:pointer}
.help-toggle:hover{background:#374151}
.help-body{margin-top:10px;font-size:12px;color:#4b5563;line-height:1.7;display:none}
.help-body.open{display:block}

.help-body li{margin-bottom:3px}
.help-body kbd{background:#f3f4f6;border:1px solid #d1d5db;border-radius:3px;padding:0 5px;font-size:11px;font-weight:700;color:#374151}

/* כפתורי פעולה אחידים בטבלאות */
.act{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;text-decoration:none;white-space:nowrap;border-radius:5px;padding:3px 9px;transition:.12s;cursor:pointer;border:1px solid transparent}
.act .ic{width:12px;height:12px}
.act-open{background:var(--action);color:#fff}.act-open .ic{stroke:#fff}.act-open:hover{filter:brightness(1.12)}
.act-ghost{color:var(--action);border-color:var(--border)}.act-ghost .ic{stroke:var(--action)}.act-ghost:hover{background:var(--bg);border-color:var(--border-strong)}
.act:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
/* בוקינג — צבע המותג נשמר כי הוא מזהה יעד חיצוני קבוע */
a.bk{display:inline-flex;align-items:center;gap:4px;background:#003580;color:#fff;font-size:10px;font-weight:700;border-radius:5px;padding:3px 9px;text-decoration:none;white-space:nowrap}
a.bk .ic{width:12px;height:12px;stroke:#fff}
a.bk:hover{background:#00224f}

/* MAP LEGEND */
/* סרגל החלפת תצוגות מפה */
.mapview-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
.mvb{padding:6px 14px;border:1px solid var(--border);border-radius:7px;background:var(--surface);color:var(--ink-2);font:700 12px/1.4 inherit;cursor:pointer;transition:.12s}
.mvb:hover{background:var(--bg);border-color:var(--border-strong)}
.mvb.on{background:var(--brand);color:var(--brand-ink);border-color:var(--brand)}
.mvb:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
.mvb-controls{display:inline-flex;gap:6px;align-items:center;margin-right:auto}
#mapDaySel{padding:5px 9px;border:1px solid var(--border);border-radius:6px;font:600 12px inherit;background:var(--surface);color:var(--ink)}
.mvb-reset{padding:5px 11px;border:1px solid var(--border);border-radius:6px;background:var(--surface);color:var(--action);font:700 11px inherit;cursor:pointer}
.mvb-reset:hover{background:var(--bg)}
.map-place-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.mpf{padding:3px 10px;border:1px solid var(--border);border-radius:999px;background:var(--surface);font:600 11px inherit;cursor:pointer;color:var(--ink-3)}
.mpf.on{background:var(--brand);color:var(--brand-ink);border-color:var(--brand)}
/* שתי מפות זו לצד זו — גודל שווה, מרובעות */
.maps-dual-main{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.map-col-m{display:flex;flex-direction:column}
.map-col-head-m{font-size:12px;font-weight:800;color:var(--ink-2);margin-bottom:6px}
.map-square{aspect-ratio:1/1;min-height:340px;border-radius:8px;overflow:hidden;background:#e8e6e1}
@media(max-width:760px){.maps-dual-main{grid-template-columns:1fr}}
/* מקרא = מסננים לחיצים */
.map-legend{max-width:1200px;margin:10px auto 0;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:10px;display:flex;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:700;color:var(--ink-2);align-items:center}
.map-legend:empty{display:none}
.leg-item{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;border:1px solid transparent;cursor:default}
.leg-item.filterable{cursor:pointer;border-color:var(--border)}
.leg-item.filterable:hover{background:var(--bg)}
.leg-item.on{background:var(--brand);color:var(--brand-ink);border-color:var(--brand)}
.leg-item i{width:14px;height:14px;display:inline-block;opacity:.85;flex:none}
.leg-item i.circle{border-radius:50%}.leg-item i.square{border-radius:3px}.leg-item i.line{width:20px;height:4px;border-radius:2px}
.leg-all{font-weight:800;color:var(--action);cursor:pointer;padding:4px 10px;border-radius:999px;border:1px solid var(--border)}
.leg-all:hover{background:var(--bg)}
.leg-all.on{background:var(--action);color:#fff;border-color:var(--action)}
/* מגוון + מידע להשלמה */
.map-extra{max-width:1200px;margin:10px auto 0}
.map-extra:empty{display:none}
.mx-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px}
.mx-box h4{font-size:13px;font-weight:800;color:var(--ink-2);margin-bottom:8px}
.mx-chips{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.mx-chip{font-size:11px;font-weight:600;color:var(--ink-2);background:var(--bg);border-radius:6px;padding:4px 9px}

.mx-ok{font-size:12px;color:var(--ok);font-weight:700}
.mx-gaps-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:6px}
.mx-gaps-head h4{margin:0}
.mx-gaps-list{margin:0;padding-right:18px;font-size:12px;color:var(--ink-2);line-height:1.7;max-height:200px;overflow-y:auto}

/* LINK */
a.ml{color:var(--action);text-decoration:none;font-size:11px}
a.ml:hover{text-decoration:underline}

/* PANELS */
.panel{display:none;max-width:1200px;margin:0 auto;padding:12px}
.panel.on{display:block}

/* MAP */
#map,#mapSpec{width:100%;height:100%}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(50px);background:#292524;color:#fafaf9;padding:7px 16px;border-radius:5px;font-size:12px;opacity:0;transition:.2s;z-index:100;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}

/* FOOTER */
.foot{max-width:1200px;margin:16px auto;padding:0 12px;font-size:10px;color:#bbb;text-align:center}

@media(max-width:768px){

}

<script>
// ══════════════════════════════════
// מיפוי אייקונים מרכזי (סעיף 4.1)
// אייקוני קו אחידים — אותו viewBox, עובי-קו וסגנון.
// שימוש: icon('days') → מחזיר <svg> אחיד.
// ══════════════════════════════════
const ICON_PATHS = {
  days:      '<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  calendar:  '<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4M8 13h.01M12 13h.01M16 13h.01"/>',
  route:     '<circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M8 19h6a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h6"/>',

  star:      '<path d="M12 3l2.6 5.6 6 .7-4.4 4.1 1.2 6-5.4-3-5.4 3 1.2-6L3.4 9.3l6-.7z"/>',
  train:     '<rect x="5" y="3" width="14" height="13" rx="3"/><path d="M5 10h14M9 20l-2 2M15 20l2 2M8 16v1M16 16v1"/><circle cx="8.5" cy="12.5" r=".6"/><circle cx="15.5" cy="12.5" r=".6"/>',
  money:     '<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01"/>',
  map:       '<path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/>',

  sort:      '<path d="M8 4v16M8 4l-3 3M8 4l3 3M16 20V4M16 20l-3-3M16 20l3-3"/>',
  plane:     '<path d="M17.8 19.2 16 11l3.5-3.5a2.1 2.1 0 0 0-3-3L13 8 4.8 6.2a1 1 0 0 0-.9 1.7l5.6 3.3-2.4 2.4-2-.4a.8.8 0 0 0-.7 1.3l1.9 1.9 1.9 1.9a.8.8 0 0 0 1.3-.7l-.4-2 2.4-2.4 3.3 5.6a1 1 0 0 0 1.7-.9z"/>',

  shuttle:   '<rect x="3" y="5" width="18" height="12" rx="2"/><path d="M3 11h18M7 17v1M17 17v1M7 8h4"/>',
  'arrow-l': '<path d="M19 12H5M11 6l-6 6 6 6"/>',
  grid:      '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',

};
function icon(name, cls){
  const p = ICON_PATHS[name] || '';
  return `<svg class="ic${cls?' '+cls:''}" viewBox="0 0 24 24" aria-hidden="true">${p}</svg>`;
}

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let DATA = { hotels:[], days:[], places:[], costs:[], flights:[], transport:null, bookings:null };
let activeTab = 'summary';
let navHistory = [];   // מחסנית ניווט — לחזרה לדף הקודם
let sortState = {};
let regionFilter = '';
let mapObj = null;
// מצב תצוגה (כרטיסים/רשימה) — נשמר בין דפים (סעיף 3.5)
let viewMode = localStorage.getItem('viewMode') || 'cards';
function setView(mode){ viewMode = mode; try{localStorage.setItem('viewMode',mode);}catch(e){} render(); }

// ══════════════════════════════════
// LOAD DATA
// ══════════════════════════════════
async function loadData() {
  try {
    const [h,d,p,c,f,t] = await Promise.all([
      fetch('data/hotels.json').then(r=>r.json()),
      fetch('data/days.json').then(r=>r.json()),
      fetch('data/places.json').then(r=>r.json()),
      fetch('data/costs.json').then(r=>r.json()),
      fetch('data/flights.json').then(r=>r.json()),
      fetch('data/transport.json').then(r=>r.json()).catch(()=>null)
    ]);
    const bk = await fetch('data/bookings.json').then(r=>r.json()).catch(()=>null);
    DATA = { hotels:h, days:d, places:p, costs:c, flights:f, transport:t, bookings:bk };
  } catch(e) {
    console.error('Load error:',e);
    toast('שגיאה בטעינת נתונים — ודאי שאת בשרת מקומי');
  }
  // פתיחת הטאב לפי ה-URL (מאפשר קישור ישיר ושמירת מצב ברענון — סעיף 4.5)
  const urlTab = new URLSearchParams(location.search).get('tab');
  const valid = ['summary','days','calendar','hotels','bookings','places','costs','transport','flights','map'];
  if (urlTab && valid.includes(urlTab) && urlTab!==activeTab) {
    activeTab = urlTab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===urlTab));
    document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on', p.id==='p-'+urlTab));
    if (urlTab==='map') setTimeout(initMap,120);
  }
  render();
}

// TABS
// ══════════════════════════════════
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => goTab(btn.dataset.tab));
});

function goTab(tab, isBack) {
  if (tab===activeTab) return;
  // בקפיצה חדשה — שומרים את הדף הנוכחי בהיסטוריה כדי לאפשר חזרה
  if (!isBack) navHistory.push(activeTab);
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+tab).classList.add('on');
  // שמירת מצב ב-URL כדי שהטאב הנוכחי יישמר ברענון וניתן לקישור ישיר (סעיף 4.5)
  try { history.replaceState(null,'', '?tab='+tab); } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
  updateBackBtn();
  render();
  if (tab==='map') initMap();
}

function goBack() {
  if (!navHistory.length) return;
  const prev = navHistory.pop();
  goTab(prev, true);
}

function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  if (!btn) return;
  if (navHistory.length) {
    btn.style.display = '';
    const labels = {summary:'סיכומים',days:'לוח ימים',calendar:'לוח שנה',hotels:'מלונות',places:'אתרים',costs:'תקציב',flights:'טיסות',map:'מפה'};
    const prev = navHistory[navHistory.length-1];
    btn.querySelector('.back-lbl').textContent = labels[prev] || 'חזרה';
  } else {
    btn.style.display = 'none';
  }
}

// ══════════════════════════════════
// SORT
// ══════════════════════════════════
function sortBy(tab, key) {
  const cur = sortState[tab];
  // אם ממיינים לפי אותה עמודה — הופכים כיוון. אחרת מתחילים ב-עולה.
  if (cur && cur.key===key) {
    sortState[tab] = {key, dir: cur.dir==='asc' ? 'desc' : 'asc'};
  } else {
    sortState[tab] = {key, dir:'asc'};
  }
  render();
}

function getVal(obj, key) {
  return key.includes('.') ? key.split('.').reduce((o,k)=>o?.[k],obj) : obj[key];
}

function sorted(arr, tab) {
  const st = sortState[tab];
  if (!st) return arr;
  const {key, dir} = st;
  return [...arr].sort((a,b) => {
    let va = getVal(a,key), vb = getVal(b,key);
    if (va==null||va==='') va = dir==='asc' ? Infinity : -Infinity;
    if (vb==null||vb==='') vb = dir==='asc' ? Infinity : -Infinity;
    // מספרים (כולל מחרוזות מספריות כמו דירוג)
    const na = typeof va==='number' ? va : (String(va).trim()!=='' && !isNaN(va) ? parseFloat(va) : null);
    const nb = typeof vb==='number' ? vb : (String(vb).trim()!=='' && !isNaN(vb) ? parseFloat(vb) : null);
    if (na!=null && nb!=null) return dir==='asc' ? na-nb : nb-na;
    return dir==='asc' ? String(va).localeCompare(String(vb),'he') : String(vb).localeCompare(String(va),'he');
  });
}

function arrow(tab, key) {
  const st = sortState[tab];
  if (!st || st.key!==key) return '<span class="arrow" style="opacity:.25">↕</span>';
  return `<span class="arrow">${st.dir==='asc'?'▲':'▼'}</span>`;
}

  const regions = [
    {k:'',l:'הכל'},{k:'kansai',l:'קנסאי'},{k:'hokkaido',l:'הוקאידו'},{k:'tokyo',l:'טוקיו'},{k:'dubai',l:'דובאי'}

function filtered(arr) {
  if (!regionFilter) return arr;
  return arr.filter(x => x.region === regionFilter);
}

function dayCity(d){ if(d.city) return d.city; const h=hotelById(d.hotelId); return h?h.city:''; }

function bookingLink(h) {
  // חיפוש בבוקינג לפי שם+עיר, עם תאריכי צ׳ק-אין/אאוט ומספר חדרים
  const ss = encodeURIComponent(`${h.name} ${h.cityEn||h.city||''}`.trim());
  let url = `https://www.booking.com/searchresults.he.html?ss=${ss}`;
  if (h.checkin)  url += `&checkin=${h.checkin}`;
  if (h.checkout) url += `&checkout=${h.checkout}`;
  url += `&group_adults=2&no_rooms=${h.rooms||1}&group_children=0`;
  return url;
}

function mapsLink(h) {
  if (h.pid) return `https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(h.name)}&query_place_id=${h.pid}`;
  return `https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(h.addr||h.name)}`;
}

function th(tab, key, label) {
  return `<th onclick="sortBy('${tab}','${key}')">${arrow(tab,key)}${label}</th>`;
}

function ed(dataPath, value) {
  return `contenteditable="true" data-path="${dataPath}" onblur="editCell(this)"`;
}

// ══════════════════════════════════
// CALENDAR (יולי + אוגוסט)
// ══════════════════════════════════
function renderCalendar() {
  const DOW = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const regCls = {kansai:'cal-k',hokkaido:'cal-h',tokyo:'cal-t',dubai:'cal-d'};
  // מיפוי לפי מפתח YYYY-M-D
  const byDate = {};
  DATA.days.forEach(d => { byDate[`${d.month}-${d.day}`] = d; });

  // יום בשבוע 0=ראשon לפי התאריך (ללא תלות באזור זמן)
  function dow(y,m,day){ return new Date(Date.UTC(y,m-1,day)).getUTCDay(); }

  function buildMonth(year, month, title) {
    const daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
    const firstDow = dow(year, month, 1);
    let cells = '';
    for (let i=0;i<firstDow;i++) cells += `<div class="cal-cell empty"></div>`;
    for (let day=1; day<=daysInMonth; day++) {
      const d = byDate[`${month}-${day}`];
      if (!d) {
        cells += `<div class="cal-cell"><div class="cal-dnum">${day}</div></div>`;
      } else {
        const cls = regCls[d.region] || 'cal-d';
        cells += `<a class="cal-cell ${cls}" href="day.html?d=${d.tripDay}">
          <div class="cal-dnum">${day}<span class="cal-trip">י${d.tripDay}</span></div>
          <div class="cal-city">${dayCity(d)}</div>
          <div class="cal-hotel">${dayHotelName(d)}</div>
        </a>`;
      }
    }
    return `<div class="cal-month">
      <div class="cal-title">${title}</div>
      <div class="cal-grid">${DOW.map(x=>`<div class="cal-dow">${x}</div>`).join('')}${cells}</div>
    </div>`;
  }

  const legend = `<div class="cal-legend">
    <span><i style="background:var(--region-1)"></i>קנסאי</span>
    <span><i style="background:var(--region-2)"></i>הוקאידו</span>
    <span><i style="background:var(--region-3)"></i>טוקיו</span>
    <span><i style="background:var(--region-4)"></i>דובאי</span>
  </div>`;

  document.getElementById('calWrap').innerHTML =
    legend + buildMonth(2026,7,'יולי 2026') + buildMonth(2026,8,'אוגוסט 2026');
}

// דף תחבורה מרכזי
// ══════════════════════════════════
function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${+d}/${+m}`; }

// הפרש בדקות בין שתי שעות HH:MM
function minsBetween(a,b){ if(!a||!b) return null; const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number); return (bh*60+bm)-(ah*60+am); }

function renderTransport() {
  const F = DATA.flights || [];
  const T = DATA.transport || {};
  const flights = F.filter(f=>f.type&&f.type.includes('טיסה'));

  // ── כרטיסי טיסות ──
  const flightCards = flights.map(f=>{
    const hasTime = f.dep && f.arr;
    const dur = hasTime ? minsBetween(f.dep,f.arr) : null;
    return `<div class="tr-card">
      <div class="tr-card-head">
        ${icon('plane','tr-hic')}
        <div class="tr-route"><b>${f.from}</b> ${icon('arrow-l')} <b>${f.to}</b></div>
        <span class="tr-date">${fmtDate(f.date)}</span>
      </div>
      <div class="tr-grid">
        ${f.flightNo?`<div><span>טיסה</span>${f.flightNo}${f.airline?' · '+f.airline:''}</div>`:''}
        ${hasTime?`<div><span>יציאה → נחיתה</span>${f.dep} → ${f.arr}${dur?` (${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')} שע׳)`:''}</div>`:''}
        ${f.toTerminal?`<div><span>טרמינל יעד</span>${f.toTerminal}</div>`:''}
        ${f.arriveBefore?`<div><span>להגיע לשדה</span>${f.arriveBefore}</div>`:''}
        ${f.hotelToAirport?`<div><span>מהמלון לשדה</span>${f.hotelToAirport}</div>`:''}
        ${f.connection?`<div class="tr-full"><span>זמן מעבר</span>${f.connection}</div>`:''}
      </div>
      ${f.notes?`<div class="tr-note">${f.notes}</div>`:''}
      ${!hasTime?`<div class="tr-alert st-warn-txt">${icon('alert')} חסרים פרטי שעות — יש להשלים</div>`:''}
    </div>`;
  }).join('');

  // ── רכב שכור ──
  let carHtml = '';
  if (T.carRental && T.carRental.active) {
    const c = T.carRental;
    carHtml = `<div class="tr-card">
      <div class="tr-card-head">${icon('car','tr-hic')}<div class="tr-route"><b>רכב שכור — הוקאידו</b></div>
      <span class="tr-date">${fmtDate(c.from)} – ${fmtDate(c.to)}</span></div>
      <div class="tr-grid">
        <div><span>${icon('pin')} איסוף</span>${c.pickup.location} · ${fmtDate(c.pickup.date)}</div>
        <div><span>${icon('pin')} החזרה</span>${c.dropoff.location} · ${fmtDate(c.dropoff.date)}</div>
        <div class="tr-full"><span>אחרי הנחיתה (איסוף)</span>${c.pickup.process}</div>
        <div class="tr-full"><span>זמן החזרה מומלץ</span>${c.dropoff.recommendedReturn}</div>
      </div>
      ${c.oneWay?`<div class="tr-note">${icon('alert')} השכרה חד-כיוונית (${c.pickup.locationEn} → ${c.dropoff.locationEn}) — ודאי דמי one-way. ${c.note}</div>`:''}
    </div>`;
  }

  // ── שאטל נריטה ──
  let shuttleHtml = '';
  if (T.shuttle && T.shuttle.narita) {
    const s = T.shuttle.narita;
    shuttleHtml = `<div class="tr-card">
      <div class="tr-card-head">${icon('shuttle','tr-hic')}<div class="tr-route"><b>${s.name}</b></div>
      <span class="tr-date">${fmtDate(s.date)}</span></div>
      <div class="tr-badge-primary">${icon('check')} אמצעי ראשי מנריטה למלון</div>
      <div class="tr-grid">
        <div><span>יעד</span>${s.hotel}</div>
        <div><span>אחרי טיסה</span>${s.afterFlight}</div>
        <div class="tr-full"><span>נקודת איסוף</span>${s.pickupPoint}</div>
        <div class="tr-full"><span>זיהוי + הזמנה</span>${s.identify} · ${s.needsReservation}</div>
      </div>
      <div class="tr-note"><b>חלופות אם מפספסים:</b><ul>${s.alternatives.map(a=>`<li>${a}</li>`).join('')}</ul></div>
    </div>`;
  }

  // ── מקרא ──
  const legend = (T.legend||[]).map(l=>`<span><i style="background:${l.color}"></i>${l.he}</span>`).join('');

  // תצוגת רשימה — אותו מקור נתונים (סעיף 3.3), היררכיה קבועה: יעד → נתון → תאריך → משני
  const rows = [];
  flights.forEach(f=>rows.push({ic:'plane',main:`${f.from} → ${f.to}`,val:f.flightNo||'טיסה',date:fmtDate(f.date),sub:f.dep&&f.arr?`${f.dep}–${f.arr}${f.toTerminal?' · '+f.toTerminal:''}`:'פרטים להשלמה'}));
  if (T.carRental&&T.carRental.active){const c=T.carRental;rows.push({ic:'car',main:'רכב שכור — הוקאידו',val:'חד-כיווני',date:`${fmtDate(c.from)}–${fmtDate(c.to)}`,sub:`${c.pickup.location} → ${c.dropoff.location}`});}
  if (T.shuttle&&T.shuttle.narita){const s=T.shuttle.narita;rows.push({ic:'shuttle',main:s.name,val:'ראשי',date:fmtDate(s.date),sub:s.hotel});}
  const listHtml = rows.map(r=>`<div class="tr-row">
    <span class="trr-ic">${icon(r.ic)}</span>
    <span class="trr-main">${r.main}</span>
    <span class="trr-val">${r.val}</span>
    <span class="trr-date">${r.date}</span>
    <span class="trr-sub">${r.sub}</span>
  </div>`).join('');

  const cardsView = `
    <h3 class="tr-sec">✈️ טיסות</h3>
    <div class="tr-cards">${flightCards}</div>
    ${carHtml?`<h3 class="tr-sec">🚗 רכב שכור</h3><div class="tr-cards">${carHtml}</div>`:''}
    ${shuttleHtml?`<h3 class="tr-sec">🚐 שאטל</h3><div class="tr-cards">${shuttleHtml}</div>`:''}`;

  document.getElementById('transportWrap').innerHTML = `
    <div class="view-bar"><div class="tr-intro">כל התחבורה של הטיול במקום אחד — טיסות, רכב שכור, שאטלים.</div>${viewToggle()}</div>
    ${legend?`<div class="tr-legend">${legend}</div>`:''}
    ${viewMode==='cards' ? cardsView : `<div class="tr-list">${listHtml}</div>`}
  `;
}

// ══════════════════════════════════

function copyRef(ref, btn) {
  navigator.clipboard.writeText(ref).then(()=>{
    const t = btn.textContent; btn.textContent = 'הועתק ✓'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent = t; btn.classList.remove('ok'); }, 1500);
  }).catch(()=>toast('לא ניתן להעתיק'));
}

function statusBadge(st) {
  if (st === 'confirmed') return `<span class="bk-status bk-ok">מאושר</span>`;
  return `<span class="bk-status bk-pend">ממתין להזמנה</span>`;
}

// שורת מספר אישור + כפתור העתקה, או "חסר — יש להשלים"
function refRow(ref) {
  if (ref) return `<div class="bk-field"><span>מספר אישור</span><b class="bk-ref">${ref}</b> <button class="bk-copy" onclick="copyRef('${ref}',this)">העתק</button></div>`;
  return `<div class="bk-field bk-missing"><span>מספר אישור</span>חסר — יש להשלים</div>`;
}

function renderBookings() {
  const B = DATA.bookings;
  const el = document.getElementById('bookingsWrap');
  if (!B || !B.bookings) { el.innerHTML = '<div class="tr-intro">אין נתוני הזמנות.</div>'; return; }

  // התראות בראש המסך — מבנה חדש: {date, severity, text} ברמה העליונה
  const rawAlerts = B.alerts || B.summary?.alerts || [];
  const alerts = rawAlerts.map(a=>{
    if (typeof a === 'string') return `<li>${a}</li>`;
    const dt = a.date && a.date!=='general' ? `<b>${fmtDate(a.date)}:</b> ` : (a.date==='general'?'<b>כללי:</b> ':'');
    const cls = a.severity==='high' ? ' bk-alert-high' : '';
    return `<li class="${cls}">${dt}${a.text||''}</li>`;
  }).join('');
  const alertsHtml = alerts ? `<div class="bk-alerts"><h3>התראות חשובות</h3><ul>${alerts}</ul></div>` : '';

  // מיון לפי תאריך (מלון = checkin, טיסה = date, רכב = pickup.date)
  const dateOf = b => b.date || b.checkin || b.pickup?.date || '9999';
  const sorted = [...B.bookings].sort((a,b)=>dateOf(a).localeCompare(dateOf(b)));

  const cards = sorted.map(b => {
    let body = '';
    if (b.type === 'flight') {
      const legs = b.legs
        ? b.legs.map(l=>`<div class="bk-field"><span>${l.flight}</span>${l.from} → ${l.to} · ${l.departure}–${l.arrival}${l.seats?` · מושבים ${Object.values(l.seats).join(', ')}`:''}</div>`).join('')
        : `<div class="bk-field"><span>מסלול</span>${b.route?.from||''} → ${b.route?.to||''}</div>
           ${b.departure?`<div class="bk-field"><span>שעות</span>${b.departure} → ${b.arrival}${b.arrivalDate?' (למחרת)':''}</div>`:''}
           ${b.seats&&Object.values(b.seats).some(Boolean)?`<div class="bk-field"><span>מושבים</span>${Object.entries(b.seats).filter(([,v])=>v).map(([k,v])=>v).join(', ')}</div>`:''}`;
      body = `<div class="bk-field"><span>טיסה</span>${b.flightNumber||''} · ${b.provider||''}</div>${legs}${refRow(b.bookingRef)}`;
    } else if (b.type === 'hotel') {
      body = `<div class="bk-field"><span>תאריכים</span>${fmtDate(b.checkin)} → ${fmtDate(b.checkout)} · ${b.nights} לילות</div>
        ${b.rooms||b.roomType?`<div class="bk-field"><span>חדרים</span>${b.rooms?b.rooms+' × ':''}${b.roomType||''}</div>`:''}
        ${b.checkinTime||b.checkoutTime?`<div class="bk-field"><span>צ׳ק-אין / אאוט</span>${b.checkinTime||'—'} · יציאה ${b.checkoutTime||'—'}</div>`:''}
        ${b.meals?`<div class="bk-field"><span>ארוחות</span>${b.meals}</div>`:''}
        ${b.parking?`<div class="bk-field"><span>חניה</span>${b.parking}</div>`:''}
        ${refRow(b.bookingRef)}
        ${b.pin?`<div class="bk-field"><span>קוד כניסה</span><b class="bk-ref">${b.pin}</b> <button class="bk-copy" onclick="copyRef('${b.pin}',this)">העתק</button></div>`:''}`;
    } else if (b.type === 'car') {
      body = `<div class="bk-field"><span>ספק</span>${b.provider||''} · ${b.car||b.carModel||''}</div>
        <div class="bk-field"><span>איסוף</span>${fmtDate(b.pickup.date)} ${b.pickup.time} · ${b.pickup.location}</div>
        <div class="bk-field"><span>החזרה</span>${fmtDate(b.dropoff.date)} ${b.dropoff.time} · ${b.dropoff.location}</div>
        ${b.includes&&b.includes.length?`<div class="bk-field"><span>כולל</span>${b.includes.join(' · ')}</div>`:''}
        ${refRow(b.bookingRef)}
        ${b.warning?`<div class="bk-warn">${b.warning}</div>`:''}`;
    }
    const typeLabel = {flight:'טיסה', hotel:'מלון', car:'רכב שכור'}[b.type] || b.type;
    return `<div class="bk-card ${b.status==='pending'?'bk-card-pend':''}">
      <div class="bk-head">
        <span class="bk-date">${fmtDate(dateOf(b))}</span>
        <span class="bk-type">${typeLabel}</span>
        <span class="bk-name">${b.name || (b.route?`${b.route.fromCode} → ${b.route.toCode}`:'') || (b.type==='car'?'רכב שכור — הוקאידו':'')}</span>
        ${statusBadge(b.status)}
      </div>
      <div class="bk-body">${body}</div>
      ${b.notes?`<div class="bk-note">${b.notes}</div>`:''}
    </div>`;
  }).join('');

  // סיכום מחושב מהנתונים (מקור אמת יחיד)
  const conf = B.bookings.filter(b=>b.status==='confirmed').length;
  const pend = B.bookings.filter(b=>b.status==='pending').length;
  const summaryLine = `<div class="bk-summary">${conf} הזמנות מאושרות${pend?` · ${pend} ממתינות להזמנה`:''}</div>`;

  el.innerHTML = `${alertsHtml}
    <div class="tr-intro">כל ההזמנות של הטיול לפי ציר זמן.</div>
    ${summaryLine}
    <div class="bk-timeline">${cards}</div>`;
}

// EDIT CELL
// ══════════════════════════════════
function editCell(el) {
  const path = el.dataset.path;
  if (!path) return;
  const parts = path.split('.');
  const collection = parts[0];
  const id = +parts[1];
  const field = parts.slice(2).join('.');

  const arr = DATA[collection];
  if (!arr) return;
  const item = arr.find(x => x.id === id);
  if (!item) return;

  const keys = field.split('.');
  let obj = item;
  for (let i=0; i<keys.length-1; i++) {
    if (!obj[keys[i]]) obj[keys[i]] = {};
    obj = obj[keys[i]];
  }
  obj[keys[keys.length-1]] = el.textContent;
  toast('נשמר');
}

// ══════════════════════════════════
// MAP (Leaflet)
// ══════════════════════════════════
// ── דף מפה: 4 תצוגות על אותה מפה ──
let mapView = localStorage.getItem('mapView') || 'days';
let mapLayer = null, specLayer = null, mapSpecObj = null;
let mapPlaceTypes = new Set();    // סינון סוגי אתרים (מקרא-סינון)
const MODE_COLOR_M = {train:'#1d4ed8', metro:'#2563eb', shinkansen:'#1e3a8a', walk:'#15803d', bus:'#b45309', car:'#6b7280', flight:'#b91c1c', taxi:'#7c3aed', shuttle:'#0891b2'};
const MODE_HE_M = {walk:'הליכה', metro:'מטרו', train:'רכבת', bus:'אוטובוס', car:'רכב', taxi:'מונית', shuttle:'שאטל', flight:'טיסה', shinkansen:'שינקנסן'};
const bilingual = (he, en) => `<b style="font-size:13px">${he||en||''}</b>${en&&en!==he?`<br><span style="font-size:11px;color:#666;direction:ltr">${en}</span>`:''}`;
// רקע נקי (CARTO light) + שכבת תוויות באנגלית (Esri) — שמות מקומות באנגלית בלבד, לא יפנית
function tile(m){
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/light_nolabels/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:20}).addTo(m);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{attribution:'Labels © Esri',maxZoom:20,pane:'overlayPane'}).addTo(m);
  return m;
}

function initMap() {
  if (mapObj) { setTimeout(()=>{mapObj.invalidateSize(); mapSpecObj&&mapSpecObj.invalidateSize(); renderMapLayer();},80); return; }
  setTimeout(() => {
    mapObj = L.map('map').setView([37,138],5); tile(mapObj);
    mapSpecObj = L.map('mapSpec').setView([35,137],5); tile(mapSpecObj);
    document.querySelectorAll('.mvb').forEach(b=>b.classList.toggle('on', b.dataset.view===mapView));
    buildDaySelector();
    renderMapLayer();
  }, 100);
}

function setMapView(v) {
  mapView = v;
  localStorage.setItem('mapView', v);
  document.querySelectorAll('.mvb').forEach(b=>b.classList.toggle('on', b.dataset.view===v));
  document.getElementById('mapDaySel').style.display = v==='days' ? '' : 'none';
  document.getElementById('mapPlaceFilters').style.display = 'none';
  renderMapLayer();
}

function resetMapFilters() {
  mapPlaceTypes.clear();
  document.getElementById('mapDaySel').value = 'all';
  renderMapLayer();
}
function buildDaySelector() {
  const sel = document.getElementById('mapDaySel');
  const opts = ['<option value="all">כל הימים</option>'];
  DATA.days.filter(hasGeo).forEach(d=>opts.push(`<option value="${d.id}">יום ${d.tripDay} — ${d.day}/${d.month} ${dayCity(d)}</option>`));
  sel.innerHTML = opts.join('');
}
function hasGeo(d){ return (d.transport?.segments||[]).length>0; }

// סימן גדול נושא-מידע (מספר/תאריך/סמל בתוכו)
function bigMarker(latlng, opts) {
  const { text='', color='#1d4ed8', shape='circle', size=32, popup='', aria='', onClick, fontSize=13 } = opts;
  const radius = shape==='circle' ? '50%' : '5px';
  const html = `<div style="width:${size}px;height:${size}px;border-radius:${radius};background:${color};color:#fff;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font:900 ${fontSize}px/1 'Noto Sans Hebrew',sans-serif;opacity:.9;text-align:center" role="button" aria-label="${aria}" tabindex="0">${text}</div>`;
  const mk = L.marker(latlng, {icon:L.divIcon({className:'',html,iconSize:[size,size],iconAnchor:[size/2,size/2]}), keyboard:true});
  if (popup) mk.bindPopup(popup);
  if (onClick) mk.on('click', onClick);
  return mk;
}

// ציור שתי המפות לפי התצוגה
function renderMapLayer() {
  if (!mapObj) return;
  if (mapLayer) mapObj.removeLayer(mapLayer);
  if (specLayer) mapSpecObj.removeLayer(specLayer);
  mapLayer = L.layerGroup().addTo(mapObj);
  specLayer = L.layerGroup().addTo(mapSpecObj);
  const legend = [];

  if (mapView==='days') renderMapDays(legend);
  else if (mapView==='nights') renderMapNights(legend);
  else if (mapView==='transport') renderMapTransport(legend);
  else if (mapView==='places') renderMapPlaces(legend);

  renderMapLegend(legend);
  renderDiversity();
  renderGaps();
  setTimeout(()=>{ mapObj.invalidateSize(); mapSpecObj.invalidateSize(); },60);
}

// מקרא — פעיל כמסנן בתצוגת אתרים, אינפורמטיבי בשאר (סעיף 7,8)
function renderMapLegend(legend) {
  const box = document.getElementById('mapLegendBox');
  if (mapView==='places') {
    const allOn = mapPlaceTypes.size===0;
    box.innerHTML = `<button class="leg-all${allOn?' on':''}" onclick="showAllTypes()">הצג הכול</button>` +
      legend.map(l=>`<button class="leg-item filterable${mapPlaceTypes.has(l.key)?' on':''}" onclick="togglePlaceType('${l.key}')" aria-pressed="${mapPlaceTypes.has(l.key)}">
        <i class="${l.shape||'circle'}" style="background:${l.color}"></i>${l.label}</button>`).join('') +
      (mapPlaceTypes.size?`<button class="leg-all" onclick="showAllTypes()">איפוס</button>`:'');
  } else {
    box.innerHTML = legend.map(l=>`<span class="leg-item"><i class="${l.shape||'circle'}" style="background:${l.color}"></i>${l.label}</span>`).join('');
  }
}
function togglePlaceType(t){ mapPlaceTypes.has(t)?mapPlaceTypes.delete(t):mapPlaceTypes.add(t); renderMapLayer(); }
function showAllTypes(){ mapPlaceTypes.clear(); renderMapLayer(); }

// מיקוד המפה הספציפית לפי בחירה במפה הגלובלית
function focusSpec(pts, title) {
  document.getElementById('mapSpecTitle').textContent = title || 'מפה ספציפית';
  if (specLayer) mapSpecObj.removeLayer(specLayer);
  specLayer = L.layerGroup().addTo(mapSpecObj);
  return specLayer;
}

// ── תצוגה 1: ימים — מספר היום בתוך הסימן (גלובלי), תחנות ממוספרות (ספציפי) ──
function renderMapDays(legend) {
  const sel = document.getElementById('mapDaySel').value || 'all';
  const days = sel==='all' ? DATA.days.filter(hasGeo) : DATA.days.filter(d=>String(d.id)===sel);
  const allPts=[];
  // מפה גלובלית: סימן לכל יום עם מספר היום בטיול (סעיף 2.3, 4.2)
  DATA.days.filter(hasGeo).forEach(d=>{
    const first = d.transport.segments[0].from;
    const popup = `${bilingual('יום '+d.tripDay,dayCity(d))}<br><span style="font-size:11px">${d.day}/${d.month} · ${d.regionHe||''}</span><br><a href="day.html?d=${d.tripDay}" style="font-size:11px;color:#1d4ed8">לדף היום ›</a>`;
    bigMarker([first.lat,first.lng], {text:String(d.tripDay), color:'#1d4ed8', size:34, popup, aria:`יום ${d.tripDay} — ${dayCity(d)}`,
      onClick:()=>showDaySpecific(d)}).addTo(mapLayer);
    allPts.push([first.lat,first.lng]);
  });
  if(allPts.length) mapObj.fitBounds(L.latLngBounds(allPts).pad(0.12));
  legend.push({label:'מספר יום בטיול', color:'#1d4ed8'});
  // מפה ספציפית: היום הנבחר (או הראשון)
  showDaySpecific(days[0]);
}

// מפה ספציפית לתצוגת ימים — תחנות היום ממוספרות + קו מסלול אמיתי
function showDaySpecific(d) {
  if(!d) return;
  const layer = focusSpec(null, `יום ${d.tripDay} — ${d.day}/${d.month} ${dayCity(d)}`);
  const pts=[];
  d.transport.segments.forEach((seg,i)=>{
    const color=MODE_COLOR_M[seg.mode]||'#1d4ed8';
    L.polyline([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]],{color,weight:3.5,opacity:.7,dashArray:seg.mode==='walk'?'4,6':null}).addTo(layer)
      .bindPopup(`<b>${MODE_HE_M[seg.mode]||seg.mode}</b><br>${seg.from.name} → ${seg.to.name}`);
    if(i===0) bigMarker([seg.from.lat,seg.from.lng],{text:'א',color:'#1a1a1a',size:30,popup:bilingual(seg.from.name,seg.from.nameEn),aria:seg.from.name}).addTo(layer);
    const last=i===d.transport.segments.length-1;
    bigMarker([seg.to.lat,seg.to.lng],{text:last?'ס':String(i+1),color:'#1d4ed8',size:30,popup:`${bilingual(seg.to.name,seg.to.nameEn)}${seg.arrivalTime?'<br><span style=\"font-size:11px\">'+seg.arrivalTime+'</span>':''}`,aria:seg.to.name}).addTo(layer);
    pts.push([seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]);
  });
  if(pts.length) mapSpecObj.fitBounds(L.latLngBounds(pts).pad(0.15));
}

// ── תצוגה 2: לילות — טווח תאריכים בתוך הסימן ──
function renderMapNights(legend) {
  const pts=[];
  DATA.hotels.forEach(h=>{
    if(!h.lat||!h.lng) return;
    const color = h.booked ? '#15803d' : '#b45309';
    const range = `${(h.checkin||'').slice(5).replace('-','/')}–${(h.checkout||'').slice(5).replace('-','/')}`;
    const popup = `${bilingual(h.he,h.name)}<br><span style="font-size:11px">${h.checkin} — ${h.checkout} · ${h.nights||''} לילות</span><br><a href="index.html?tab=hotels" style="font-size:11px;color:#1d4ed8">פרטי מלון ›</a>${h.pid||h.addr?` · <a href="${mapsLink(h)}" target="_blank" style="font-size:11px;color:#1d4ed8">ניווט</a>`:''}`;
    // סימן גדול עם טווח תאריכים בתוכו (סעיף 4.3)
    bigMarker([h.lat,h.lng],{text:range,color,shape:'square',size:52,fontSize:10,popup,aria:`${h.name} · ${range}`, onClick:()=>showHotelSpecific(h)}).addTo(mapLayer);
    pts.push([h.lat,h.lng]);
  });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts).pad(0.12));
  legend.push({label:'מלון מוזמן', color:'#15803d', shape:'square'}, {label:'טרם הוזמן', color:'#b45309', shape:'square'});
  showHotelSpecific(DATA.hotels.find(h=>h.lat));
}
function showHotelSpecific(h) {
  if(!h||!h.lat) return;
  const layer = focusSpec(null, `${h.he||h.name} · ${(h.checkin||'').slice(5)}–${(h.checkout||'').slice(5)}`);
  const color = h.booked?'#15803d':'#b45309';
  bigMarker([h.lat,h.lng],{text:'',color,shape:'square',size:26,popup:bilingual(h.he,h.name),aria:h.name}).addTo(layer);
  mapSpecObj.setView([h.lat,h.lng],13);
}

// ── תצוגה 3: תחבורה — סמל אמצעי + קווים צבועים ──
function renderMapTransport(legend) {
  const usedModes=new Set(); const pts=[];
  DATA.days.filter(hasGeo).forEach(d=>{
    d.transport.segments.forEach(seg=>{
      const color=MODE_COLOR_M[seg.mode]||'#888'; usedModes.add(seg.mode);
      const popup=`<b>${MODE_HE_M[seg.mode]||seg.mode}</b>${seg.totalMinutes?` · ${seg.totalMinutes} דק׳`:''}${seg.distanceKm?` · ${seg.distanceKm} ק״מ`:''}<br>${seg.from.name} → ${seg.to.name}<br><a href="${seg.mapsUrl}" target="_blank" style="font-size:11px;color:#1d4ed8">ניווט ›</a>`;
      const pl=L.polyline([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]],{color,weight:4,opacity:.7,dashArray:seg.mode==='walk'?'4,6':null}).addTo(mapLayer).bindPopup(popup);
      pl.on('click',()=>showSegSpecific(seg));
      pts.push([seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]);
    });
  });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts).pad(0.12));
  [...usedModes].forEach(m=>legend.push({label:MODE_HE_M[m]||m, color:MODE_COLOR_M[m]||'#888', shape:'line'}));
  focusSpec(null,'לחץ מקטע להצגה מפורטת');
}
function showSegSpecific(seg){
  const layer=focusSpec(null,`${MODE_HE_M[seg.mode]||seg.mode}: ${seg.from.name} → ${seg.to.name}`);
  const color=MODE_COLOR_M[seg.mode]||'#888';
  L.polyline([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]],{color,weight:5,opacity:.85,dashArray:seg.mode==='walk'?'4,6':null}).addTo(layer);
  bigMarker([seg.from.lat,seg.from.lng],{text:'',color:'#1a1a1a',size:22,aria:seg.from.name}).addTo(layer);
  bigMarker([seg.to.lat,seg.to.lng],{text:'',color,size:22,aria:seg.to.name}).addTo(layer);
  mapSpecObj.fitBounds(L.latLngBounds([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]]).pad(0.4));
}

// ── תצוגה 4: אתרים — סימן מינימלי, מקרא=סינון לפי סוג ──
// צבע קבוע לכל קטגוריה ראשית (סעיף 12.5)
const CAT_COLOR = {
  'טבע':'#15803d','היסטוריה':'#92400e','אדריכלות':'#57534e','תרבות ואמנות':'#7c3aed',
  'פעילות ספורטיבית':'#0891b2','סדנה והתנסות':'#b45309','קניות':'#db2777','אוכל':'#dc2626',
  'אתר דתי או רוחני':'#1e40af','טכנולוגיה ועתיד':'#0d9488','מלון ולינה':'#166534','תחנת מעבר':'#6b7280'
};
function placeCats(p){ return Array.isArray(p.category)?p.category:(p.category?[p.category]:[p.type||'אחר']); }

function renderMapPlaces(legend) {
  // ספירה לכל קטגוריה
  const catCount = {};
  DATA.places.forEach(p=>placeCats(p).forEach(c=>catCount[c]=(catCount[c]||0)+1));
  const cats = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a]);

  const active = mapPlaceTypes.size
    ? DATA.places.filter(p=>placeCats(p).some(c=>mapPlaceTypes.has(c)))
    : DATA.places;
  const pts=[];
  active.forEach(p=>{
    if(!p.lat||!p.lng) return;
    const cat = placeCats(p)[0];
    const color = CAT_COLOR[cat]||'#3b82f6';
    const day = DATA.days.find(d=>d.id===p.dayId);
    const thumb = p.image?`<img src="${p.image}" style="width:100%;max-width:180px;border-radius:6px;margin-bottom:4px" alt="${p.name}">`:'';
    const popup=`${thumb}${bilingual(p.name,p.nameEn)}<br><span style="font-size:11px">${placeCats(p).join(' · ')}${p.dayId?` · יום ${p.dayId}`:''}${p.timeOfDay?` · ${p.timeOfDay}`:''}${p.duration?` · ${p.duration}`:''}</span><br><a href="index.html?tab=places" style="font-size:11px;color:#1d4ed8">מידע מלא ›</a>${p.pid||p.addr?` · <a href="https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(p.nameEn||p.name)}" target="_blank" style="font-size:11px;color:#1d4ed8">מפה</a>`:''}`;
    bigMarker([p.lat,p.lng],{text:'',color,shape:'square',size:22,popup,aria:`${p.name} — ${cat}`, onClick:()=>showPlaceSpecific(p)}).addTo(mapLayer);
    pts.push([p.lat,p.lng]);
  });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts).pad(0.15));
  // מקרא-סינון: קטגוריה + ספירה (סעיף 12.4)
  cats.forEach(c=>legend.push({key:c, label:`${c} (${catCount[c]})`, color:CAT_COLOR[c]||'#3b82f6', shape:'square'}));
  focusSpec(null,'לחץ אתר להצגה מפורטת');
}
function showPlaceSpecific(p){
  const layer=focusSpec(null,`${p.name}${p.nameEn?' · '+p.nameEn:''}`);
  const color=CAT_COLOR[placeCats(p)[0]]||'#3b82f6';
  bigMarker([p.lat,p.lng],{text:'',color,shape:'square',size:24,popup:bilingual(p.name,p.nameEn),aria:p.name}).addTo(layer);
  mapSpecObj.setView([p.lat,p.lng],14);
}

// ── סיכום מגוון + ניתוח חוסרים (סעיף 8, 11) ──
const ESSENTIAL_CATS = ['היסטוריה','טבע','פעילות ספורטיבית','סדנה והתנסות','תרבות ואמנות','אדריכלות','קניות','אוכל'];
function renderDiversity() {
  const box = document.getElementById('mapDiversity');
  if (mapView!=='places') { box.innerHTML=''; return; }
  const catCount={};
  DATA.places.forEach(p=>placeCats(p).forEach(c=>catCount[c]=(catCount[c]||0)+1));
  const missing = ESSENTIAL_CATS.filter(c=>!catCount[c]);
  const chips = Object.entries(catCount).sort((a,b)=>b[1]-a[1])
    .map(([c,n])=>`<span class="mx-chip" style="border-right:3px solid ${CAT_COLOR[c]||'#888'}">${c}: <b>${n}</b></span>`).join('');
  const warn = missing.length
    ? `<div class="mx-warn">חסרות קטגוריות מהותיות: <b>${missing.join(', ')}</b> — כדאי לבדוק אם להוסיף למסלול (לא נוסף אוטומטית).</div>`
    : `<div class="mx-ok">כל הקטגוריות המהותיות מיוצגות במסלול ✓</div>`;
  box.innerHTML = `<div class="mx-box"><h4>מגוון האתרים</h4><div class="mx-chips">${chips}</div>${warn}</div>`;
}

// רשימת חוסרים + כפתור פרומפט (סעיף 8, 9)
function analyzeGaps() {
  const gaps = [];
  DATA.places.forEach(p=>{
    const missing = [];
    if(!p.nameEn) missing.push('שם באנגלית');
    if(!p.category||!placeCats(p).length) missing.push('קטגוריה');
    if(!p.dayId) missing.push('יום');
    if(!p.timeOfDay) missing.push('שעה');
    if(!p.duration) missing.push('משך ביקור');
    if(!p.lat||!p.lng) missing.push('מיקום');
    if(!p.image) missing.push('תמונה');
    if(!p.officialUrl) missing.push('אתר רשמי');
    if(missing.length) gaps.push({name:p.name, nameEn:p.nameEn||'', dayId:p.dayId, missing, existing:{type:p.type,city:p.city,category:placeCats(p).join('/')}});
  });
  return gaps;
}
function renderGaps() {
  const box = document.getElementById('mapGaps');
  if (mapView!=='places') { box.innerHTML=''; return; }
  const gaps = analyzeGaps();
  if(!gaps.length){ box.innerHTML=`<div class="mx-box mx-ok">אין מידע חסר — כל האתרים מלאים ✓</div>`; return; }
  const rows = gaps.map(g=>`<li><b>${g.name}</b>${g.nameEn?` <span style="color:#888;direction:ltr">${g.nameEn}</span>`:''} — חסר: ${g.missing.join(', ')}</li>`).join('');
  box.innerHTML = `<div class="mx-box">
    <div class="mx-gaps-head"><h4>מידע להשלמה (${gaps.length} אתרים)</h4>
      <button class="mvb-reset" onclick="copyMissingPrompt()" data-tip="יצירת פרומפט מוכן להעתקה לקלוד">צור פרומפט להשלמת מידע</button></div>
    <ul class="mx-gaps-list">${rows}</ul>
  </div>`;
}
function genMissingPrompt() {
  const gaps = analyzeGaps();
  let p = `השלם את המידע החסר עבור האתרים הבאים באפליקציית יפן. שמור על המסלול, התאריכים, המלונות, הטיסות והרכב שכבר נקבעו. עבור כל פריט השלם רק את השדות החסרים. השתמש במקורות אמינים ועדכניים, ציין מקור לכל נתון, ואל תמציא מידע שאינו ניתן לאימות.\n\n`;
  gaps.forEach((g,i)=>{
    p += `${i+1}. ${g.name}${g.nameEn?` (${g.nameEn})`:''}\n   קיים: ${g.existing.category}${g.existing.city?' · '+g.existing.city:''}${g.dayId?' · יום '+g.dayId:''}\n   חסר: ${g.missing.join(', ')}\n\n`;
  });
  return p;
}
function copyMissingPrompt() {
  navigator.clipboard.writeText(genMissingPrompt()).then(()=>toast('הפרומפט הועתק — הדביקי בצ׳אט חדש')).catch(()=>toast('לא ניתן להעתיק'));
}

// ══════════════════════════════════
// SAVE / EXPORT
// ══════════════════════════════════
async function saveAll() {
  // Download each JSON file
  for (const [name, data] of Object.entries(DATA)) {
    downloadJSON(data, name+'.json');
  }
  toast('כל הקבצים נשמרו');
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportJSON() {
  downloadJSON(DATA, 'japan-trip-all.json');
  toast('JSON מלא יוצא');
}

function copyTable() {
  const table = document.querySelector('.panel.on table');
  if (!table) return;
  const rows = [];
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [];
    tr.querySelectorAll('th, td').forEach(td => cells.push(td.textContent.trim()));
    rows.push(cells.join('\t'));
  });
  navigator.clipboard.writeText(rows.join('\n')).then(()=>toast('הועתק לאקסל'));
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}
