<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יפן 2026 — מסלול טיול</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;600;700;900&display=swap');

/* ══════════════════════════════════════════════
   מערכת עיצוב מרכזית — צבעים, מצבים, אזורים
   כל צבע כאן = משמעות קבועה. אין צבע דקורטיבי.
   ══════════════════════════════════════════════ */
:root{
  /* רקעים ניטרליים */
  --bg:#f4f4f2; --surface:#ffffff; --border:#e3e1dc; --border-strong:#c9c6bf;
  /* טקסט */
  --ink:#1c1c1a; --ink-2:#57534e; --ink-3:#8a857e;
  /* מותג / פעולה ראשית (ניווט, קישורים, פעיל) */
  --brand:#1c1c1a; --brand-ink:#f5f4f0;
  --action:#1d4ed8;                 /* קישור / פעולה */
  --focus:#b8860b;                  /* פוקוס / בחירה / הדגשה פעילה */
  /* מצבים סמנטיים — צבע יחיד לכל מצב */
  --ok:#15803d;  --ok-bg:#e7f3ec;   /* הצלחה / הושלם / מוזמן */
  --warn:#b45309; --warn-bg:#fbf1e3;/* אזהרה / חסר / טרם הוזמן */
  --err:#b91c1c; --err-bg:#f9e9e9;  /* שגיאה / חריגה */
  /* אזורים גאוגרפיים — סקאלת כחול אחת (בהיר→חזק) */
  --region-1:#dbeafe; --region-1-ink:#1e40af;  /* קנסאי — בהיר */
  --region-2:#93c5fd; --region-2-ink:#1e3a8a;  /* הוקאידו — בינוני */
  --region-3:#3b82f6; --region-3-ink:#ffffff;  /* טוקיו — חזק */
  --region-4:#e7e5e4; --region-4-ink:#44403c;  /* דובאי/אחר — ניטרלי */
  /* אייקונים — אפור בהיר אחיד */
  --icon:#9a958e; --icon-active:#57534e;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Hebrew',sans-serif;background:var(--bg);color:var(--ink);font-size:13px;line-height:1.5}

/* אייקוני קו אחידים (SVG) — גודל, עובי-קו וצבע זהים בכל האפליקציה */
.ic{width:16px;height:16px;flex:none;stroke:var(--icon);stroke-width:1.75;fill:none;stroke-linecap:round;stroke-linejoin:round;vertical-align:middle}
.ic-lg{width:22px;height:22px}

/* Tooltip אחיד — כל אלמנט עם data-tip. מסביר את יעד הפעולה, לא רק את השם. */
[data-tip]{position:relative}
[data-tip]:hover::after,[data-tip]:focus-visible::after{
  content:attr(data-tip);position:absolute;bottom:calc(100% + 7px);right:50%;transform:translateX(50%);
  background:#1c1c1a;color:#f5f4f0;font:600 11px/1.4 'Noto Sans Hebrew',sans-serif;white-space:nowrap;
  padding:5px 9px;border-radius:6px;box-shadow:0 4px 14px rgba(0,0,0,.28);z-index:200;pointer-events:none;
  max-width:240px;white-space:normal;width:max-content;text-align:center}
[data-tip]:hover::before,[data-tip]:focus-visible::before{
  content:'';position:absolute;bottom:calc(100% + 2px);right:50%;transform:translateX(50%);
  border:5px solid transparent;border-top-color:#1c1c1a;z-index:200;pointer-events:none}

/* NAV — סרגל ניווט ראשי קבוע בראש המסך */
.nav{background:#1a1a1a;padding:8px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50;box-shadow:0 1px 0 rgba(255,255,255,.06)}
.nav h1{color:#e8e6e1;font-size:16px;font-weight:900;order:1}
.nav .tabs{order:2;flex:1;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.nav .actions{order:3;display:flex;gap:6px;flex-wrap:wrap}
.tab{position:relative;padding:5px 14px;border:none;border-radius:4px;background:transparent;color:#aaa;font:600 12px/1.4 inherit;cursor:pointer;transition:.12s}
.tab:hover{color:#fff;background:rgba(255,255,255,.1)}
/* דף פעיל — הדגשה ברורה: רקע + פס תחתון (לא רק צבע) */
.tab.on{color:#fff;background:rgba(255,255,255,.15);font-weight:800}
.tab.on::after{content:'';position:absolute;left:14px;right:14px;bottom:-8px;height:2px;background:var(--focus)}
.tab:focus-visible{outline:2px solid var(--focus);outline-offset:1px}
@media(max-width:900px){.nav .tabs{justify-content:flex-start;order:3;flex-basis:100%}.nav h1{order:1}.nav .actions{order:2;margin-right:auto}}
.nav-btn{padding:4px 10px;border:1px solid #555;border-radius:4px;background:transparent;color:#aaa;font:600 11px/1.4 inherit;cursor:pointer;transition:.12s}
.nav-btn:hover{background:rgba(255,255,255,.1);color:#fff;border-color:#888}
.nav-btn.save{border-color:#166534;color:#4ade80}.nav-btn.save:hover{background:#166534;color:#fff}
.nav-btn.vs-btn{display:inline-flex;align-items:center;gap:4px;border-color:#3b5bb5;color:#93b4ff;text-decoration:none}
.nav-btn.vs-btn:hover{background:rgba(29,78,216,.18);color:#fff;border-color:#1d4ed8}
.back-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border:1px solid #4b4b4b;border-radius:6px;background:rgba(255,255,255,.06);color:#e8e6e1;font:800 12px/1.4 inherit;cursor:pointer;transition:.12s;white-space:nowrap}
.back-btn .ic{width:14px;height:14px}
.back-btn:hover{background:rgba(255,255,255,.14);border-color:#777}
.back-btn:active{transform:scale(.96)}
.back-btn:focus-visible{outline:2px solid var(--focus);outline-offset:1px}

/* HERO */
.hero{max-width:1200px;margin:12px auto 8px;padding:0 12px}
.hero-card{background:linear-gradient(135deg,#fff8eb 0%,#ffffff 100%);border:1px solid #e7dccf;border-radius:14px;padding:14px 16px;box-shadow:0 8px 24px rgba(0,0,0,.05);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hero-card h2{font-size:20px;font-weight:900;color:#1f2937;margin-bottom:4px}
.hero-card p{font-size:12px;color:#6b7280;margin:0}
.hero-eyebrow{display:inline-block;padding:3px 8px;border-radius:999px;background:#1f2937;color:#f8fafc;font-size:10px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.hero-pills{display:flex;gap:8px;flex-wrap:wrap}
.hero-pill{padding:6px 10px;border-radius:999px;background:#f3f4f6;color:#374151;font-size:11px;font-weight:700;border:1px solid #e5e7eb}

/* STATS */
.stats{max-width:1200px;margin:8px auto 6px;padding:0 12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:8px}
.stat-card{background:#fff;border:1px solid #e5e3de;border-radius:10px;padding:10px 12px;box-shadow:0 4px 12px rgba(0,0,0,.04)}
.stat-label{font-size:10px;color:#888;font-weight:700;letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.stat-value{font-size:16px;font-weight:900;color:#111827}
.stat-detail{font-size:11px;color:#6b7280;margin-top:2px}

/* FILTERS */
/* סרגל ניווט משני — מסננים של הדף הנוכחי. ממורכז. מוסתר כשאין. */
.filters{position:sticky;top:41px;z-index:40;background:transparent;border:none;margin:0 0 10px;padding:0}
.filters:empty{display:none}
/* כפתורי הסינון ממורכזים, ללא מסגרת/רקע לסרגל */
.filters-inner{margin:0 auto;padding:8px 12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;justify-content:center}
.filters-inner.filters-inner-wide{max-width:100%;padding:8px 8px;justify-content:center}
.filters-inner::before{content:'סינון:';font-size:11px;font-weight:800;color:var(--ink-3);margin-left:2px}
.flt{padding:3px 10px;border:1px solid #ddd;border-radius:3px;background:#fff;font:600 11px/1.4 inherit;cursor:pointer;color:#666;transition:.12s}
.flt:hover{border-color:#999}.flt.on{background:#1a1a1a;color:#fff;border-color:#1a1a1a}

/* TABLE */
.tw{max-width:1200px;margin:0 auto;padding:0 12px;overflow-x:auto}
/* לוח ימים — טבלה רחבה שמתפרסת על כל רוחב המסך כדי להציג את כל העמודות בבת אחת */
.tw.days-wide{max-width:100%;padding:0 8px;overflow-x:auto}
#t-days{table-layout:fixed;width:100%}
#t-days th,#t-days td{padding:5px 6px;font-size:11px;overflow:hidden;text-overflow:ellipsis}
#t-days .slot-cell{min-width:0}
#t-days .slot-spot{white-space:normal}
/* מסגור/רקע שונה לכל חלק ביום — בוקר / צהריים / ערב — נבדל ויזואלית */
#t-days td.slot-morning{box-shadow:inset 3px 0 0 #f6c453}    /* בוקר — שחר, ענבר */
#t-days td.slot-afternoon{box-shadow:inset 3px 0 0 #38bdf8}  /* צהריים — יום, תכלת */
#t-days td.slot-evening{box-shadow:inset 3px 0 0 #7c6df2}    /* ערב — דמדומים, סגול */
#t-days th.slot-morning-h{border-top:3px solid #f6c453}
#t-days th.slot-afternoon-h{border-top:3px solid #38bdf8}
#t-days th.slot-evening-h{border-top:3px solid #7c6df2}
/* רוחב עמודות: קבועות צרות מימין, ובוקר/צהריים/ערב/הערות מקבלים את שאר הרוחב */
#t-days col.c-page{width:5.5%}
#t-days col.c-day{width:4.5%}
#t-days col.c-date{width:6%}
#t-days col.c-weekday{width:5.5%}
#t-days col.c-region{width:5%}
#t-days col.c-hotel{width:12.5%}
#t-days col.c-city{width:5%}
#t-days col.c-slot{width:11.5%}
#t-days col.c-transport{width:7%}
#t-days col.c-notes{width:9.5%}
/* עמודת מלון — תמונה ברוחב מלא של השורה/עמודה, שם המלון מתחת */
#t-days .hotel-cell-day{text-align:center}
#t-days .hotel-cell-day .hotel-thumb-mini{width:100%;height:auto;aspect-ratio:16/10;object-fit:cover;border-radius:6px;display:block;margin-bottom:4px}
#t-days .hotel-cell-day .hotel-link,#t-days .hotel-cell-day a{display:block;text-align:center}
/* עמודת מספר היום — מספר בולט וברור, לא נחתך */
#t-days td:nth-child(2){text-align:center;overflow:visible}
#t-days td:nth-child(2) a{font-size:15px}
#t-days th:nth-child(2){overflow:visible;text-align:center}
/* עמודת 'דף היום' — לא נחתכת, כפתור שלם */
#t-days .c-page-cell{overflow:visible}
#t-days .c-page-cell .act{white-space:nowrap;padding:4px 8px}
/* תאריך מובלט בגדול */
#t-days .day-date{font-size:16px;font-weight:900;color:#1d4ed8;text-decoration:none;white-space:nowrap}
#t-days .day-date:hover{text-decoration:underline}
/* רקע שורה לפי אזור הטיול — מסייע להבין את החלוקה לפי צבע (קנסאי/הוקאידו/טוקיו/דובאי) */
#t-days tr.reg-k td{background:rgba(219,234,254,.55)}   /* קנסאי — כחול בהיר */
#t-days tr.reg-h td{background:rgba(147,197,253,.40)}   /* הוקאידו — כחול בינוני */
#t-days tr.reg-t td{background:rgba(59,130,246,.20)}    /* טוקיו — כחול חזק */
#t-days tr.reg-d td{background:rgba(231,229,228,.60)}   /* דובאי/אחר — ניטרלי */
#t-days tr.reg-k:hover td,#t-days tr.reg-h:hover td,#t-days tr.reg-t:hover td,#t-days tr.reg-d:hover td{filter:brightness(.97)}
/* יום עם מלון לא מוזמן — עדיין מסומן בענבר גובר על צבע האזור */
#t-days tr.miss td{background:#fffef5}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:6px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
th{background:#2c2c2c;color:#e8e6e1;font-weight:600;font-size:11px;padding:7px 8px;text-align:right;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{background:#3a3a3a}
th .arrow{font-size:9px;margin-right:3px;opacity:.5}
td{padding:6px 8px;border-bottom:1px solid #eee;font-size:12px;vertical-align:top}
/* עמודות בוקר/צהריים/ערב — שם אתר עברי + לועזי באותה שורה, פונט קטן; אתר בכל שורה עם הפרדה */
.slot-cell{min-width:120px}
.slot-spot{line-height:1.25;font-size:10.5px;padding:2px 0;border-bottom:1px solid #eee;text-align:right}
.slot-spot:last-child{border-bottom:none}
.slot-spot b{font-weight:700;color:#1c1c1a;display:block}
/* הלועזי בשורה נפרדת מתחת, מיושר לימין (סוף המילה הלועזית מתחת לתחילת העברית) — מצמצם רוחב */
.slot-en{display:block;font-size:9px;color:#8a857e;direction:ltr;text-align:right}
tr:hover{background:#fafaf8}
tr.miss{background:#fffef5}
tr.miss td{color:#92400e}

/* EDITABLE */
td[contenteditable]{outline:none;border-radius:2px;transition:background .12s}
td[contenteditable]:hover{background:#f5f5f0}
td[contenteditable]:focus{background:#fffde7;box-shadow:inset 0 0 0 2px #fbbf24}

/* תמונת אתר — גודל וחיתוך אחידים */
.place-img{width:64px;height:48px;object-fit:cover;border-radius:6px;display:block;background:#eee}
.place-img.noimg,.place-img.broken{display:flex;align-items:center;justify-content:center;font-size:9px;color:#a8a29e;background:#f5f4f0;border:1px dashed #d6d3ce;text-align:center;line-height:1.2}
tr:hover .place-img{box-shadow:0 2px 8px rgba(0,0,0,.15)}
.place-namelink{color:inherit;text-decoration:none}
.place-namelink:hover{color:var(--action);text-decoration:underline}
/* הדגשה זמנית לכרטיס אתר שהגיעו אליו מקישור ישיר (deep-link) */
@keyframes placeFlash{0%{background:var(--warn-bg)}60%{background:var(--warn-bg)}100%{background:transparent}}
.place-flash>td{animation:placeFlash 2.6s ease-out;box-shadow:inset 3px 0 0 var(--focus)}

/* TAGS */
.tg{display:inline-flex;align-items:center;gap:3px;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap}
/* אזורים — סקאלת כחול אחת */
.tg-k{background:var(--region-1);color:var(--region-1-ink)}
.tg-h{background:var(--region-2);color:var(--region-2-ink)}
.tg-t{background:var(--region-3);color:var(--region-3-ink)}
.tg-d{background:var(--region-4);color:var(--region-4-ink)}
/* מצבים — צבע יחיד לכל מצב, עם אייקון תומך */
.tg-ok{background:var(--ok-bg);color:var(--ok)}
.tg-no{background:var(--warn-bg);color:var(--warn)}
.tg .ic{width:11px;height:11px;stroke-width:2.2}
.tg-ok .ic{stroke:var(--ok)}.tg-no .ic{stroke:var(--warn)}

/* CALENDAR */
.cal-month{margin-bottom:24px}
.cal-title{font-size:18px;font-weight:900;margin-bottom:8px;color:#1a1a1a}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:11px;font-weight:700;color:#888;padding:4px 0}
.cal-cell{position:relative;min-height:78px;border:1px solid #e5e3de;border-radius:6px;padding:4px 5px;background:#fff;font-size:10px;overflow:hidden}
.cal-cell.empty{background:transparent;border:none}
a.cal-cell{text-decoration:none;color:inherit;display:block;transition:.12s}
a.cal-cell:hover{box-shadow:0 3px 10px rgba(0,0,0,.12);transform:translateY(-1px)}
/* תמונת רקע ממלאת את כל התא בשקיפות 50% — מאחורי הטקסט */
.cal-bg{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.5;z-index:0}
.cal-bg.split{display:flex}
.cal-bg.split .cal-bg-half{flex:1;background-size:cover;background-position:center}
/* הטקסט מעל התמונה, בולט (הצללה + משקל) */
.cal-content{position:relative;z-index:1}
.cal-cell.has-img .cal-content{text-shadow:0 1px 2px rgba(255,255,255,.9),0 0 6px rgba(255,255,255,.7)}
.cal-cell.has-img .cal-dnum,.cal-cell.has-img .cal-city{font-weight:800;color:#111}
.cal-cell.has-img .cal-hotel{font-weight:700;color:#222}
.cal-dnum{font-size:13px;font-weight:700;color:#444}
.cal-trip{display:inline-block;background:var(--brand);color:var(--brand-ink);font-size:9px;font-weight:900;border-radius:3px;padding:0 4px;margin-right:4px;vertical-align:1px}
.cal-city{font-weight:700;font-size:11px;margin-top:3px;line-height:1.3}
.cal-hotel{color:#666;font-size:9px;line-height:1.25;margin-top:1px}
/* תמונות מלון בכרטיסי לוח השנה — רקע מלא בשקיפות (ראה .cal-bg למעלה) */
.cal-cell.has-img{min-height:112px}
@media(max-width:640px){.cal-cell.has-img{min-height:90px}}
/* יום טיסה (22/7 — יציאה מישראל) */
.cal-cell.cal-flight{background:#fdecec;border-color:#f2b8b8}
.cal-flight-badge{display:inline-flex;align-items:center;gap:4px;margin-top:3px;padding:1px 6px;border-radius:999px;background:#b91c1c;color:#fff;font-size:9px;font-weight:800}
.cal-flight-badge svg{width:11px;height:11px;stroke:#fff;fill:none;stroke-width:2}
.cal-flight .cal-city{color:#991b1b;font-weight:800}
.cal-flight .cal-hotel{color:#b91c1c}
.cal-k{background:var(--region-1)}.cal-h{background:var(--region-2)}.cal-t{background:var(--region-3)}.cal-t .cal-city,.cal-t .cal-dnum{color:#fff}.cal-t .cal-hotel{color:#e0e7ff}.cal-d{background:var(--region-4)}
.cal-legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;font-size:11px}
.cal-legend span{display:inline-flex;align-items:center;gap:5px;font-weight:600;color:#555}
.cal-legend i{width:14px;height:14px;border-radius:3px;display:inline-block;border:1px solid rgba(0,0,0,.08)}
@media(max-width:640px){.cal-cell{min-height:60px;font-size:9px}.cal-city{font-size:10px}.cal-hotel{display:none}}

/* SUMMARY PAGE (דף סיכומים מרכזי) */
.sum-intro{margin:2px 0 14px;font-size:13px;color:#6b7280}
.sum-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:12px}
/* כרטיסייה — מראה אחיד ניטרלי. צבע נכנס רק דרך st-* (מצב). */
.sum-card{display:block;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 15px;text-decoration:none;color:inherit;transition:.15s;position:relative}
.sum-card:hover{border-color:var(--border-strong);box-shadow:0 6px 18px rgba(0,0,0,.08);transform:translateY(-2px)}
.sum-card:active{transform:translateY(0)}
.sum-card:focus-visible{outline:2px solid var(--focus);outline-offset:2px}
.sum-head{display:flex;align-items:center;gap:7px;margin-bottom:8px}
.sum-head .ic{stroke:var(--icon)}
.sum-topic{font-size:12px;font-weight:800;color:var(--ink-2);letter-spacing:.02em}
.sum-main{font-size:24px;font-weight:900;color:var(--ink);line-height:1.1;margin:2px 0}
.sum-sub{font-size:12px;color:var(--ink-3);line-height:1.5}
.sum-go{margin-top:9px;font-size:11px;font-weight:800;color:var(--action);display:inline-flex;align-items:center;gap:4px}
.sum-go .ic{width:13px;height:13px;stroke:var(--action)}
.sum-flag{margin-top:8px;font-size:11px;font-weight:800;display:inline-flex;align-items:center;gap:4px}
.st-ok-txt{color:var(--ok)}.st-ok-txt .ic{stroke:var(--ok)}

<script>
// ══════════════════════════════════
// מיפוי אייקונים מרכזי (סעיף 4.1)
// אייקוני קו אחידים — אותו viewBox, עובי-קו וסגנון.
// שימוש: icon('days') → מחזיר <svg> אחיד.
// ══════════════════════════════════
const ICON_PATHS = {
  days:      '<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4"/>',
  calendar:  '<rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 9h18M8 2v4M16 2v4M8 13h.01M12 13h.01M16 13h.01"/>',
  route:     '<circle cx="6" cy="19" r="2"/><circle cx="18" cy="5" r="2"/><path d="M8 19h6a4 4 0 0 0 0-8H10a4 4 0 0 1 0-8h6"/>',
  pin:       '<path d="M12 21s-7-5.6-7-11a7 7 0 0 1 14 0c0 5.4-7 11-7 11z"/><circle cx="12" cy="10" r="2.5"/>',
  clock:     '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',
  city:      '<path d="M3 21h18M5 21V7l7-4 7 4v14M9 21v-4h6v4M9 10h.01M15 10h.01M9 13h.01M15 13h.01"/>',
  bed:       '<path d="M3 18v-6h18v6M3 12V7M21 12v-2a3 3 0 0 0-3-3H8v5"/><path d="M3 18v2M21 18v2"/>',
  star:      '<path d="M12 3l2.6 5.6 6 .7-4.4 4.1 1.2 6-5.4-3-5.4 3 1.2-6L3.4 9.3l6-.7z"/>',
  train:     '<rect x="5" y="3" width="14" height="13" rx="3"/><path d="M5 10h14M9 20l-2 2M15 20l2 2M8 16v1M16 16v1"/><circle cx="8.5" cy="12.5" r=".6"/><circle cx="15.5" cy="12.5" r=".6"/>',
  money:     '<rect x="2" y="6" width="20" height="12" rx="2"/><circle cx="12" cy="12" r="2.5"/><path d="M6 12h.01M18 12h.01"/>',
  map:       '<path d="M9 4L3 6v14l6-2 6 2 6-2V4l-6 2-6-2z"/><path d="M9 4v14M15 6v14"/>',
  back:      '<path d="M5 12h14M12 5l-7 7 7 7"/>',
  external:  '<path d="M14 4h6v6M20 4l-9 9M18 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V7a1 1 0 0 1 1-1h5"/>',
  check:     '<path d="M20 6L9 17l-5-5"/>',
  alert:     '<path d="M12 9v4M12 17h.01M10.3 3.9L2 18a2 2 0 0 0 1.7 3h16.6a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>',
  sort:      '<path d="M8 4v16M8 4l-3 3M8 4l3 3M16 20V4M16 20l-3-3M16 20l3-3"/>',
  plane:     '<path d="M17.8 19.2 16 11l3.5-3.5a2.1 2.1 0 0 0-3-3L13 8 4.8 6.2a1 1 0 0 0-.9 1.7l5.6 3.3-2.4 2.4-2-.4a.8.8 0 0 0-.7 1.3l1.9 1.9 1.9 1.9a.8.8 0 0 0 1.3-.7l-.4-2 2.4-2.4 3.3 5.6a1 1 0 0 0 1.7-.9z"/>',
  car:       '<path d="M5 13l1.5-4.5A2 2 0 0 1 8.4 7h7.2a2 2 0 0 1 1.9 1.5L19 13m-14 0h14m-14 0v4m14-4v4M5 17h2m10 0h2M7 13.5v.01M17 13.5v.01"/>',
  shuttle:   '<rect x="3" y="5" width="18" height="12" rx="2"/><path d="M3 11h18M7 17v1M17 17v1M7 8h4"/>',
  'arrow-l': '<path d="M19 12H5M11 6l-6 6 6 6"/>',
  grid:      '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>',
  list:      '<path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01"/>'
};
function icon(name, cls){
  const p = ICON_PATHS[name] || '';
  return `<svg class="ic${cls?' '+cls:''}" viewBox="0 0 24 24" aria-hidden="true">${p}</svg>`;
}

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
let DATA = { hotels:[], days:[], places:[], costs:[], flights:[], transport:null, bookings:null };
let activeTab = 'summary';
let navHistory = [];   // מחסנית ניווט — לחזרה לדף הקודם
let sortState = {};
let regionFilter = '';
let mapObj = null;
// מצב תצוגה (כרטיסים/רשימה) — נשמר בין דפים (סעיף 3.5)
let viewMode = localStorage.getItem('viewMode') || 'cards';
function setView(mode){ viewMode = mode; try{localStorage.setItem('viewMode',mode);}catch(e){} render(); }

// ══════════════════════════════════
// LOAD DATA
// ══════════════════════════════════
async function loadData() {
  try {
    const [h,d,p,c,f,t] = await Promise.all([
      fetch('data/hotels.json').then(r=>r.json()),
      fetch('data/days.json').then(r=>r.json()),
      fetch('data/places.json').then(r=>r.json()),
      fetch('data/costs.json').then(r=>r.json()),
      fetch('data/flights.json').then(r=>r.json()),
      fetch('data/transport.json').then(r=>r.json()).catch(()=>null)
    ]);
    const bk = await fetch('data/bookings.json').then(r=>r.json()).catch(()=>null);
    const cl = await fetch('data/booking-checklist.json').then(r=>r.json()).catch(()=>null);
    DATA = { hotels:h, days:d, places:p, costs:c, flights:f, transport:t, bookings:bk, checklist:cl };
    // מיזוג spots מקבצי הימים הפרטניים (data/days/day-XX.json) לתוך DATA.days —
    // כדי למלא את עמודות בוקר/צהריים/ערב בטבלת לוח הימים בשמות האתרים בפועל
    await Promise.all((DATA.days||[]).map(async function(day){
      var idNum = day.id!=null ? day.id : day.tripDay;
      var file = 'data/days/day-' + String(idNum).padStart(2,'0') + '.json';
      try { var dj = await fetch(file).then(r=>r.ok?r.json():null); if(dj && dj.spots) day.spots = dj.spots; }
      catch(e){ /* קובץ יום חסר — נשארים עם days.json */ }
    }));
  } catch(e) {
    console.error('Load error:',e);
    toast('שגיאה בטעינת נתונים — ודאי שאת בשרת מקומי');
  }
  // פתיחת הטאב לפי ה-URL (מאפשר קישור ישיר ושמירת מצב ברענון — סעיף 4.5)
  const urlTab = new URLSearchParams(location.search).get('tab');
  const valid = ['summary','days','calendar','hotels','bookings','checklist','places','costs','transport','map'];
  if (urlTab && valid.includes(urlTab) && urlTab!==activeTab) {
    activeTab = urlTab;
    document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===urlTab));
    document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('on', p.id==='p-'+urlTab));
    if (urlTab==='map') setTimeout(initMap,120);
  }
  render();
}

// ══════════════════════════════════
// TABS
// ══════════════════════════════════
document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => goTab(btn.dataset.tab));
});

function goTab(tab, isBack) {
  if (tab===activeTab) return;
  // בקפיצה חדשה — שומרים את הדף הנוכחי בהיסטוריה כדי לאפשר חזרה
  if (!isBack) navHistory.push(activeTab);
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on', b.dataset.tab===tab));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('p-'+tab).classList.add('on');
  // שמירת מצב ב-URL כדי שהטאב הנוכחי יישמר ברענון וניתן לקישור ישיר (סעיף 4.5)
  try { history.replaceState(null,'', '?tab='+tab); } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
  updateBackBtn();
  render();
  if (tab==='map') initMap();
}

function goBack() {
  if (!navHistory.length) return;
  const prev = navHistory.pop();
  goTab(prev, true);
}

function updateBackBtn() {
  const btn = document.getElementById('backBtn');
  if (!btn) return;
  if (navHistory.length) {
    btn.style.display = '';
    const labels = {summary:'סיכומים',days:'לוח ימים',calendar:'לוח שנה',hotels:'מלונות',places:'אתרים',costs:'תקציב',flights:'טיסות',map:'מפה'};
    const prev = navHistory[navHistory.length-1];
    btn.querySelector('.back-lbl').textContent = labels[prev] || 'חזרה';
  } else {
    btn.style.display = 'none';
  }
}

// ══════════════════════════════════
// SORT
// ══════════════════════════════════
function sortBy(tab, key) {
  const cur = sortState[tab];
  // אם ממיינים לפי אותה עמודה — הופכים כיוון. אחרת מתחילים ב-עולה.
  if (cur && cur.key===key) {
    sortState[tab] = {key, dir: cur.dir==='asc' ? 'desc' : 'asc'};
  } else {
    sortState[tab] = {key, dir:'asc'};
  }
  render();
}

function getVal(obj, key) {
  return key.includes('.') ? key.split('.').reduce((o,k)=>o?.[k],obj) : obj[key];
}

function sorted(arr, tab) {
  const st = sortState[tab];
  if (!st) return arr;
  const {key, dir} = st;
  return [...arr].sort((a,b) => {
    let va = getVal(a,key), vb = getVal(b,key);
    if (va==null||va==='') va = dir==='asc' ? Infinity : -Infinity;
    if (vb==null||vb==='') vb = dir==='asc' ? Infinity : -Infinity;
    // מספרים (כולל מחרוזות מספריות כמו דירוג)
    const na = typeof va==='number' ? va : (String(va).trim()!=='' && !isNaN(va) ? parseFloat(va) : null);
    const nb = typeof vb==='number' ? vb : (String(vb).trim()!=='' && !isNaN(vb) ? parseFloat(vb) : null);
    if (na!=null && nb!=null) return dir==='asc' ? na-nb : nb-na;
    return dir==='asc' ? String(va).localeCompare(String(vb),'he') : String(vb).localeCompare(String(va),'he');
  });
}

function arrow(tab, key) {
  const st = sortState[tab];
  if (!st || st.key!==key) return '<span class="arrow" style="opacity:.25">↕</span>';
  return `<span class="arrow">${st.dir==='asc'?'▲':'▼'}</span>`;
}

// ══════════════════════════════════
// REGION FILTER
// ══════════════════════════════════
function renderFilters() {
  const el = document.getElementById('filters');
  if (activeTab!=='days' && activeTab!=='hotels' && activeTab!=='places') { el.innerHTML=''; return; }
  const regions = [
    {k:'',l:'הכל'},{k:'kansai',l:'קנסאי'},{k:'hokkaido',l:'הוקאידו'},{k:'tokyo',l:'טוקיו'},{k:'dubai',l:'דובאי'}
  ];
  // עטיפה פנימית שמיישרת את מסגרת הסינון לרוחב הטבלה הפעילה (רחב בלוח ימים, ממורכז בשאר)
  const wide = activeTab==='days' ? ' filters-inner-wide' : '';
  el.innerHTML = `<div class="filters-inner${wide}">` +
    regions.map(r=>`<button class="flt${regionFilter===r.k?' on':''}" onclick="regionFilter='${r.k}';render()">${r.l}</button>`).join('') +
    `</div>`;
}

function filtered(arr) {
  if (!regionFilter) return arr;
  return arr.filter(x => x.region === regionFilter);
}

// ══════════════════════════════════
// RENDER
// ══════════════════════════════════
function render() {
  renderFilters();
  // כותרת ה-hero מוצגת רק בדף הראשי (סיכומים) — אין חזרתיות בשאר הדפים
  document.getElementById('hero').style.display = activeTab==='summary' ? '' : 'none';
  // שורת כרטיסיות הסטטיסטיקה הישנה הוסרה — כל הסיכומים מרוכזים בדף «סיכומים»
  document.getElementById('stats').innerHTML = '';
  renderHelp();
  if (activeTab==='summary') renderSummary();
  else if (activeTab==='days') renderDays();
  else if (activeTab==='calendar') renderCalendar();
  else if (activeTab==='hotels') renderHotels();
  else if (activeTab==='places') renderPlaces();
  else if (activeTab==='costs') renderCosts();
  else if (activeTab==='bookings') renderBookings();
  else if (activeTab==='checklist') renderChecklist();
  else if (activeTab==='transport') renderTransport();
}

function renderStats() {
  const bk = DATA.hotels.filter(h=>h.booked);
  const totalPrice = bk.reduce((s,h)=>s+(h.price||0),0);
  const totalNights = bk.reduce((s,h)=>s+(h.nights||0),0);
  const missing = DATA.hotels.filter(h=>!h.booked);
  const costTotal = DATA.costs.reduce((s,c)=>s+(c.amount||0),0);
  const cards = [
    {label:'מלונות מוזמנים', value:`${bk.length}`, detail:`${missing.length} חסרים`},
    {label:'לילות', value:`${totalNights}`, detail:'סה״כ ללינות שהוזמנו'},
    {label:'עלות מלונות', value:`₪${totalPrice.toLocaleString()}`, detail:'לפי המלונות שנרשמו'},
    {label:'הוצאות', value:`₪${costTotal.toLocaleString()}`, detail:'סה״כ ברשימת התקציב'},
    {label:'אתרים', value:`${DATA.places.length}`, detail:'נקודות עניין במסלול'}
  ];
  document.getElementById('stats').innerHTML = cards.map(card => `
    <div class="stat-card">
      <div class="stat-label">${card.label}</div>
      <div class="stat-value">${card.value}</div>
      <div class="stat-detail">${card.detail}</div>
    </div>`).join('');
}

function renderSummary() {
  const H=DATA.hotels, D=DATA.days, P=DATA.places, F=DATA.flights;

  // ── כל המספרים מחושבים חי מ-DATA בכל רינדור (משתקפים מיד עם כל שינוי) ──
  const first=D[0], last=D[D.length-1];
  const dateRange = first&&last ? `${first.day}/${first.month} – ${last.day}/${last.month}` : '—';
  const regions = [...new Set(D.map(d=>d.regionHe).filter(Boolean))];
  const cities  = [...new Set(D.map(d=>d.city).filter(Boolean))];
  const booked = H.filter(h=>h.booked), missH = H.length-booked.length;
  const nights = booked.reduce((s,h)=>s+(h.nights||0),0);
  const placeTypes = [...new Set(P.map(p=>p.type).filter(Boolean))];

  // מרחק/זמן — מסוכמים מ-transport.summary של כל יום (המקור האמיתי בנתונים)
  const daysWithSummary = D.filter(d=>d.transport&&d.transport.summary);
  const totalKm = Math.round(daysWithSummary.reduce((s,d)=>s+(d.transport.summary.totalDistanceKm||0),0));
  const totalTransitMin = daysWithSummary.reduce((s,d)=>s+(d.transport.summary.totalTransitMinutes||0),0);
  const totalTravelHrs = totalTransitMin/60;
  const daysCoverage = daysWithSummary.length; // כמה ימים כוללים נתוני מרחק/זמן
  const avgKm = totalKm && D.length ? Math.round(totalKm/D.length) : 0;

  // עלויות — אותו חישוב כמו דף התקציב (collectCosts) כדי שהמספרים יהיו עקביים בין הדפים
  let costTotal=0, costPaid=0, costEst=0;
  try {
    const rows = collectCosts();
    costTotal = rows.reduce((s,r)=>s+(r.ils||0),0);
    costPaid  = rows.filter(r=>r.paid).reduce((s,r)=>s+(r.ils||0),0);
    costEst   = rows.filter(r=>r.estimate).reduce((s,r)=>s+(r.ils||0),0);
  } catch(e){ costTotal = booked.reduce((s,h)=>s+(h.price||0),0); }

  const flightsCount = F.filter(f=>f.type&&f.type.includes('טיסה')).length;
  const carDates = DATA.transport&&DATA.transport.carRental ? DATA.transport.carRental : null;

  // state: 'ok' | 'warn' | 'pending' | null. tip = הסבר מלא: מה הנתון + לאן מובילה הלחיצה.
  const cards = [
    {ic:'days',     topic:'ימים',            main:`${D.length}`, sub:'ימי טיול מתוכננים',
      tab:'days', tip:`${D.length} ימי הטיול (${dateRange}). לחיצה: פתיחת לוח הימים המלא`},
    {ic:'calendar', topic:'תאריכים',         main:dateRange, sub:`${regions.length} אזורים · ${cities.length} ערים`,
      tab:'calendar', tip:`טווח התאריכים של הטיול, ${regions.length} אזורים ו-${cities.length} ערים. לחיצה: פתיחת לוח השנה`},
    {ic:'route',    topic:'מרחק כולל',        main:`${totalKm.toLocaleString()} ק״מ`, sub:`סה״כ מרחק הנסיעות${daysCoverage<D.length?` (מ-${daysCoverage} ימים)`:''}`,
      tab:'map', tip:`סכום המרחקים מכל מקטעי הנסיעה (${daysCoverage} ימים עם נתוני תחבורה). לחיצה: פתיחת המפה`},
    {ic:'pin',      topic:'מרחק ממוצע ליום',  main:`${avgKm} ק״מ`, sub:'ממוצע נסיעה ליום טיול',
      tab:'days', tip:`ממוצע ${avgKm} ק״מ ליום (${totalKm.toLocaleString()} ק״מ חלקי ${D.length} ימים). לחיצה: פתיחת לוח הימים`},
    {ic:'clock',    topic:'זמן בדרכים',       main:`${totalTravelHrs.toFixed(1)} שע׳`, sub:`סה״כ זמן נסיעה בתחבורה${daysCoverage<D.length?` (מ-${daysCoverage} ימים)`:''}`,
      tab:'transport', tip:`סכום זמני הנסיעה מכל המקטעים (${Math.round(totalTransitMin)} דקות = ${totalTravelHrs.toFixed(1)} שעות). לחיצה: פתיחת דף התחבורה`},
    {ic:'city',     topic:'יעדים ומקומות',    main:`${cities.length}`, sub:`${cities.slice(0,3).join(' · ')}${cities.length>3?'…':''}`,
      tab:'days', tip:`${cities.length} ערים ויעדים במסלול. לחיצה: פתיחת לוח הימים`},
    {ic:'bed',      topic:'לינה',             main:`${booked.length}/${H.length}`, sub:`${nights} לילות · ${missH?missH+' טרם הוזמנו':'הכול הוזמן'}`,
      tab:'hotels', state: missH?'warn':'ok', tip:`${booked.length} מתוך ${H.length} מלונות הוזמנו, ${nights} לילות סה״כ${missH?`. ${missH} עדיין לא הוזמנו`:''}. לחיצה: פתיחת דף המלונות`},
    {ic:'star',     topic:'אטרקציות וחוויות', main:`${P.length}`, sub:`${placeTypes.length} סוגים של אתרים`,
      tab:'places', tip:`${P.length} אתרים ונקודות עניין ב-${placeTypes.length} סוגים. לחיצה: פתיחת דף האתרים`},
    {ic:'train',    topic:'תחבורה',           main:`${flightsCount} טיסות`, sub:`${carDates&&carDates.active?`רכב שכור ${(carDates.from||'').slice(5)}→${(carDates.to||'').slice(5)} · `:''}שאטלים`,
      tab:'transport', tip:`${flightsCount} טיסות${carDates&&carDates.active?' + רכב שכור':''} + שאטלים. לחיצה: פתיחת דף התחבורה`},
    {ic:'money',    topic:'עלויות',           main:`₪${costTotal.toLocaleString()}`, sub:`שולם ₪${costPaid.toLocaleString()}${costEst?` · משוער ₪${costEst.toLocaleString()}`:''}`,
      tab:'costs', tip:`סה״כ עלות הטיול ₪${costTotal.toLocaleString()} (מלונות+טיסות+רכב+אטרקציות, כולל המרת מטבע). מזה שולם ₪${costPaid.toLocaleString()}. לחיצה: פתיחת דף התקציב`},
  ];

  const html = cards.map(c=>`
    <a class="sum-card${c.state?' st-'+c.state:''}" href="#" onclick="goTab('${c.tab}');return false" data-tip="${c.tip}" aria-label="${c.topic}: ${c.main}. ${c.tip}">
      <div class="sum-head">${icon(c.ic,'ic-lg')}<span class="sum-topic">${c.topic}</span></div>
      <div class="sum-main">${c.main}</div>
      <div class="sum-sub">${c.sub}</div>
      ${c.state==='warn'?`<div class="sum-flag st-warn-txt">${icon('alert')} דרוש טיפול</div>`:''}
      ${c.state==='ok'?`<div class="sum-flag st-ok-txt">${icon('check')} הכול מוזמן</div>`:''}
    </a>`).join('');

  // רשימה מתחת לכרטיסיות — כל שורה קישור לדף שלה
  const list = cards.map(c=>`
    <a class="sum-row${c.state?' st-'+c.state:''}" href="#" onclick="goTab('${c.tab}');return false" data-tip="${c.tip}" aria-label="${c.topic}: ${c.main}. ${c.tip}">
      <span class="sr-ic">${icon(c.ic)}</span>
      <span class="sr-topic">${c.topic}</span>
      <span class="sr-main">${c.main}</span>
      <span class="sr-sub">${c.sub}</span>
      <span class="sr-go">${icon('external')}</span>
    </a>`).join('');

  // pills בכותרת ה-hero — דינמיים לפי הנתונים החיים (לא מקודדים קשיח)
  const heroPills = document.getElementById('heroPills');
  if (heroPills) {
    heroPills.innerHTML =
      `<span class="hero-pill">${D.length} ימים</span>` +
      `<span class="hero-pill">${booked.length}/${H.length} מלונות</span>` +
      `<span class="hero-pill">${regions.length} אזורים</span>` +
      `<span class="hero-pill">₪${costTotal.toLocaleString()}</span>`;
  }

  document.getElementById('sumWrap').innerHTML =
    `<div class="view-bar"><div class="sum-intro">כל נתוני הטיול במבט אחד, מחושבים בזמן אמת. ריחוף מעל כרטיסייה מסביר את הנתון; לחיצה פותחת את הדף המפורט.</div>${viewToggle()}</div>
     ${viewMode==='cards' ? `<div class="sum-grid">${html}</div>` : `<div class="sum-list">${list}</div>`}`;
}

    <button class="vt${viewMode==='cards'?' on':''}" onclick="setView('cards')" data-tip="תצוגת כרטיסים" aria-label="תצוגת כרטיסים" aria-pressed="${viewMode==='cards'}">${icon('grid')} כרטיסים</button>

  </div>`;
}

function regionTag(r) {
  const cls = {kansai:'tg-k',hokkaido:'tg-h',tokyo:'tg-t',dubai:'tg-d'}[r]||'tg-d';
  const he = {kansai:'קנסאי',hokkaido:'הוקאידו',tokyo:'טוקיו',dubai:'דובאי'}[r]||r;
  return `<span class="tg ${cls}">${he}</span>`;
}

// ── השלמת נתונים ממקור אמת (סעיף 5-6) ──
// hotels.json הוא מקור האמת למלונות. אם ליום חסר שם/עיר — משלימים לפי hotelId.
function hotelById(id){ return DATA.hotels.find(h=>h.id===id); }
function hotelByName(n){ if(!n)return null; n=n.replace(/^מלון\s+/,'').trim(); return DATA.hotels.find(h=>h.name===n)||DATA.hotels.find(h=>h.name&&(h.name.includes(n)||n.includes(h.name))); }
function dayHotelName(d){ if(d.hotelName) return d.hotelName; const h=hotelById(d.hotelId); return h?h.name:''; }
function dayCity(d){ if(d.city) return d.city; const h=hotelById(d.hotelId); return h?h.city:''; }
// שם מלון כקישור Booking + תמונה קטנה — לשימוש בטבלה/לוח שנה
function hotelThumbMini(h){ if(!h)return ''; const src=localStorage.getItem('hotelimg-'+h.id)||h.image||h.mapImage; return src?`<img class="hotel-thumb-mini" src="${src}" alt="מלון ${h.name}" loading="lazy" onerror="this.style.display='none'">`:''; }
function hotelNameLinked(d){
  const name = dayHotelName(d);
  const h = hotelById(d.hotelId) || hotelByName(name);
  if(!h || !name) return name;
  return hotelNameLink2(h, name);
}
// שם מלון כקישור Booking (מקבל אובייקט)
function hotelNameLink2(h, txt){
  if(!h) return txt||'';
  return `<a href="${bookingLink(h)}" target="_blank" rel="noopener" class="hotel-link" data-tip="הזמנה בבוקינג — ${(h.checkin||'').slice(5)}→${(h.checkout||'').slice(5)}, 2 מבוגרים + 2 בני נוער (17,15)">${txt||h.name}</a>`;
}

// קישור Booking עם הרכב המשפחה בפועל: 2 מבוגרים + 2 בני נוער (17, 15), חדר ל-4
function bookingLink(h) {
  const ss = encodeURIComponent(`${h.name} ${h.cityEn||h.city||''}`.trim());
  let url = `https://www.booking.com/searchresults.he.html?ss=${ss}`;
  if (h.checkin)  url += `&checkin=${h.checkin}`;
  if (h.checkout) url += `&checkout=${h.checkout}`;
  // 2 מבוגרים + 2 ילדים (17, 15) — חדר המתאים ל-4 אורחים בפועל (סעיף 5, 6)
  url += `&group_adults=2&group_children=2&age=17&age=15&no_rooms=${h.rooms||1}`;
  return url;
}

function mapsLink(h) {
  if (h.pid) return `https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(h.name)}&query_place_id=${h.pid}`;
  return `https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(h.addr||h.name)}`;
}

function th(tab, key, label) {
  return `<th onclick="sortBy('${tab}','${key}')">${arrow(tab,key)}${label}</th>`;
}

function ed(dataPath, value) {
  return `contenteditable="true" data-path="${dataPath}" onblur="editCell(this)"`;
}

// נופל חזרה ל-days.json (d.morning?.place) אם אין spots.
function daySlotHtml(d, slot) {
  const spots = d.spots && d.spots[slot];
  if (Array.isArray(spots) && spots.length) {
    return spots.map(s => {
      const he = s.name || '';
      const en = s.nameEn || '';
      return `<div class="slot-spot"><b>${he}</b>${en?`<span class="slot-en">${en}</span>`:''}</div>`;
    }).join('');
  }
  const legacy = d[slot] && d[slot].place;
  return legacy ? `<div class="slot-spot"><b>${legacy}</b></div>` : '';
}

// CALENDAR (יולי + אוגוסט)
// ══════════════════════════════════
function renderCalendar() {
  const DOW = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const regCls = {kansai:'cal-k',hokkaido:'cal-h',tokyo:'cal-t',dubai:'cal-d'};
  // מיפוי לפי מפתח YYYY-M-D
  const byDate = {};
  DATA.days.forEach(d => { byDate[`${d.month}-${d.day}`] = d; });

  // יום בשבוע 0=ראשon לפי התאריך (ללא תלות באזור זמן)
  function dow(y,m,day){ return new Date(Date.UTC(y,m-1,day)).getUTCDay(); }

  function buildMonth(year, month, title) {
    const daysInMonth = new Date(Date.UTC(year, month, 0)).getUTCDate();
    const firstDow = dow(year, month, 1);
    let cells = '';
    for (let i=0;i<firstDow;i++) cells += `<div class="cal-cell empty"></div>`;
    for (let day=1; day<=daysInMonth; day++) {
      const d = byDate[`${month}-${day}`];
      if (!d) {
        // 22/7 — יום היציאה מישראל (הטיסה יוצאת בערב ונוחתת ב-23/7). מסומן כיום טיסה.
        if (month===7 && day===22) {
          cells += `<a class="cal-cell cal-flight" href="index.html?tab=transport" data-tip="יום טיסה — יציאה מישראל בערב, נחיתה למחרת (23/7)">
            <div class="cal-content">
              <div class="cal-dnum">${day}</div>
              <div class="cal-flight-badge">${icon('plane')||'✈'} יום טיסה</div>
              <div class="cal-city">יציאה מישראל</div>
              <div class="cal-hotel">EK 2121 · ערב</div>
            </div>
          </a>`;
        } else {
          cells += `<div class="cal-cell"><div class="cal-dnum">${day}</div></div>`;
        }
      } else {
        const cls = regCls[d.region] || 'cal-d';
        // מלון היום ומלון היום הקודם — לזיהוי מעבר
        const curH = hotelById(d.hotelId);
        const prevDay = DATA.days.find(x=>x.tripDay===d.tripDay-1);
        const prevH = prevDay ? hotelById(prevDay.hotelId) : null;
        const curSrc = curH ? (localStorage.getItem('hotelimg-'+curH.id)||curH.image||curH.mapImage) : '';
        const prevSrc = prevH ? (localStorage.getItem('hotelimg-'+prevH.id)||prevH.image||prevH.mapImage) : '';
        // מעבר: מלון שונה מאתמול, ולשניהם יש תמונה → שני חצאים
        const isTransition = prevH && curH && prevH.id!==curH.id;
        // תמונת רקע ממלאת את כל התא בשקיפות 50%; ביום מעבר מלון — שני חצאים
        let bgHtml='';
        if (isTransition && prevSrc && curSrc) {
          bgHtml = `<div class="cal-bg split" aria-hidden="true">
            <div class="cal-bg-half" style="background-image:url('${prevSrc}')"></div>
            <div class="cal-bg-half" style="background-image:url('${curSrc}')"></div>
          </div>`;
        } else if (curSrc) {
          bgHtml = `<div class="cal-bg" aria-hidden="true" style="background-image:url('${curSrc}')"></div>`;
        }
        cells += `<a class="cal-cell ${cls}${bgHtml?' has-img':''}" href="day.html?d=${d.tripDay}">
          ${bgHtml}
          <div class="cal-content">
            <div class="cal-dnum">${day}<span class="cal-trip">י${d.tripDay}</span></div>
            <div class="cal-city">${dayCity(d)}</div>
            <div class="cal-hotel">${dayHotelName(d)}</div>
          </div>
        </a>`;
      }
    }
    return `<div class="cal-month">
      <div class="cal-title">${title}</div>
      <div class="cal-grid">${DOW.map(x=>`<div class="cal-dow">${x}</div>`).join('')}${cells}</div>
    </div>`;
  }

  const legend = `<div class="cal-legend">
    <span><i style="background:var(--region-1)"></i>קנסאי</span>
    <span><i style="background:var(--region-2)"></i>הוקאידו</span>
    <span><i style="background:var(--region-3)"></i>טוקיו</span>
    <span><i style="background:var(--region-4)"></i>דובאי</span>
  </div>`;

  document.getElementById('calWrap').innerHTML =
    legend + buildMonth(2026,7,'יולי 2026') + buildMonth(2026,8,'אוגוסט 2026');
}

// הוספת/החלפת תמונה — URL או קובץ (base64), נשמר ב-localStorage
function setHotelImage(id){
  const url = prompt('הדביקי URL של תמונת המלון (או השאירי ריק לבחירת קובץ):');
  if(url && url.trim()){ localStorage.setItem('hotelimg-'+id, url.trim()); render(); return; }
  // בחירת קובץ
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files[0]; if(!f)return; const r=new FileReader(); r.onload=()=>{ localStorage.setItem('hotelimg-'+id, r.result); render(); toast('תמונה נשמרה'); }; r.readAsDataURL(f); };
  inp.click();
}

// תמונת אתר אחידה — Wikimedia, lazy, placeholder כשאין (מקור אחד: p.image)
function placeImg(p) {
  const alt = `${p.name}${p.nameEn?' — '+p.nameEn:''}`;
  if (p.image) return `<img class="place-img" src="${p.image}" alt="${alt}" loading="lazy" onerror="this.classList.add('broken');this.removeAttribute('src')">`;
  return `<div class="place-img noimg" role="img" aria-label="${alt} — אין תמונה">אין תמונה</div>`;
}

// קישור Google Maps מדויק לאתר: placeId > lat/lng > כתובת/שם. תמיד hl=he.
function placeMapsLink(p) {
  const q = encodeURIComponent(p.nameEn || p.name || '');
  if (p.pid) return `https://www.google.com/maps/search/?api=1&hl=he&query=${q}&query_place_id=${p.pid}`;
  if (p.lat && p.lng) return `https://www.google.com/maps/search/?api=1&hl=he&query=${p.lat},${p.lng}(${q})`;
  return `https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(p.addr||p.nameEn||p.name||'')}`;
}

// deep-link לכרטיס אתר: ?place=<id> (או ?q=<שם> להתאמה) — גלילה + הדגשה זמנית
let _placeDeepLinkDone = false;
function scrollToDeepLinkPlace() {
  if (_placeDeepLinkDone) return;
  const sp = new URLSearchParams(location.search);
  const pid = sp.get('place'), q = sp.get('q');
  if (!pid && !q) return;
  _placeDeepLinkDone = true;
  let row = null;
  if (pid) row = document.getElementById('place-' + pid);
  if (!row && q) {
    const needle = q.toLowerCase();
    const all = DATA.places || [];
    const m = all.find(p => (p.nameEn||'').toLowerCase()===needle || (p.name||'').toLowerCase()===needle)
           || all.find(p => (p.nameEn||'').toLowerCase().includes(needle) || (p.name||'').toLowerCase().includes(needle));
    if (m) row = document.getElementById('place-' + m.id);
  }
  if (!row) return;
  setTimeout(() => {
    row.scrollIntoView({ behavior:'smooth', block:'center' });
    row.classList.add('place-flash');
    setTimeout(() => row.classList.remove('place-flash'), 2600);
  }, 120);
}

// שערי המרה משוערים למטבע מרכזי (ILS) — מסומנים כמשוערים
const FX = { ILS:1, JPY:0.024, USD:3.7 };
function toILS(amount, cur){ return Math.round((amount||0) * (FX[cur]||1)); }
function fmtILS(n){ return '₪'+n.toLocaleString(); }

// איסוף כל העלויות מכל המקורות לרשומות אחידות (מקור אמת יחיד לכל פריט)
function collectCosts() {
  const rows = [];
  // 1) מלונות — מ-costs.json (ILS, שולמו)
  (DATA.costs||[]).forEach(c=>rows.push({
    cat:'מלונות ולינה', item:c.item, amount:c.amount, currency:c.currency||'ILS',
    ils:toILS(c.amount,c.currency||'ILS'), date:c.date, paid:c.paid, estimate:false, note:c.notes
  }));
  // 2) טיסות + רכב — מ-bookings.costSummary (מקור אמת מהמסמכים)
  const cs = DATA.bookings?.costSummary;
  if (cs) {
    if(cs.flights){
      const f=cs.flights;
      if(f.emirates) rows.push({cat:'טיסות', item:'Emirates (בינלאומי, 4 נוסעים)', amount:f.emirates.total, currency:f.emirates.currency, ils:toILS(f.emirates.total,f.emirates.currency), paid:true, estimate:false, note:'אישור NYTYZ2'});
      if(f.jal) rows.push({cat:'טיסות', item:'JAL קומאטסו→ממנבטסו', amount:f.jal.total, currency:f.jal.currency, ils:toILS(f.jal.total,f.jal.currency), paid:true, estimate:false, note:'אישור ENDYBF'});
      if(f.peach) rows.push({cat:'טיסות', item:'Peach צ׳יטוסה→נריטה', amount:f.peach.total, currency:f.peach.currency, ils:toILS(f.peach.total,f.peach.currency), paid:true, estimate:false, note:'אישור 8JPYNY'});
    }
    if(cs.car) rows.push({cat:'רכב שכור', item:'Sixt/ORIX — Mazda CX-5, 12 ימים', amount:cs.car.total, currency:cs.car.currency, ils:toILS(cs.car.total,cs.car.currency), paid:true, estimate:false, note:'אישור 9736445237 (כולל ביטוח, GPS, ETC, one-way)'});
  }
  // 3) אטרקציות/פעילויות — מ-booking-checklist (משוער, טרם שולם)
  (DATA.checklist?.items||[]).forEach(it=>{
    const st = localStorage.getItem('cl-'+it.day+'-'+it.item) || it.status || 'pending';
    const num = parseInt(String(it.cost||'').replace(/[^\d]/g,''))||0;
    rows.push({cat:'אטרקציות ופעילויות', item:it.item, amount:num, currency:'ILS', ils:num, date:it.date, paid:st==='booked', estimate:true, note:'יום '+it.day});
  });
  // 4) קטגוריות ללא נתונים ודאיים — משוער/טעון אימות
  rows.push({cat:'דלק', item:'דלק להוקאידו (משוער)', amount:null, ils:0, paid:false, estimate:true, verify:true, note:'תלוי בק״מ בפועל — לא במסמך'});
  rows.push({cat:'כבישי אגרה', item:'ETC אגרות (משוער)', amount:null, ils:0, paid:false, estimate:true, verify:true, note:'כרטיס ETC כלול ברכב, שימוש בפועל לא ידוע'});
  rows.push({cat:'רכבות ומטרו', item:'תחבורה ציבורית (משוער)', amount:null, ils:0, paid:false, estimate:true, verify:true, note:'IC card / כרטיסים — לא הוזן'});
  return rows;
}

let costsFilter = 'all';  // קטגוריה פעילה לסינון
function setCostsFilter(c){ costsFilter = c; renderCosts(); }

// גרף מחיר-לילה למלונות סביב קו הממוצע — לזהות יקר/זול והיכן
function hotelChart() {
  const hotels = DATA.hotels
    .filter(h=>h.booked && h.price && h.nights && h.lat)
    .map(h=>({ name:h.name, he:h.he||h.name, city:h.city||'', checkin:h.checkin, perNight:Math.round((typeof h.price==='object'?(h.price.usd||h.price.total):h.price)/h.nights) }))
    .sort((a,b)=>(a.checkin||'').localeCompare(b.checkin||''));
  if(hotels.length<2) return '';

  const avg = Math.round(hotels.reduce((s,h)=>s+h.perNight,0)/hotels.length);
  const max = Math.max(...hotels.map(h=>h.perNight)), min = Math.min(...hotels.map(h=>h.perNight));

  // מידות הגרף
  const W=760, H=280, padL=52, padR=16, padT=20, padB=64;
  const plotW=W-padL-padR, plotH=H-padT-padB;
  const yMax = Math.ceil(max/200)*200, yMin = Math.floor(Math.min(min,avg*0.7)/200)*200;
  const x = i => padL + (hotels.length===1?plotW/2:(i/(hotels.length-1))*plotW);
  const y = v => padT + plotH - ((v-yMin)/(yMax-yMin))*plotH;

  // קווי סרגל Y
  let grid='';
  for(let v=yMin; v<=yMax; v+=Math.max(200,Math.round((yMax-yMin)/5/200)*200)){
    grid+=`<line x1="${padL}" y1="${y(v)}" x2="${W-padR}" y2="${y(v)}" stroke="#eee" stroke-width="1"/>
      <text x="${padL-6}" y="${y(v)+4}" text-anchor="end" font-size="10" fill="#999">₪${v}</text>`;
  }
  // קו הממוצע
  const avgY = y(avg);
  const avgLine = `<line x1="${padL}" y1="${avgY}" x2="${W-padR}" y2="${avgY}" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="5,4"/>
    <text x="${W-padR}" y="${avgY-5}" text-anchor="end" font-size="11" font-weight="800" fill="#b8860b">ממוצע ₪${avg}</text>`;
  // קו המחיר
  const path = hotels.map((h,i)=>`${i?'L':'M'}${x(i)},${y(h.perNight)}`).join(' ');
  const line = `<path d="${path}" fill="none" stroke="#1d4ed8" stroke-width="2" opacity="0.55"/>`;
  // נקודות — צבע לפי יחס לממוצע
  const dots = hotels.map((h,i)=>{
    const above = h.perNight>avg;
    const color = above ? '#b91c1c' : '#15803d';
    const diff = h.perNight-avg, pct=Math.round(diff/avg*100);
    return `<g><circle cx="${x(i)}" cy="${y(h.perNight)}" r="6" fill="${color}" stroke="#fff" stroke-width="2">
        <title>${h.he} (${h.city}) — ₪${h.perNight}/לילה · ${above?'+':''}${pct}% מהממוצע</title></circle>
      <text x="${x(i)}" y="${y(h.perNight)-11}" text-anchor="middle" font-size="9" font-weight="700" fill="${color}">₪${h.perNight}</text></g>`;
  }).join('');
  // תוויות X (עיר, מסובב)
  const xlabels = hotels.map((h,i)=>`<text x="${x(i)}" y="${H-padB+14}" text-anchor="end" font-size="9" fill="#666" transform="rotate(-40 ${x(i)} ${H-padB+14})">${h.city||h.he.slice(0,10)}</text>`).join('');

  return `<div class="cost-chart">
    <h3 class="tr-sec">מחיר לילה לפי מלון — ביחס לממוצע</h3>
    <div class="chart-legend"><span><i style="background:#b91c1c"></i>יקר מהממוצע</span><span><i style="background:#15803d"></i>זול מהממוצע</span><span><i class="dash"></i>קו ממוצע</span></div>
    <div class="chart-scroll"><svg viewBox="0 0 ${W} ${H}" class="chart-svg" role="img" aria-label="גרף מחיר לילה למלונות ביחס לממוצע">
      ${grid}${avgLine}${line}${dots}${xlabels}
    </svg></div>
  </div>`;
}

function renderCosts() {
  const allRows = collectCosts();
  const showAll = window._costsShowAll || false;

  // כל הקטגוריות (לסרגל) + ספירה/סכום
  const catStat = {};
  allRows.forEach(r=>{ (catStat[r.cat]=catStat[r.cat]||{ils:0,items:0,hasData:false}); catStat[r.cat].ils+=r.ils; catStat[r.cat].items++; if(r.ils>0)catStat[r.cat].hasData=true; });
  // ודא שהקטגוריה הפעילה עדיין קיימת
  if(costsFilter!=='all' && !catStat[costsFilter]) costsFilter='all';

  // רשומות מסוננות לפי הקטגוריה הפעילה
  const rows = costsFilter==='all' ? allRows : allRows.filter(r=>r.cat===costsFilter);

  // סיכומים — תמיד על הרשומות המסוננות (סה"כ רלוונטי)
  const total = rows.reduce((s,r)=>s+r.ils,0);
  const paidTotal = rows.filter(r=>r.paid).reduce((s,r)=>s+r.ils,0);
  const estTotal = rows.filter(r=>r.estimate).reduce((s,r)=>s+r.ils,0);
  const scope = costsFilter==='all' ? 'כל הטיול' : costsFilter;

  // סרגל קטגוריות לחיץ — "הכל" + כל קטגוריה עם סכום
  const catList = Object.entries(catStat)
    .filter(([c,v])=>showAll || v.hasData)
    .sort((a,b)=>b[1].ils-a[1].ils);
  const bar = `<div class="cost-filterbar">
    <button class="cfb${costsFilter==='all'?' on':''}" onclick="setCostsFilter('all')">הכל · ${fmtILS(allRows.reduce((s,r)=>s+r.ils,0))}</button>
    ${catList.map(([c,v])=>`<button class="cfb${costsFilter===c?' on':''}" onclick="setCostsFilter('${c}')">${c}${v.ils?' · '+fmtILS(v.ils):''}</button>`).join('')}
    <button class="cfb cfb-toggle" onclick="window._costsShowAll=!window._costsShowAll;renderCosts()">${showAll?'הסתר ריקות':'הצג הכול'}</button>
  </div>`;

  // כרטיסי סיכום — לפי הקטגוריה הפעילה
  const cards = `<div class="cost-cards">
    <div class="cost-card"><span>סה״כ · ${scope}</span><b>${fmtILS(total)}</b></div>
    <div class="cost-card st-ok"><span>שולם</span><b>${fmtILS(paidTotal)}</b></div>
    <div class="cost-card st-warn"><span>טרם שולם</span><b>${fmtILS(total-paidTotal)}</b></div>
    <div class="cost-card"><span>מזה משוער</span><b>${fmtILS(estTotal)}</b></div>
  </div>`;

  // טבלת פירוט — רק הרשומות המסוננות
  const detail = rows
    .filter(r=>showAll || r.ils>0)
    .map(r=>`<tr class="${r.verify?'cost-verify':''}">
      <td>${r.cat}</td>
      <td>${r.item}${r.verify?' <span class="cost-flag">טעון אימות</span>':''}${r.estimate&&!r.verify?' <span class="cost-flag est">משוער</span>':''}</td>
      <td>${r.amount!=null?r.amount.toLocaleString()+' '+(r.currency||''):'—'}</td>
      <td>${r.ils?fmtILS(r.ils):'—'}</td>
      <td><span class="tg ${r.paid?'tg-ok':'tg-no'}">${r.paid?'שולם':'טרם'}</span></td>
      <td>${r.note||''}</td>
    </tr>`).join('');

  document.getElementById('costsWrap').innerHTML = `
    <div class="tr-intro">כל הוצאות הטיול ממקור אחד. בחרי קטגוריה לבודד נושא — הסיכומים מתעדכנים.</div>
    ${cards}
    ${bar}
    <h3 class="tr-sec">פירוט — ${scope}</h3>
    <div class="tw" style="padding:0"><table class="cost-table"><thead><tr><th>קטגוריה</th><th>פריט</th><th>מקור</th><th>₪ (משוער)</th><th>תשלום</th><th>הערות</th></tr></thead>
      <tbody>${detail}<tr class="cost-total"><td colspan="3">סה״כ · ${scope}</td><td>${fmtILS(total)}</td><td colspan="2"></td></tr></tbody></table></div>
    ${(costsFilter==='all'||costsFilter==='מלונות ולינה')?hotelChart():''}
    <div class="cost-note">שערי המרה משוערים: 1¥≈₪0.024 · 1$≈₪3.7. הסכומים במטבע המקור מדויקים מהמסמכים; ההמרה ל-₪ משוערת.</div>`;
}

// דף תחבורה מרכזי
