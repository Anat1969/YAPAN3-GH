function fmtDate(iso){ if(!iso) return ''; const [y,m,d]=iso.split('-'); return `${+d}/${+m}`; }

// הפרש בדקות בין שתי שעות HH:MM
function minsBetween(a,b){ if(!a||!b) return null; const [ah,am]=a.split(':').map(Number),[bh,bm]=b.split(':').map(Number); return (bh*60+bm)-(ah*60+am); }

function renderTransport() {
  const F = DATA.flights || [];
  const T = DATA.transport || {};
  const flights = F.filter(f=>f.type&&f.type.includes('טיסה'));

  // ── כרטיסי טיסות ──
  const flightCards = flights.map(f=>{
    const hasTime = f.dep && f.arr;
    const dur = hasTime ? minsBetween(f.dep,f.arr) : null;
    return `<div class="tr-card">
      <div class="tr-card-head">
        ${icon('plane','tr-hic')}
        <div class="tr-route"><b>${f.from}</b> ${icon('arrow-l')} <b>${f.to}</b></div>
        <span class="tr-date">${fmtDate(f.date)}</span>
      </div>
      <div class="tr-grid">
        ${f.flightNo?`<div><span>טיסה</span>${f.flightNo}${f.airline?' · '+f.airline:''}</div>`:''}
        ${hasTime?`<div><span>יציאה → נחיתה</span>${f.dep} → ${f.arr}${dur?` (${Math.floor(dur/60)}:${String(dur%60).padStart(2,'0')} שע׳)`:''}</div>`:''}
        ${f.toTerminal?`<div><span>טרמינל יעד</span>${f.toTerminal}</div>`:''}
        ${f.arriveBefore?`<div><span>להגיע לשדה</span>${f.arriveBefore}</div>`:''}
        ${f.hotelToAirport?`<div><span>מהמלון לשדה</span>${f.hotelToAirport}</div>`:''}
        ${f.connection?`<div class="tr-full"><span>זמן מעבר</span>${f.connection}</div>`:''}
      </div>
      ${f.notes?`<div class="tr-note">${f.notes}</div>`:''}
      ${!hasTime?`<div class="tr-alert st-warn-txt">${icon('alert')} חסרים פרטי שעות — יש להשלים</div>`:''}
    </div>`;
  }).join('');

  // ── רכב שכור ──
  let carHtml = '';
  if (T.carRental && T.carRental.active) {
    const c = T.carRental;
    carHtml = `<div class="tr-card">
      <div class="tr-card-head">${icon('car','tr-hic')}<div class="tr-route"><b>רכב שכור — הוקאידו</b></div>
      <span class="tr-date">${fmtDate(c.from)} – ${fmtDate(c.to)}</span></div>
      <div class="tr-grid">
        <div><span>${icon('pin')} איסוף</span>${c.pickup.location} · ${fmtDate(c.pickup.date)}</div>
        <div><span>${icon('pin')} החזרה</span>${c.dropoff.location} · ${fmtDate(c.dropoff.date)}</div>
        <div class="tr-full"><span>אחרי הנחיתה (איסוף)</span>${c.pickup.process}</div>
        <div class="tr-full"><span>זמן החזרה מומלץ</span>${c.dropoff.recommendedReturn}</div>
      </div>
      ${c.oneWay?`<div class="tr-note">${icon('alert')} השכרה חד-כיוונית (${c.pickup.locationEn} → ${c.dropoff.locationEn}) — ודאי דמי one-way. ${c.note}</div>`:''}
    </div>`;
  }

  // ── שאטל נריטה ──
  let shuttleHtml = '';
  if (T.shuttle && T.shuttle.narita) {
    const s = T.shuttle.narita;
    shuttleHtml = `<div class="tr-card">
      <div class="tr-card-head">${icon('shuttle','tr-hic')}<div class="tr-route"><b>${s.name}</b></div>
      <span class="tr-date">${fmtDate(s.date)}</span></div>
      <div class="tr-badge-primary">${icon('check')} אמצעי ראשי מנריטה למלון</div>
      <div class="tr-grid">
        <div><span>יעד</span>${s.hotel}</div>
        <div><span>אחרי טיסה</span>${s.afterFlight}</div>
        <div class="tr-full"><span>נקודת איסוף</span>${s.pickupPoint}</div>
        <div class="tr-full"><span>זיהוי + הזמנה</span>${s.identify} · ${s.needsReservation}</div>
      </div>
      <div class="tr-note"><b>חלופות אם מפספסים:</b><ul>${s.alternatives.map(a=>`<li>${a}</li>`).join('')}</ul></div>
    </div>`;
  }

  // ── מקרא ──
  const legend = (T.legend||[]).map(l=>`<span><i style="background:${l.color}"></i>${l.he}</span>`).join('');

  // תצוגת רשימה — אותו מקור נתונים (סעיף 3.3), היררכיה קבועה: יעד → נתון → תאריך → משני
  const rows = [];
  flights.forEach(f=>rows.push({ic:'plane',main:`${f.from} → ${f.to}`,val:f.flightNo||'טיסה',date:fmtDate(f.date),sub:f.dep&&f.arr?`${f.dep}–${f.arr}${f.toTerminal?' · '+f.toTerminal:''}`:'פרטים להשלמה'}));
  if (T.carRental&&T.carRental.active){const c=T.carRental;rows.push({ic:'car',main:'רכב שכור — הוקאידו',val:'חד-כיווני',date:`${fmtDate(c.from)}–${fmtDate(c.to)}`,sub:`${c.pickup.location} → ${c.dropoff.location}`});}
  if (T.shuttle&&T.shuttle.narita){const s=T.shuttle.narita;rows.push({ic:'shuttle',main:s.name,val:'ראשי',date:fmtDate(s.date),sub:s.hotel});}
  const listHtml = rows.map(r=>`<div class="tr-row">
    <span class="trr-ic">${icon(r.ic)}</span>
    <span class="trr-main">${r.main}</span>
    <span class="trr-val">${r.val}</span>
    <span class="trr-date">${r.date}</span>
    <span class="trr-sub">${r.sub}</span>
  </div>`).join('');

  const cardsView = `
    <h3 class="tr-sec">✈️ טיסות</h3>
    <div class="tr-cards">${flightCards}</div>
    ${carHtml?`<h3 class="tr-sec">🚗 רכב שכור</h3><div class="tr-cards">${carHtml}</div>`:''}
    ${shuttleHtml?`<h3 class="tr-sec">🚐 שאטל</h3><div class="tr-cards">${shuttleHtml}</div>`:''}`;

  document.getElementById('transportWrap').innerHTML = `
    <div class="view-bar"><div class="tr-intro">כל התחבורה של הטיול במקום אחד — טיסות, רכב שכור, שאטלים.</div>${viewToggle()}</div>
    ${legend?`<div class="tr-legend">${legend}</div>`:''}
    ${viewMode==='cards' ? cardsView : `<div class="tr-list">${listHtml}</div>`}
    ${transitSavings()}
  `;
}

// המלצות חיסכון בתחבורה ציבורית — חישוב אמיתי (רכב בהוקאידו לא נכלל, סעיף 10)
function transitSavings() {
  // ספירת נסיעות תח״צ (train/metro/bus) לפי אזור — רכב וטיסה לא נספרים
  const reg = {};
  DATA.days.forEach(d=>{
    (d.transport?.segments||[]).forEach(s=>{
      if(['train','metro','bus'].includes(s.mode)){
        const r = d.region||'';
        reg[r] = reg[r] || {rides:0, days:new Set()};
        reg[r].rides++; reg[r].days.add(d.tripDay);
      }
    });
  });
  const AVG_FARE = 240;  // ¥ ממוצע לנסיעה (הערכה)
  const recs = [];
  // קנסאי — ICOCA (IC) מול בודדים; אין יומי משתלם ברור → IC נוחות
  if(reg.kansai){
    const rides=reg.kansai.rides, single=rides*AVG_FARE;
    recs.push({name:'ICOCA (כרטיס IC)', area:'קנסאי · אוסקה/קיוטו', validity:'ללא הגבלת זמן', price:'2,000¥ (כולל 1,500¥ ערך + פיקדon 500¥)',
      covers:`${rides} נסיעות ב-${reg.kansai.days.size} ימים`, without:`~${single.toLocaleString()}¥`, with:`~${single.toLocaleString()}¥ (טעינה)`,
      saving:'נוחות בעיקר — אין הנחה, אך חוסך קניית כרטיס בכל נסיעה', limits:'הפיקדon מוחזר בהחזרה', link:'https://www.westjr.co.jp/global/en/ticket/icoca-haruka/',
      verdict:'מומלץ לנוחות'});
  }
  // טוקיו — Tokyo Subway 72h pass מול בודדים
  if(reg.tokyo){
    const rides=reg.tokyo.rides, single=rides*AVG_FARE, pass=1500; // 72h ל-4 אנשים = 6000, אבל לאדם 1500
    const saving = single - pass;
    recs.push({name:'Tokyo Subway 72-hour Ticket', area:'טוקיו · מטרו', validity:'72 שעות', price:'1,500¥ לאדם (×4 = 6,000¥)',
      covers:`${rides} נסיעות ב-${reg.tokyo.days.size} ימים במטרו`, without:`~${single.toLocaleString()}¥ לאדם`, with:'1,500¥ לאדם',
      saving: saving>0?`~${saving.toLocaleString()}¥ לאדם`:'שולי — לבדוק מול נסיעות בפועל', limits:'מטרו בלבד (Tokyo Metro + Toei), לא JR', link:'https://www.tokyometro.jp/en/ticket/travel/',
      verdict: saving>0?'כדאי לבדוק':'גבולי'});
  }

  if(!recs.length) return '';
  const cards = recs.map(r=>`<div class="ts-card">
    <div class="ts-head"><b>${r.name}</b><span class="ts-verdict">${r.verdict}</span></div>
    <div class="ts-grid">
      <div><span>אזור</span>${r.area}</div>
      <div><span>תוקף</span>${r.validity}</div>
      <div><span>מחיר</span>${r.price}</div>
      <div><span>מכסה</span>${r.covers}</div>
      <div><span>ללא הכרטיס</span>${r.without}</div>
      <div><span>עם הכרטיס</span>${r.with}</div>
      <div class="ts-full"><span>חיסכון צפוי</span>${r.saving}</div>
      <div class="ts-full"><span>מגבלות</span>${r.limits}</div>
    </div>
    <a class="tr-nav-link" href="${r.link}" target="_blank" rel="noopener">מידע רשמי ›</a>
  </div>`).join('');
  return `<h3 class="tr-sec">המלצות חיסכון בתחבורה ציבורית</h3>
    <div class="tr-intro" style="margin-bottom:8px">חישוב לפי מספר הנסיעות בפועל במסלול. רכב בהוקאידו (2-14/8) אינו נכלל.</div>
    <div class="ts-cards">${cards}</div>
    <div class="cost-note">המחירים והחיסכון משוערים (ממוצע ~240¥/נסיעה). לבדוק מול המחיר בפועל לפני רכישה. <b>לא ממליץ על JR Pass אוטומטית</b> — לא משתלם למסלול הזה (רוב הנסיעות מקומיות, לא בין-עירוניות ברכבת).</div>`;
}

// ══════════════════════════════════
// דף הזמנות — ציר זמן
// ══════════════════════════════════
function copyRef(ref, btn) {
  navigator.clipboard.writeText(ref).then(()=>{
    const t = btn.textContent; btn.textContent = 'הועתק ✓'; btn.classList.add('ok');
    setTimeout(()=>{ btn.textContent = t; btn.classList.remove('ok'); }, 1500);
  }).catch(()=>toast('לא ניתן להעתיק'));
}

function statusBadge(st) {
  if (st === 'confirmed') return `<span class="bk-status bk-ok">מאושר</span>`;
  return `<span class="bk-status bk-pend">ממתין להזמנה</span>`;
}

// שורת מספר אישור + כפתור העתקה, או "חסר — יש להשלים"
function refRow(ref) {
  if (ref) return `<div class="bk-field"><span>מספר אישור</span><b class="bk-ref">${ref}</b> <button class="bk-copy" onclick="copyRef('${ref}',this)">העתק</button></div>`;
  return `<div class="bk-field bk-missing"><span>מספר אישור</span>חסר — יש להשלים</div>`;
}

function renderBookings() {
  const B = DATA.bookings;
  const el = document.getElementById('bookingsWrap');
  if (!B || !B.bookings) { el.innerHTML = '<div class="tr-intro">אין נתוני הזמנות.</div>'; return; }

  // התראות בראש המסך — מבנה חדש: {date, severity, text} ברמה העליונה
  const rawAlerts = B.alerts || B.summary?.alerts || [];
  const alerts = rawAlerts.map(a=>{
    if (typeof a === 'string') return `<li>${a}</li>`;
    const dt = a.date && a.date!=='general' ? `<b>${fmtDate(a.date)}:</b> ` : (a.date==='general'?'<b>כללי:</b> ':'');
    const cls = a.severity==='high' ? ' bk-alert-high' : '';
    return `<li class="${cls}">${dt}${a.text||''}</li>`;
  }).join('');
  const alertsHtml = alerts ? `<div class="bk-alerts"><h3>התראות חשובות</h3><ul>${alerts}</ul></div>` : '';

  // מיון לפי תאריך (מלון = checkin, טיסה = date, רכב = pickup.date)
  const dateOf = b => b.date || b.checkin || b.pickup?.date || '9999';
  const sorted = [...B.bookings].sort((a,b)=>dateOf(a).localeCompare(dateOf(b)));

  const cards = sorted.map(b => {
    let body = '';
    if (b.type === 'flight') {
      const legs = b.legs
        ? b.legs.map(l=>`<div class="bk-field"><span>${l.flight}</span>${l.from} → ${l.to} · ${l.departure}–${l.arrival}${l.seats?` · מושבים ${Object.values(l.seats).join(', ')}`:''}</div>`).join('')
        : `<div class="bk-field"><span>מסלול</span>${b.route?.from||''} → ${b.route?.to||''}</div>
           ${b.departure?`<div class="bk-field"><span>שעות</span>${b.departure} → ${b.arrival}${b.arrivalDate?' (למחרת)':''}</div>`:''}
           ${b.seats&&Object.values(b.seats).some(Boolean)?`<div class="bk-field"><span>מושבים</span>${Object.entries(b.seats).filter(([,v])=>v).map(([k,v])=>v).join(', ')}</div>`:''}`;
      body = `<div class="bk-field"><span>טיסה</span>${b.flightNumber||''} · ${b.provider||''}</div>${legs}${refRow(b.bookingRef)}`;
    } else if (b.type === 'hotel') {
      body = `<div class="bk-field"><span>תאריכים</span>${fmtDate(b.checkin)} → ${fmtDate(b.checkout)} · ${b.nights} לילות</div>
        ${b.rooms||b.roomType?`<div class="bk-field"><span>חדרים</span>${b.rooms?b.rooms+' × ':''}${b.roomType||''}</div>`:''}
        ${b.checkinTime||b.checkoutTime?`<div class="bk-field"><span>צ׳ק-אין / אאוט</span>${b.checkinTime||'—'} · יציאה ${b.checkoutTime||'—'}</div>`:''}
        ${b.meals?`<div class="bk-field"><span>ארוחות</span>${b.meals}</div>`:''}
        ${b.parking?`<div class="bk-field"><span>חניה</span>${b.parking}</div>`:''}
        ${refRow(b.bookingRef)}
        ${b.pin?`<div class="bk-field"><span>קוד כניסה</span><b class="bk-ref">${b.pin}</b> <button class="bk-copy" onclick="copyRef('${b.pin}',this)">העתק</button></div>`:''}`;
    } else if (b.type === 'car') {
      body = `<div class="bk-field"><span>ספק</span>${b.provider||''} · ${b.car||b.carModel||''}</div>
        <div class="bk-field"><span>איסוף</span>${fmtDate(b.pickup.date)} ${b.pickup.time} · ${b.pickup.location}</div>
        <div class="bk-field"><span>החזרה</span>${fmtDate(b.dropoff.date)} ${b.dropoff.time} · ${b.dropoff.location}</div>
        ${b.includes&&b.includes.length?`<div class="bk-field"><span>כולל</span>${b.includes.join(' · ')}</div>`:''}
        ${refRow(b.bookingRef)}
        ${b.warning?`<div class="bk-warn">${b.warning}</div>`:''}`;
    }
    const typeLabel = {flight:'טיסה', hotel:'מלון', car:'רכב שכור'}[b.type] || b.type;
    return `<div class="bk-card ${b.status==='pending'?'bk-card-pend':''}">
      <div class="bk-head">
        <span class="bk-date">${fmtDate(dateOf(b))}</span>
        <span class="bk-type">${typeLabel}</span>
        <span class="bk-name">${b.name || (b.route?`${b.route.fromCode} → ${b.route.toCode}`:'') || (b.type==='car'?'רכב שכור — הוקאידו':'')}</span>
        ${statusBadge(b.status)}
      </div>
      <div class="bk-body">${body}</div>
      ${b.notes?`<div class="bk-note">${b.notes}</div>`:''}
    </div>`;
  }).join('');

  // סיכום מחושב מהנתונים (מקור אמת יחיד)
  const conf = B.bookings.filter(b=>b.status==='confirmed').length;
  const pend = B.bookings.filter(b=>b.status==='pending').length;
  const summaryLine = `<div class="bk-summary">${conf} הזמנות מאושרות${pend?` · ${pend} ממתינות להזמנה`:''}</div>`;

  el.innerHTML = `${alertsHtml}
    <div class="tr-intro">כל ההזמנות של הטיול לפי ציר זמן.</div>
    ${summaryLine}
    <div class="bk-timeline">${cards}</div>`;
}

// ══════════════════════════════════
// לקראת הזמנה — checklist
// ══════════════════════════════════
function clStatus(item, day){
  // סטטוס נשמר ב-localStorage (הקובץ סטטי)
  const key = 'cl-'+day+'-'+item;
  return localStorage.getItem(key) || null;
}
function toggleChecklist(item, day, orig){
  const key = 'cl-'+day+'-'+item;
  const cur = clStatus(item,day) || orig;
  localStorage.setItem(key, cur==='booked' ? 'pending' : 'booked');
  renderChecklist();
}
function renderChecklist(){
  const C = DATA.checklist;
  const el = document.getElementById('checklistWrap');
  if(!C || !C.items){ el.innerHTML='<div class="tr-intro">אין נתוני צ׳קליסט.</div>'; return; }
  // מיון לפי יום
  const items = [...C.items].sort((a,b)=>(a.day||0)-(b.day||0));
  let booked=0;
  const rows = items.map(it=>{
    const st = clStatus(it.item, it.day) || it.status || 'pending';
    if(st==='booked') booked++;
    const link = it.url ? `<a href="${/^https?:/.test(it.url)?it.url:'https://'+it.url}" target="_blank" rel="noopener" class="cl-link">${it.url}</a>` : '';
    return `<div class="cl-row ${st==='booked'?'cl-done':''}">
      <span class="bk-status ${st==='booked'?'bk-ok':'bk-pend'}">${st==='booked'?'הוזמן':'ממתין'}</span>
      <span class="cl-name">${it.item}</span>
      <span class="cl-meta">יום ${it.day||'—'}${it.date?' · '+it.date:''}</span>
      <span class="cl-cost">${it.cost||''}</span>
      ${link}
      <button class="cl-btn" onclick="toggleChecklist('${it.item.replace(/'/g,'')}',${it.day},'${st}')">${st==='booked'?'בטל':'סמן כהוזמן'}</button>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="tr-intro">אטרקציות ופעילויות שדורשות הזמנה מראש. סמני כל פריט כשהוזמן.</div>
    <div class="bk-summary">${booked}/${items.length} הוזמנו · עלות נוספת כוללת: ${C.totalAdditionalCost||''}</div>
    <div class="cl-list">${rows}</div>
    <div class="cl-total">סה״כ עלות נוספת: <b>${C.totalAdditionalCost||''}</b></div>`;
}

// ══════════════════════════════════
// EDIT CELL
// ══════════════════════════════════
function editCell(el) {
  const path = el.dataset.path;
  if (!path) return;
  const parts = path.split('.');
  const collection = parts[0];
  const id = +parts[1];
  const field = parts.slice(2).join('.');

  const arr = DATA[collection];
  if (!arr) return;
  const item = arr.find(x => x.id === id);
  if (!item) return;

  const keys = field.split('.');
  let obj = item;
  for (let i=0; i<keys.length-1; i++) {
    if (!obj[keys[i]]) obj[keys[i]] = {};
    obj = obj[keys[i]];
  }
  obj[keys[keys.length-1]] = el.textContent;
  toast('נשמר');
  // רינדור מחדש כדי שכל הנתונים הנגזרים (סיכומים, תקציב, hero) יתעדכנו בזמן אמת
  render();
}

// ══════════════════════════════════
// MAP (Leaflet)
// ══════════════════════════════════
// ── דף מפה: 4 תצוגות על אותה מפה ──
let mapView = localStorage.getItem('mapView') || 'days';
let mapLayer = null, specLayer = null, mapSpecObj = null;
let mapPlaceTypes = new Set();    // סינון סוגי אתרים (מקרא-סינון)
const MODE_COLOR_M = {train:'#1d4ed8', metro:'#2563eb', shinkansen:'#1e3a8a', walk:'#15803d', bus:'#b45309', car:'#6b7280', flight:'#b91c1c', taxi:'#7c3aed', shuttle:'#0891b2'};
const MODE_HE_M = {walk:'הליכה', metro:'מטרו', train:'רכבת', bus:'אוטובוס', car:'רכב', taxi:'מונית', shuttle:'שאטל', flight:'טיסה', shinkansen:'שינקנסן'};
const bilingual = (he, en) => `<b style="font-size:13px">${he||en||''}</b>${en&&en!==he?`<br><span style="font-size:11px;color:#666;direction:ltr">${en}</span>`:''}`;
// רקע נקי (CARTO light) + שכבת תוויות באנגלית (Esri) — שמות מקומות באנגלית בלבד, לא יפנית
function tile(m){
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/light_nolabels/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap © CARTO',subdomains:'abcd',maxZoom:20}).addTo(m);
  L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',{attribution:'Labels © Esri',maxZoom:20,pane:'overlayPane'}).addTo(m);
  return m;
}

function initMap() {
  if (mapObj) { setTimeout(()=>{mapObj.invalidateSize(); mapSpecObj&&mapSpecObj.invalidateSize(); renderMapLayer();},80); return; }
  setTimeout(() => {
    mapObj = L.map('map').setView([37,138],5); tile(mapObj);
    mapSpecObj = L.map('mapSpec').setView([35,137],5); tile(mapSpecObj);
    document.querySelectorAll('.mvb').forEach(b=>b.classList.toggle('on', b.dataset.view===mapView));
    buildDaySelector();
    renderMapLayer();
  }, 100);
}

function setMapView(v) {
  mapView = v;
  localStorage.setItem('mapView', v);
  document.querySelectorAll('.mvb').forEach(b=>b.classList.toggle('on', b.dataset.view===v));
  document.getElementById('mapDaySel').style.display = 'none';  // הבחירה נעשית ישירות על המפה
  document.getElementById('mapPlaceFilters').style.display = 'none';
  // כותרות לפי תצוגה (סעיף 4.6)
  const gt=document.getElementById('mapGlobalTitle'), st=document.getElementById('mapSpecTitle');
  if(v==='days'){ gt.textContent='בחירת יום — לחץ יום'; st.textContent='פירוט היום הנבחר'; }
  else if(v==='nights'){ gt.textContent='כל הלינות'; st.textContent='פרטי הלינה הנבחרת'; }
  else if(v==='transport'){ gt.textContent='כל מקטעי התחבורה'; st.textContent='פירוט המקטע'; }
  else if(v==='places'){ gt.textContent='כל האתרים'; st.textContent='פירוט האתר'; }
  renderMapLayer();
}

function resetMapFilters() {
  mapPlaceTypes.clear();
  document.getElementById('mapDaySel').value = 'all';
  renderMapLayer();
}
function buildDaySelector() {
  const sel = document.getElementById('mapDaySel');
  const opts = ['<option value="all">כל הימים</option>'];
  DATA.days.filter(hasGeo).forEach(d=>opts.push(`<option value="${d.id}">יום ${d.tripDay} — ${d.day}/${d.month} ${dayCity(d)}</option>`));
  sel.innerHTML = opts.join('');
}
function hasGeo(d){ return (d.transport?.segments||[]).length>0; }

// סימן גדול נושא-מידע (מספר/תאריך/סמל בתוכו)
function bigMarker(latlng, opts) {
  const { text='', color='#1d4ed8', shape='circle', size=32, popup='', aria='', onClick, fontSize=13 } = opts;
  const radius = shape==='circle' ? '50%' : '5px';
  const html = `<div style="width:${size}px;height:${size}px;border-radius:${radius};background:${color};color:#fff;border:2.5px solid #fff;box-shadow:0 1px 5px rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;font:900 ${fontSize}px/1 'Noto Sans Hebrew',sans-serif;opacity:.9;text-align:center" role="button" aria-label="${aria}" tabindex="0">${text}</div>`;
  const mk = L.marker(latlng, {icon:L.divIcon({className:'',html,iconSize:[size,size],iconAnchor:[size/2,size/2]}), keyboard:true});
  if (popup) mk.bindPopup(popup);
  if (onClick) mk.on('click', onClick);
  return mk;
}

// ציור שתי המפות לפי התצוגה
function renderMapLayer() {
  if (!mapObj) return;
  if (mapLayer) mapObj.removeLayer(mapLayer);
  if (specLayer) mapSpecObj.removeLayer(specLayer);
  mapLayer = L.layerGroup().addTo(mapObj);
  specLayer = L.layerGroup().addTo(mapSpecObj);
  const legend = [];

  if (mapView==='days') renderMapDays(legend);
  else if (mapView==='nights') renderMapNights(legend);
  else if (mapView==='transport') renderMapTransport(legend);
  else if (mapView==='places') renderMapPlaces(legend);

  renderMapLegend(legend);
  renderDiversity();
  renderGaps();
  setTimeout(()=>{ mapObj.invalidateSize(); mapSpecObj.invalidateSize(); },60);
}

// מקרא — פעיל כמסנן בתצוגת אתרים, אינפורמטיבי בשאר (סעיף 7,8)
function renderMapLegend(legend) {
  const box = document.getElementById('mapLegendBox');
  if (mapView==='places') {
    const allOn = mapPlaceTypes.size===0;
    box.innerHTML = `<button class="leg-all${allOn?' on':''}" onclick="showAllTypes()">הצג הכול</button>` +
      legend.map(l=>`<button class="leg-item filterable${mapPlaceTypes.has(l.key)?' on':''}" onclick="togglePlaceType('${l.key}')" aria-pressed="${mapPlaceTypes.has(l.key)}">
        <i class="${l.shape||'circle'}" style="background:${l.color}"></i>${l.label}</button>`).join('') +
      (mapPlaceTypes.size?`<button class="leg-all" onclick="showAllTypes()">איפוס</button>`:'');
  } else {
    box.innerHTML = legend.map(l=>`<span class="leg-item"><i class="${l.shape||'circle'}" style="background:${l.color}"></i>${l.label}</span>`).join('');
  }
}
function togglePlaceType(t){ mapPlaceTypes.has(t)?mapPlaceTypes.delete(t):mapPlaceTypes.add(t); renderMapLayer(); }
function showAllTypes(){ mapPlaceTypes.clear(); renderMapLayer(); }

// מיקוד המפה הספציפית לפי בחירה במפה הגלובלית
function focusSpec(pts, title) {
  if (title !== null && title !== undefined) document.getElementById('mapSpecTitle').textContent = title;
  if (specLayer) mapSpecObj.removeLayer(specLayer);
  specLayer = L.layerGroup().addTo(mapSpecObj);
  return specLayer;
}

// ── תצוגה 1: ימים — מספר היום בתוך הסימן (גלובלי), תחנות ממוספרות (ספציפי) ──
let activeDayId = null;
let dayMarkers = [];

// מרכז הפעילות של יום (ממוצע הספוטים) — כדי למקם את סימן היום ברובע הנכון (סעיף 2.5)
function dayCentroid(d){
  const pts=[];
  d.transport.segments.forEach(s=>{ pts.push([s.to.lat,s.to.lng]); });
  if(!pts.length) return [d.transport.segments[0].from.lat, d.transport.segments[0].from.lng];
  return [pts.reduce((a,p)=>a+p[0],0)/pts.length, pts.reduce((a,p)=>a+p[1],0)/pts.length];
}
function daysMainMode(d){
  const c={}; d.transport.segments.forEach(s=>c[s.mode]=(c[s.mode]||0)+1);
  return Object.entries(c).sort((a,b)=>b[1]-a[1])[0]?.[0];
}

// ── מפה ימנית: בחירת עיר+יום. סימן לכל יום עם מספר+תאריך+עיר, ממוקם באזור הפעילות ──
function renderMapDays(legend) {
  const geoDays = DATA.days.filter(hasGeo);
  const allPts=[]; dayMarkers=[];
  geoDays.forEach(d=>{
    const [lat,lng] = dayCentroid(d);   // מרכז הפעילות — לא נקודה אקראית
    const sites = d.transport.segments.length;
    const mainMode = MODE_HE_M[daysMainMode(d)]||'';
    // ריחוף מפורט (סעיף 8.1)
    const popup = `${bilingual('יום '+d.tripDay,dayCity(d))}<br><span style="font-size:11px">${d.day}/${d.month} · ${d.regionHe||''}${d.title?' · '+d.title:''}</span><br><span style="font-size:11px">${sites} תחנות · ${mainMode}</span><br><a href="day.html?d=${d.tripDay}" style="font-size:11px;color:#1d4ed8">לדף היום ›</a>`;
    // סימן יום — עיגול גדול עם מספר היום (סעיף 5.3,5.4: יום = עיגול גדול)
    const mk = bigMarker([lat,lng], {text:String(d.tripDay), color:'#1d4ed8', shape:'circle', size:38, fontSize:15, popup, aria:`יום ${d.tripDay} — ${dayCity(d)} · ${d.day}/${d.month}`,
      onClick:()=>selectDay(d.id)}).addTo(mapLayer);
    dayMarkers.push({id:d.id, marker:mk});
    allPts.push([lat,lng]);
  });
  if(allPts.length) mapObj.fitBounds(L.latLngBounds(allPts).pad(0.12));
  legend.push({label:'יום בטיול (עיגול)', color:'#1d4ed8', shape:'circle'}, {label:'אתר ביום (ריבוע)', color:'#7c3aed', shape:'square'}, {label:'מלון/מוצא', color:'#1a1a1a', shape:'circle'});
  // בחר יום פעיל (השמור או הראשון)
  const start = geoDays.find(d=>d.id===activeDayId) || geoDays[0];
  if(start) selectDay(start.id, true);
}

// בחירת יום — מדגיש בימין, מפרט בשמאל (סעיף 3)
function selectDay(id, skipFly){
  activeDayId = id;
  // הדגשה: יום נבחר בולט, השאר עמומים
  dayMarkers.forEach(dm=>{
    const el = dm.marker.getElement()?.querySelector('div');
    if(el) el.style.opacity = dm.id===id ? '1' : '.4';
  });
  const d = DATA.days.find(x=>x.id===id);
  if(d) showDaySpecific(d);
}

// ── מפה שמאלית: פירוט היום הנבחר. אתרים ממוספרים 1,2,3 (נפרד ממספר היום) ──
function showDaySpecific(d) {
  if(!d) return;
  // כותרת מעל שמאל (סעיף 3.4)
  document.getElementById('mapSpecTitle').innerHTML =
    `יום ${d.tripDay} · ${d.day}/${d.month} · ${dayCity(d)}${d.title?` — ${d.title}`:''}`;
  const layer = focusSpec(null);
  const pts=[];
  d.transport.segments.forEach((seg,i)=>{
    const color=MODE_COLOR_M[seg.mode]||'#1d4ed8';
    L.polyline([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]],{color,weight:3.5,opacity:.75,dashArray:seg.mode==='walk'?'4,6':null}).addTo(layer)
      .bindPopup(`<b>${MODE_HE_M[seg.mode]||seg.mode}</b>${seg.totalMinutes?' · '+seg.totalMinutes+' דק׳':''}<br>${seg.from.name} → ${seg.to.name}`);
    // מלון/מוצא — עיגול שחור (סעיף 4.7)
    if(i===0) bigMarker([seg.from.lat,seg.from.lng],{text:'',color:'#1a1a1a',shape:'circle',size:24,popup:bilingual(seg.from.name,seg.from.nameEn),aria:'מוצא: '+seg.from.name}).addTo(layer);
    const last=i===d.transport.segments.length-1;
    // אתר — ריבוע סגול עם מספר סידורי בתוך היום (1,2,3 — נפרד ממספר היום, סעיף 4.4,5.4)
    const siteNum = i+1;
    const site = DATA.places.find(p=>p.nameEn && seg.to.nameEn && p.nameEn===seg.to.nameEn);
    const catInfo = site ? ` · ${placeCats(site)[0]}` : '';
    const durInfo = site?.duration ? ` · ${site.duration}` : '';
    const popup = last
      ? `${bilingual(seg.to.name,seg.to.nameEn)}<br><span style="font-size:11px">סיום/מלון</span>`
      : `${bilingual(seg.to.name,seg.to.nameEn)}<br><span style="font-size:11px">אתר ${siteNum}${seg.arrivalTime?' · '+seg.arrivalTime:''}${catInfo}${durInfo}</span>${site?`<br><a href="index.html?tab=places" style="font-size:11px;color:#1d4ed8">מידע מלא ›</a>`:''}`;
    bigMarker([seg.to.lat,seg.to.lng],{text:last?'':String(siteNum),color:last?'#1a1a1a':'#7c3aed',shape:last?'circle':'square',size:last?24:28,popup,aria:last?'סיום':`אתר ${siteNum}: ${seg.to.name}`}).addTo(layer);
    pts.push([seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]);
  });
  if(pts.length) mapSpecObj.fitBounds(L.latLngBounds(pts).pad(0.15));
}

// ── תצוגה 2: לילות — טווח תאריכים בתוך הסימן ──
function renderMapNights(legend) {
  const pts=[];
  DATA.hotels.forEach(h=>{
    if(!h.lat||!h.lng) return;
    const color = h.booked ? '#15803d' : '#b45309';
    const range = `${(h.checkin||'').slice(5).replace('-','/')}–${(h.checkout||'').slice(5).replace('-','/')}`;
    const popup = `${bilingual(h.he,h.name)}<br><span style="font-size:11px">${h.checkin} — ${h.checkout} · ${h.nights||''} לילות</span><br><a href="index.html?tab=hotels" style="font-size:11px;color:#1d4ed8">פרטי מלון ›</a>${h.pid||h.addr?` · <a href="${mapsLink(h)}" target="_blank" style="font-size:11px;color:#1d4ed8">ניווט</a>`:''}`;
    // סימן גדול עם טווח תאריכים בתוכו (סעיף 4.3)
    bigMarker([h.lat,h.lng],{text:range,color,shape:'square',size:52,fontSize:10,popup,aria:`${h.name} · ${range}`, onClick:()=>showHotelSpecific(h)}).addTo(mapLayer);
    pts.push([h.lat,h.lng]);
  });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts).pad(0.12));
  legend.push({label:'מלון מוזמן', color:'#15803d', shape:'square'}, {label:'טרם הוזמן', color:'#b45309', shape:'square'});
  showHotelSpecific(DATA.hotels.find(h=>h.lat));
}
function showHotelSpecific(h) {
  if(!h||!h.lat) return;
  const layer = focusSpec(null, `${h.he||h.name} · ${(h.checkin||'').slice(5)}–${(h.checkout||'').slice(5)}`);
  const color = h.booked?'#15803d':'#b45309';
  bigMarker([h.lat,h.lng],{text:'',color,shape:'square',size:26,popup:bilingual(h.he,h.name),aria:h.name}).addTo(layer);
  mapSpecObj.setView([h.lat,h.lng],13);
}

// ── תצוגה 3: תחבורה — סמל אמצעי + קווים צבועים ──
function renderMapTransport(legend) {
  const usedModes=new Set(); const pts=[];
  DATA.days.filter(hasGeo).forEach(d=>{
    d.transport.segments.forEach(seg=>{
      const color=MODE_COLOR_M[seg.mode]||'#888'; usedModes.add(seg.mode);
      const popup=`<b>${MODE_HE_M[seg.mode]||seg.mode}</b>${seg.totalMinutes?` · ${seg.totalMinutes} דק׳`:''}${seg.distanceKm?` · ${seg.distanceKm} ק״מ`:''}<br>${seg.from.name} → ${seg.to.name}<br><a href="${seg.mapsUrl}" target="_blank" style="font-size:11px;color:#1d4ed8">ניווט ›</a>`;
      const pl=L.polyline([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]],{color,weight:4,opacity:.7,dashArray:seg.mode==='walk'?'4,6':null}).addTo(mapLayer).bindPopup(popup);
      pl.on('click',()=>showSegSpecific(seg));
      pts.push([seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]);
    });
  });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts).pad(0.12));
  [...usedModes].forEach(m=>legend.push({label:MODE_HE_M[m]||m, color:MODE_COLOR_M[m]||'#888', shape:'line'}));
  focusSpec(null,'לחץ מקטע להצגה מפורטת');
}
function showSegSpecific(seg){
  const layer=focusSpec(null,`${MODE_HE_M[seg.mode]||seg.mode}: ${seg.from.name} → ${seg.to.name}`);
  const color=MODE_COLOR_M[seg.mode]||'#888';
  L.polyline([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]],{color,weight:5,opacity:.85,dashArray:seg.mode==='walk'?'4,6':null}).addTo(layer);
  bigMarker([seg.from.lat,seg.from.lng],{text:'',color:'#1a1a1a',size:22,aria:seg.from.name}).addTo(layer);
  bigMarker([seg.to.lat,seg.to.lng],{text:'',color,size:22,aria:seg.to.name}).addTo(layer);
  mapSpecObj.fitBounds(L.latLngBounds([[seg.from.lat,seg.from.lng],[seg.to.lat,seg.to.lng]]).pad(0.4));
}

// ── תצוגה 4: אתרים — סימן מינימלי, מקרא=סינון לפי סוג ──
// צבע קבוע לכל קטגוריה ראשית (סעיף 12.5)
const CAT_COLOR = {
  'טבע':'#15803d','היסטוריה':'#92400e','אדריכלות':'#57534e','תרבות ואמנות':'#7c3aed',
  'פעילות ספורטיבית':'#0891b2','סדנה והתנסות':'#b45309','קניות':'#db2777','אוכל':'#dc2626',
  'אתר דתי או רוחני':'#1e40af','טכנולוגיה ועתיד':'#0d9488','מלון ולינה':'#166534','תחנת מעבר':'#6b7280'
};
function placeCats(p){ return Array.isArray(p.category)?p.category:(p.category?[p.category]:[p.type||'אחר']); }

function renderMapPlaces(legend) {
  // ספירה לכל קטגוריה
  const catCount = {};
  DATA.places.forEach(p=>placeCats(p).forEach(c=>catCount[c]=(catCount[c]||0)+1));
  const cats = Object.keys(catCount).sort((a,b)=>catCount[b]-catCount[a]);

  const active = mapPlaceTypes.size
    ? DATA.places.filter(p=>placeCats(p).some(c=>mapPlaceTypes.has(c)))
    : DATA.places;
  const pts=[];
  active.forEach(p=>{
    if(!p.lat||!p.lng) return;
    const cat = placeCats(p)[0];
    const color = CAT_COLOR[cat]||'#3b82f6';
    const day = DATA.days.find(d=>d.id===p.dayId);
    const thumb = p.image?`<img src="${p.image}" style="width:100%;max-width:180px;border-radius:6px;margin-bottom:4px" alt="${p.name}">`:'';
    const popup=`${thumb}${bilingual(p.name,p.nameEn)}<br><span style="font-size:11px">${placeCats(p).join(' · ')}${p.dayId?` · יום ${p.dayId}`:''}${p.timeOfDay?` · ${p.timeOfDay}`:''}${p.duration?` · ${p.duration}`:''}</span><br><a href="index.html?tab=places" style="font-size:11px;color:#1d4ed8">מידע מלא ›</a>${p.pid||p.addr?` · <a href="https://www.google.com/maps/search/?api=1&hl=he&query=${encodeURIComponent(p.nameEn||p.name)}" target="_blank" style="font-size:11px;color:#1d4ed8">מפה</a>`:''}`;
    bigMarker([p.lat,p.lng],{text:'',color,shape:'square',size:22,popup,aria:`${p.name} — ${cat}`, onClick:()=>showPlaceSpecific(p)}).addTo(mapLayer);
    pts.push([p.lat,p.lng]);
  });
  if(pts.length) mapObj.fitBounds(L.latLngBounds(pts).pad(0.15));
  // מקרא-סינון: קטגוריה + ספירה (סעיף 12.4)
  cats.forEach(c=>legend.push({key:c, label:`${c} (${catCount[c]})`, color:CAT_COLOR[c]||'#3b82f6', shape:'square'}));
  focusSpec(null,'לחץ אתר להצגה מפורטת');
}
function showPlaceSpecific(p){
  const layer=focusSpec(null,`${p.name}${p.nameEn?' · '+p.nameEn:''}`);
  const color=CAT_COLOR[placeCats(p)[0]]||'#3b82f6';
  bigMarker([p.lat,p.lng],{text:'',color,shape:'square',size:24,popup:bilingual(p.name,p.nameEn),aria:p.name}).addTo(layer);
  mapSpecObj.setView([p.lat,p.lng],14);
}

// ── סיכום מגוון + ניתוח חוסרים (סעיף 8, 11) ──
const ESSENTIAL_CATS = ['היסטוריה','טבע','פעילות ספורטיבית','סדנה והתנסות','תרבות ואמנות','אדריכלות','קניות','אוכל'];
function renderDiversity() {
  const box = document.getElementById('mapDiversity');
  if (mapView!=='places') { box.innerHTML=''; return; }
  const catCount={};
  DATA.places.forEach(p=>placeCats(p).forEach(c=>catCount[c]=(catCount[c]||0)+1));
  const missing = ESSENTIAL_CATS.filter(c=>!catCount[c]);
  const chips = Object.entries(catCount).sort((a,b)=>b[1]-a[1])
    .map(([c,n])=>`<span class="mx-chip" style="border-right:3px solid ${CAT_COLOR[c]||'#888'}">${c}: <b>${n}</b></span>`).join('');
  const warn = missing.length
    ? `<div class="mx-warn">חסרות קטגוריות מהותיות: <b>${missing.join(', ')}</b> — כדאי לבדוק אם להוסיף למסלול (לא נוסף אוטומטית).</div>`
    : `<div class="mx-ok">כל הקטגוריות המהותיות מיוצגות במסלול ✓</div>`;
  box.innerHTML = `<div class="mx-box"><h4>מגוון האתרים</h4><div class="mx-chips">${chips}</div>${warn}</div>`;
}

// רשימת חוסרים + כפתור פרומפט (סעיף 8, 9)
function analyzeGaps() {
  const gaps = [];
  DATA.places.forEach(p=>{
    const missing = [];
    if(!p.nameEn) missing.push('שם באנגלית');
    if(!p.category||!placeCats(p).length) missing.push('קטגוריה');
    if(!p.dayId) missing.push('יום');
    if(!p.timeOfDay) missing.push('שעה');
    if(!p.duration) missing.push('משך ביקור');
    if(!p.lat||!p.lng) missing.push('מיקום');
    if(!p.image) missing.push('תמונה');
    if(!p.officialUrl) missing.push('אתר רשמי');
    if(missing.length) gaps.push({name:p.name, nameEn:p.nameEn||'', dayId:p.dayId, missing, existing:{type:p.type,city:p.city,category:placeCats(p).join('/')}});
  });
  return gaps;
}
function renderGaps() {
  const box = document.getElementById('mapGaps');
  if (mapView!=='places') { box.innerHTML=''; return; }
  const gaps = analyzeGaps();
  if(!gaps.length){ box.innerHTML=`<div class="mx-box mx-ok">אין מידע חסר — כל האתרים מלאים ✓</div>`; return; }
  const rows = gaps.map(g=>`<li><b>${g.name}</b>${g.nameEn?` <span style="color:#888;direction:ltr">${g.nameEn}</span>`:''} — חסר: ${g.missing.join(', ')}</li>`).join('');
  box.innerHTML = `<div class="mx-box">
    <div class="mx-gaps-head"><h4>מידע להשלמה (${gaps.length} אתרים)</h4>
      <button class="mvb-reset" onclick="copyMissingPrompt()" data-tip="יצירת פרומפט מוכן להעתקה לקלוד">צור פרומפט להשלמת מידע</button></div>
    <ul class="mx-gaps-list">${rows}</ul>
  </div>`;
}
function genMissingPrompt() {
  const gaps = analyzeGaps();
  let p = `השלם את המידע החסר עבור האתרים הבאים באפליקציית יפן. שמור על המסלול, התאריכים, המלונות, הטיסות והרכב שכבר נקבעו. עבור כל פריט השלם רק את השדות החסרים. השתמש במקורות אמינים ועדכניים, ציין מקור לכל נתון, ואל תמציא מידע שאינו ניתן לאימות.\n\n`;
  gaps.forEach((g,i)=>{
    p += `${i+1}. ${g.name}${g.nameEn?` (${g.nameEn})`:''}\n   קיים: ${g.existing.category}${g.existing.city?' · '+g.existing.city:''}${g.dayId?' · יום '+g.dayId:''}\n   חסר: ${g.missing.join(', ')}\n\n`;
  });
  return p;
}
function copyMissingPrompt() {
  navigator.clipboard.writeText(genMissingPrompt()).then(()=>toast('הפרומפט הועתק — הדביקי בצ׳אט חדש')).catch(()=>toast('לא ניתן להעתיק'));
}

async function saveAll() {
  // Download each JSON file
  for (const [name, data] of Object.entries(DATA)) {
    downloadJSON(data, name+'.json');
  }
  toast('כל הקבצים נשמרו');
}

function downloadJSON(data, filename) {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

function exportJSON() {
  downloadJSON(DATA, 'japan-trip-all.json');
  toast('JSON מלא יוצא');
}

function copyTable() {
  const table = document.querySelector('.panel.on table');
  if (!table) return;
  const rows = [];
  table.querySelectorAll('tr').forEach(tr => {
    const cells = [];
    tr.querySelectorAll('th, td').forEach(td => cells.push(td.textContent.trim()));
    rows.push(cells.join('\t'));
  });
  navigator.clipboard.writeText(rows.join('\n')).then(()=>toast('הועתק לאקסל'));
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000)}

loadData();

// הקשר היום עבור יוקו — היום התואם לתאריך של היום; אחרת היום הראשון במסלול
window.yukoDayContext = function(){
  var days = (DATA && DATA.days) || [];
  if (!days.length) return null;
  var today = new Date();
  var iso = today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') + '-' + String(today.getDate()).padStart(2,'0');
  return days.find(function(d){ return d.date === iso; }) || days[0];
};

// ── הוקים ליוקו: מעבר מסך + הצגת מקום על המפה ──
window.DATA = DATA; // חשיפה לקריאה מ-yuko.js (let לא נכנס אוטומטית ל-window)

window.yukoGoTab = function(tab){
  var valid = ['summary','days','calendar','hotels','bookings','checklist','places','costs','transport','map'];
  if (valid.indexOf(tab) === -1) return false;
  goTab(tab);
  return true;
};

// איתור מקום לפי שם (nameEn/name) — קודם ב-DATA.places, אחר כך בין ספוטי ומקטעי כל הימים
function yukoFindPlace(query){
  if(!query) return null;
  var q = String(query).trim().toLowerCase();
  var norm = function(s){ return String(s||'').trim().toLowerCase(); };
  var hit = function(o){ return o && ((norm(o.nameEn)===q)||(norm(o.name)===q)); };
  // התאמה דו-כיוונית: השם מוכל בשאילתה או להפך (המודל עשוי לשלוח שם מורחב עם עיר)
  var inc = function(o){
    if(!o) return false;
    var ne = norm(o.nameEn), nm = norm(o.name);
    return (ne && (ne.indexOf(q)>-1 || (q.indexOf(ne)>-1 && ne.length>=4))) ||
           (nm && (nm.indexOf(q)>-1 || (q.indexOf(nm)>-1 && nm.length>=4)));
  };
  var places = (DATA.places||[]);
  var p = places.find(hit) || places.find(inc);
  if(p && p.lat && p.lng) return { name:p.name, nameEn:p.nameEn, lat:p.lat, lng:p.lng, category:p.category, _place:p };
  // חיפוש בין ספוטים ומקטעי תחבורה של כל הימים (למשל עבודות טדאו אנדו שהן spots)
  var cand = [];
  (DATA.days||[]).forEach(function(d){
    var sp = d.spots||{};
    ['morning','afternoon','evening'].forEach(function(t){ (sp[t]||[]).forEach(function(s){ if(s&&s.lat&&s.lng) cand.push(s); }); });
    var segs = (d.transport&&d.transport.segments)||[];
    segs.forEach(function(sg){ if(sg.from&&sg.from.lat) cand.push(sg.from); if(sg.to&&sg.to.lat) cand.push(sg.to); });
  });
  var c = cand.find(hit) || cand.find(inc);
  if(c) return { name:c.name, nameEn:c.nameEn, lat:c.lat, lng:c.lng };
  return null;
}

// הצגת מקום על המפה: מעבר לטאב מפה, תצוגת אתרים, ומיקוד למקום. מחזיר false אם לא נמצא.
window.yukoShowPlace = function(query){
  var place = yukoFindPlace(query);
  if(!place) return false;
  goTab('map'); // קורא initMap (אסינכרוני ~100ms בפעם הראשונה)
  var attempt = 0;
  (function focus(){
    attempt++;
    if(typeof mapSpecObj!=='undefined' && mapSpecObj && typeof mapObj!=='undefined' && mapObj){
      try{ setMapView('places'); }catch(e){}
      try{
        if(place._place){ showPlaceSpecific(place._place); }
        else {
          // מקום שאינו ב-places — מיקוד ישיר + מרקר על מפת הפירוט
          var layer = focusSpec(null, place.name + (place.nameEn?(' · '+place.nameEn):''));
          bigMarker([place.lat,place.lng],{text:'',color:'#166534',shape:'square',size:24,popup:bilingual(place.name,place.nameEn||''),aria:place.name}).addTo(layer);
          mapSpecObj.setView([place.lat,place.lng],14);
        }
        mapObj.setView([place.lat,place.lng], 12);
      }catch(e){}
      return;
    }
    if(attempt<25) setTimeout(focus,80);
  })();
  return true;
};

// מיקוד המפה מפרמטר ?focus= (כשמגיעים מ-day.html דרך יוקו)
(function(){
  var f = new URLSearchParams(location.search).get('focus');
  if(f){ var tries=0; (function wait(){ tries++;
    if(DATA.days&&DATA.days.length){
      var ok = window.yukoShowPlace(f);
      if(ok===false) window.open('https://www.google.com/maps/search/?api=1&hl=he&query='+encodeURIComponent(f),'_blank','noopener');
    } else if(tries<40){ setTimeout(wait,100); }
  })(); }
})();
