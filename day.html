<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>יום 1 — אוסקה</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;600;700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans Hebrew',sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px;line-height:1.55;padding:0}

.head{background:#1a1a1a;color:#e8e6e1;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.head .num{font-size:36px;font-weight:900;line-height:1;color:#fbbf24}
.head .info{flex:1}
.head .date{font-size:18px;font-weight:700}
.head .sub{font-size:12px;color:#aaa}
.head .nav{display:flex;gap:6px}
.head .nb{padding:4px 10px;border:1px solid #555;border-radius:4px;background:transparent;color:#aaa;font:600 11px/1.4 inherit;cursor:pointer;text-decoration:none;transition:.12s}
.head .nb:hover{background:rgba(255,255,255,.1);color:#fff;border-color:#888}
.head .nb.sv{border-color:#166534;color:#4ade80}

.wrap{max-width:900px;margin:0 auto;padding:16px}

/* HOTEL BAR */
.hotel{background:#fff;border-radius:6px;padding:10px 14px;margin-bottom:12px;border:1px solid #e5e3de;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.hotel .hl{font-weight:700;font-size:14px}.hotel .ha{font-size:11px;color:#888;direction:ltr;text-align:right}
.hotel a{font-size:11px;color:#1d4ed8;text-decoration:none}.hotel a:hover{text-decoration:underline}

/* TIME BLOCKS */
.block{background:#fff;border-radius:6px;border:1px solid #e5e3de;margin-bottom:10px;overflow:hidden}
.block-head{padding:8px 14px;font-weight:700;font-size:13px;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px}
.bh-m{background:#fef2f2;color:#991b1b}
.bh-a{background:#fffbeb;color:#92400e}
.bh-e{background:#eef2ff;color:#3730a3}

.spot{padding:10px 14px;border-bottom:1px solid #f0f0ec}
.spot:last-child{border-bottom:none}
.spot-name{font-weight:700;font-size:14px;margin-bottom:2px}
.spot-name-en{font-size:11px;color:#888;font-weight:400}
.spot-meta{font-size:11px;color:#777;display:flex;gap:12px;flex-wrap:wrap;margin:4px 0}
.spot-meta span{white-space:nowrap}
.spot-notes{font-size:12px;color:#555;margin-top:4px}
.spot-links{display:flex;gap:8px;margin-top:6px}
.sl{font-size:11px;color:#1d4ed8;text-decoration:none;padding:2px 8px;border:1px solid #dbeafe;border-radius:3px;transition:.12s}
.sl:hover{background:#dbeafe}

.add-btn{width:100%;padding:6px;border:1px dashed #ccc;border-radius:4px;background:transparent;font:600 12px/1.4 inherit;color:#999;cursor:pointer;margin-bottom:10px;transition:.12s}
.add-btn:hover{border-color:#999;color:#666;background:#fafafa}

/* ROUTE MAP */
.map-section{margin-bottom:12px}
.map-section h2{font-size:14px;font-weight:700;margin-bottom:8px}
.map-frame{width:100%;height:400px;border:1px solid #e5e3de;border-radius:6px;overflow:hidden;background:#e8e6e1}
.map-frame iframe{width:100%;height:100%;border:none}
.route-links{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.rl{padding:4px 12px;border:1px solid #ddd;border-radius:4px;font:600 11px/1.4 inherit;color:#333;text-decoration:none;transition:.12s;background:#fff}
.rl:hover{background:#f0efec;border-color:#999}

/* MEALS */
.meals{background:#fff;border-radius:6px;border:1px solid #e5e3de;padding:10px 14px;margin-bottom:10px}
.meals h3{font-size:12px;font-weight:700;color:#666;margin-bottom:6px}
.meal-row{display:flex;gap:8px;margin-bottom:4px;align-items:center}
.meal-label{font-size:11px;font-weight:600;color:#999;width:50px}
.meal-input{flex:1;border:1px solid #eee;border-radius:3px;padding:4px 8px;font:12px/1.4 inherit;transition:.12s}
.meal-input:focus{outline:2px solid #fbbf24;border-color:#fbbf24}

/* TRANSPORT */
.transport{background:#fff;border-radius:6px;border:1px solid #e5e3de;padding:10px 14px;margin-bottom:10px}
.transport h3{font-size:12px;font-weight:700;color:#666;margin-bottom:6px}

/* NOTES */
.day-notes{width:100%;min-height:60px;border:1px solid #e5e3de;border-radius:6px;padding:10px 14px;font:13px/1.5 inherit;resize:vertical;transition:.12s}
.day-notes:focus{outline:2px solid #fbbf24;border-color:#fbbf24}

/* EDITABLE */
.ed{border:none;background:transparent;font:inherit;width:100%;padding:2px 4px;border-radius:3px;transition:.12s}
.ed:hover{background:#f5f5f0}
.ed:focus{background:#fffde7;outline:2px solid #fbbf24}

.toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%) translateY(50px);background:#292524;color:#fafaf9;padding:7px 16px;border-radius:5px;font-size:12px;opacity:0;transition:.2s;z-index:100;pointer-events:none}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
</style>
</head>
<body>

<div class="head">
  <div class="num" id="dayNum">1</div>
  <div class="info">
    <div class="date" id="dayDate">23 ביולי — יום רביעי</div>
    <div class="sub" id="dayRegion">קנסאי — אוסקה</div>
  </div>
  <div class="nav">
    <a class="nb" id="prevDay" href="#">היום הקודם</a>
    <a class="nb" href="index.html">חזרה ללוח</a>
    <a class="nb" id="nextDay" href="#">היום הבא</a>
    <button class="nb sv" onclick="saveDay()">שמור</button>
  </div>
</div>

<div class="wrap">

  <!-- HOTEL -->
  <div class="hotel" id="hotelBar"></div>

  <!-- ROUTE MAP -->
  <div class="map-section">
    <h2>מסלול היום</h2>
    <div class="map-frame" id="mapFrame">
      <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:13px">
        הוסיפי מיקומים — המפה תיבנה אוטומטית
      </div>
    </div>
    <div class="route-links" id="routeLinks"></div>
  </div>

  <!-- MORNING -->
  <div class="block">
    <div class="block-head bh-m">בוקר (09:00–12:00)</div>
    <div id="spots-morning"></div>
  </div>
  <button class="add-btn" onclick="addSpot('morning')">הוסף מיקום לבוקר</button>

  <!-- AFTERNOON -->
  <div class="block">
    <div class="block-head bh-a">צהריים (12:00–17:00)</div>
    <div id="spots-afternoon"></div>
  </div>
  <button class="add-btn" onclick="addSpot('afternoon')">הוסף מיקום לצהריים</button>

  <!-- EVENING -->
  <div class="block">
    <div class="block-head bh-e">ערב (17:00–22:00)</div>
    <div id="spots-evening"></div>
  </div>
  <button class="add-btn" onclick="addSpot('evening')">הוסף מיקום לערב</button>

  <!-- MEALS -->
  <div class="meals">
    <h3>אוכל</h3>
    <div class="meal-row"><span class="meal-label">בוקר</span><input class="meal-input" id="meal-b" placeholder="שם מסעדה / מקום"></div>
    <div class="meal-row"><span class="meal-label">צהריים</span><input class="meal-input" id="meal-l" placeholder="שם מסעדה / מקום"></div>
    <div class="meal-row"><span class="meal-label">ערב</span><input class="meal-input" id="meal-d" placeholder="שם מסעדה / מקום"></div>
    <div class="meal-row"><span class="meal-label">גלידה</span><input class="meal-input" id="meal-i" placeholder=""></div>
  </div>

  <!-- TRANSPORT -->
  <div class="transport">
    <h3>תחבורה</h3>
    <div class="meal-row"><span class="meal-label">סוג</span><input class="meal-input" id="tr-type" placeholder="רכבת / מטרו / הליכה / רכב"></div>
    <div class="meal-row"><span class="meal-label">מ-</span><input class="meal-input" id="tr-from" placeholder=""></div>
    <div class="meal-row"><span class="meal-label">אל</span><input class="meal-input" id="tr-to" placeholder=""></div>
    <div class="meal-row"><span class="meal-label">משך</span><input class="meal-input" id="tr-dur" placeholder=""></div>
    <div class="meal-row"><span class="meal-label">עלות</span><input class="meal-input" id="tr-cost" placeholder=""></div>
  </div>

  <!-- NOTES -->
  <h3 style="font-size:12px;font-weight:700;color:#666;margin-bottom:6px">הערות ליום</h3>
  <textarea class="day-notes" id="dayNotes" placeholder="הערות חופשיות..."></textarea>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════
// DATA
// ══════════════════════════════════
const WD=['שני','שלישי','רביעי','חמישי','שישי','שבת','ראשון'];
const MO=['','ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט'];

let dayData = null;
let hotels = [];
let dayId = 1;

// Get day from URL: day.html?d=1
const params = new URLSearchParams(location.search);
dayId = +(params.get('d') || 1);

async function load() {
  try {
    const [daysRes, hotelsRes] = await Promise.all([
      fetch('data/days.json').then(r=>r.json()),
      fetch('data/hotels.json').then(r=>r.json())
    ]);
    hotels = hotelsRes;
    dayData = daysRes.find(d => d.id === dayId);
    if (!dayData) { document.body.innerHTML = '<p style="padding:40px">יום לא נמצא</p>'; return; }

    // Load day-specific data if exists
    try {
      const dayFile = await fetch(`data/days/day-${String(dayId).padStart(2,'0')}.json`).then(r=>r.json());
      dayData = { ...dayData, ...dayFile };
    } catch(e) {}

    renderDay();
  } catch(e) {
    console.error(e);
    toast('שגיאה בטעינה');
  }
}

function renderDay() {
  const d = dayData;
  document.title = `יום ${d.tripDay} — ${d.city || ''}`;

  document.getElementById('dayNum').textContent = d.tripDay;
  document.getElementById('dayDate').textContent = `${d.day} ב${MO[d.month]} — יום ${d.weekday}`;
  document.getElementById('dayRegion').textContent = `${d.regionHe || ''} — ${d.city || ''}`;

  // Nav
  document.getElementById('prevDay').href = dayId > 1 ? `day.html?d=${dayId-1}` : '#';
  document.getElementById('nextDay').href = dayId < 31 ? `day.html?d=${dayId+1}` : '#';
  if (dayId <= 1) document.getElementById('prevDay').style.opacity = '0.3';
  if (dayId >= 31) document.getElementById('nextDay').style.opacity = '0.3';

  // Hotel
  const hotel = hotels.find(h => h.id === d.hotelId);
  if (hotel) {
    const mapUrl = hotel.pid
      ? `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.name)}&query_place_id=${hotel.pid}`
      : `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(hotel.addr||hotel.name)}`;
    document.getElementById('hotelBar').innerHTML =
      `<div style="flex:1"><span class="hl">${hotel.name}</span><br><span class="ha">${hotel.addr}</span></div>
       <a href="${mapUrl}" target="_blank">מפה</a>`;
  }

  // Spots
  ['morning','afternoon','evening'].forEach(tod => {
    renderSpots(tod, d.spots?.[tod] || []);
  });

  // Meals
  if (d.meals) {
    document.getElementById('meal-b').value = d.meals.breakfast || '';
    document.getElementById('meal-l').value = d.meals.lunch || '';
    document.getElementById('meal-d').value = d.meals.dinner || '';
    document.getElementById('meal-i').value = d.meals.icecream || '';
  }

  // Transport
  if (d.transport) {
    document.getElementById('tr-type').value = d.transport.type || '';
    document.getElementById('tr-from').value = d.transport.from || '';
    document.getElementById('tr-to').value = d.transport.to || '';
    document.getElementById('tr-dur').value = d.transport.duration || '';
    document.getElementById('tr-cost').value = d.transport.cost || '';
  }

  // Notes
  document.getElementById('dayNotes').value = d.notes || '';

  // Build map
  buildMap();
}

// ══════════════════════════════════
// SPOTS
// ══════════════════════════════════
function renderSpots(tod, spots) {
  const el = document.getElementById('spots-' + tod);
  if (!spots.length) {
    el.innerHTML = '<div class="spot" style="color:#ccc;font-size:12px">עדיין אין מיקומים — לחצי להוספה</div>';
    return;
  }
  el.innerHTML = spots.map((s, i) => {
    const mapsSearch = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(s.nameEn || s.name)}`;
    return `<div class="spot">
      <div class="spot-name">${s.name} <span class="spot-name-en">${s.nameEn || ''}</span></div>
      <div class="spot-meta">
        ${s.time ? `<span>${s.time}</span>` : ''}
        ${s.duration ? `<span>${s.duration}</span>` : ''}
        ${s.price ? `<span>¥${s.price}</span>` : ''}
        ${s.forWho ? `<span>${s.forWho}</span>` : ''}
      </div>
      ${s.addr ? `<div class="spot-meta"><span style="direction:ltr">${s.addr}</span></div>` : ''}
      ${s.notes ? `<div class="spot-notes">${s.notes}</div>` : ''}
      <div class="spot-links">
        <a class="sl" href="${mapsSearch}" target="_blank">חפש במפות</a>
        ${s.lat && s.lng ? `<a class="sl" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=transit" target="_blank">ניווט תח״צ</a>` : ''}
        ${s.lat && s.lng ? `<a class="sl" href="https://www.google.com/maps/dir/?api=1&destination=${s.lat},${s.lng}&travelmode=driving" target="_blank">ניווט רכב</a>` : ''}
        <button class="sl" style="cursor:pointer;border-color:#fee2e2;color:#991b1b" onclick="removeSpot('${tod}',${i})">מחק</button>
      </div>
    </div>`;
  }).join('');
}

function addSpot(tod) {
  if (!dayData.spots) dayData.spots = { morning:[], afternoon:[], evening:[] };
  if (!dayData.spots[tod]) dayData.spots[tod] = [];
  const name = prompt('שם המקום (עברית):');
  if (!name) return;
  const nameEn = prompt('שם באנגלית (לחיפוש בגוגל):') || '';
  dayData.spots[tod].push({
    name, nameEn,
    addr: '', time: '', duration: '', price: null,
    lat: null, lng: null, placeId: '',
    forWho: '', notes: ''
  });
  renderSpots(tod, dayData.spots[tod]);
  buildMap();
}

function removeSpot(tod, idx) {
  if (!confirm('למחוק?')) return;
  dayData.spots[tod].splice(idx, 1);
  renderSpots(tod, dayData.spots[tod]);
  buildMap();
}

// ══════════════════════════════════
// MAP — Google Maps Embed with route
// ══════════════════════════════════
function buildMap() {
  const spots = [];
  ['morning','afternoon','evening'].forEach(tod => {
    (dayData.spots?.[tod] || []).forEach(s => {
      if (s.nameEn || s.name) spots.push(s);
    });
  });

  if (spots.length === 0) {
    document.getElementById('mapFrame').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#999;font-size:13px">הוסיפי מיקומים — המפה תיבנה אוטומטית</div>';
    document.getElementById('routeLinks').innerHTML = '';
    return;
  }

  // Build Google Maps directions URL
  const names = spots.map(s => encodeURIComponent(s.nameEn || s.name));
  const hotel = hotels.find(h => h.id === dayData.hotelId);
  const origin = hotel ? encodeURIComponent(hotel.addr || hotel.name) : names[0];

  let directionsUrl, embedUrl;

  if (spots.length === 1) {
    directionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${names[0]}&travelmode=transit`;
    embedUrl = `https://www.google.com/maps?q=${names[0]}&output=embed`;
  } else {
    const dest = names[names.length - 1];
    const waypoints = names.slice(0, -1).join('|');
    directionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${waypoints}&travelmode=transit`;
    embedUrl = `https://www.google.com/maps?q=${names[0]}&output=embed`;
  }

  document.getElementById('mapFrame').innerHTML =
    `<iframe src="${embedUrl}" allowfullscreen loading="lazy"></iframe>`;

  const drivingUrl = directionsUrl.replace('travelmode=transit','travelmode=driving');
  const walkingUrl = directionsUrl.replace('travelmode=transit','travelmode=walking');

  document.getElementById('routeLinks').innerHTML = `
    <a class="rl" href="${directionsUrl}" target="_blank">מסלול תח״צ / רכבת</a>
    <a class="rl" href="${drivingUrl}" target="_blank">מסלול נהיגה</a>
    <a class="rl" href="${walkingUrl}" target="_blank">מסלול הליכה</a>
    <a class="rl" href="https://www.google.com/maps/dir/${names.join('/')}" target="_blank">מסלול מלא במפות</a>
  `;
}

// ══════════════════════════════════
// SAVE
// ══════════════════════════════════
function saveDay() {
  dayData.meals = {
    breakfast: document.getElementById('meal-b').value,
    lunch: document.getElementById('meal-l').value,
    dinner: document.getElementById('meal-d').value,
    icecream: document.getElementById('meal-i').value
  };
  dayData.transport = {
    type: document.getElementById('tr-type').value,
    from: document.getElementById('tr-from').value,
    to: document.getElementById('tr-to').value,
    duration: document.getElementById('tr-dur').value,
    cost: document.getElementById('tr-cost').value
  };
  dayData.notes = document.getElementById('dayNotes').value;

  const filename = `day-${String(dayId).padStart(2,'0')}.json`;
  const blob = new Blob([JSON.stringify(dayData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  toast(`נשמר: ${filename} — העבירי לתיקיית data/days/`);
}

function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

load();
</script>
</body>
</html>
